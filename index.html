  {
    n: 20,
    skr: `न जायते म्रियते वा कदाचिन् नायं भूत्वा भविता वा न भूयः ।
अजो नित्यः शाश्वतोऽयं पुराणो न हन्यते हन्यमाने शरीरे ॥ २० ॥`,
    tr: `na jāyate mriyate vā kadācin
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nāyaṁ bhūtvā bhavitā vā na bhūyaḥ
ajo nityaḥ śāśvato 'yaṁ purāṇo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na hanyate hanyamāne śarīre`,
    wbw_en: `na—never; jāyate—takes birth; mriyate—never dies; vā—either; kadācit—at any time (past, present or future); na—never; ayam—this; bhūtvā—came into being; bhavitā—will come to be; vā—or; na—not; bhūyaḥ—or has come to be; ajaḥ—unborn; nityaḥ—eternal; śāśvataḥ—permanent; ayam—this; purāṇaḥ—the oldest; na—never; hanyate—is killed; hanyamāne—being killed; śarīre—by the body.`,
    wbw_ru: ``,
    tr_en: `For the soul there is never birth nor death. Nor, having once been, does he ever cease to be. He is unborn, eternal, ever-existing, undying and primeval. He is not slain when the body is slain.`,
    tr_ru: ``,
    pur_en: `Qualitatively, the small atomic fragmental part of the Supreme Spirit is one with the Supreme. He undergoes no changes like the body. Sometimes the soul is called the steady, or kūṭastha. The body is subject to six kinds of transformations. It takes its birth in the womb of the mother's body, remains for some time, grows, produces some effects, gradually dwindles, and at last vanishes into oblivion. The soul, however, does not go through such changes. The soul is not born, but, because he takes on a material body, the body takes its birth. The soul does not take birth there, and the soul does not die. Anything which has birth also has death. And because the soul has no birth, he therefore has no past, present or future. He is eternal, ever-existing, and primeval—that is, there is no trace in history of his coming into being. Under the impression of the body, we seek the history of birth, etc., of the soul. The soul does not at any time become old, as the body does. The so-called old man, therefore, feels himself to be in the same spirit as in his childhood or youth. The changes of the body do not affect the soul. The soul does not deteriorate like a tree, nor anything material. The soul has no by-product either. The by-products of the body, namely children, are also different individual souls; and, owing to the body, they appear as children of a particular man. The body develops because of the soul's presence, but the soul has neither offshoots nor change. Therefore, the soul is free from the six changes of the body.
In the Kaṭha Upaniṣad also we find a similar passage which reads:
na jāyate mriyate vā vipaścin
nāyaṁ kutaścin na vibhūva kaścit
ajo nityaḥ śāśvato 'yaṁ purāṇo
na hanyate hanyamāne śarīre.
(Kaṭha 1.2.18)
The meaning and purport of this verse is the same as in the Bhagavad-gītā, but here in this verse there is one special word, vipaścit, which means learned or with knowledge.
The soul is full of knowledge, or full always with consciousness. Therefore, consciousness is the symptom of the soul. Even if one does not find the soul within the heart, where he is situated, one can still understand the presence of the soul simply by the presence of consciousness. Sometimes we do not find the sun in the sky owing to clouds, or for some other reason, but the light of the sun is always there, and we are convinced that it is therefore daytime. As soon as there is a little light in the sky early in the morning, we can understand that the sun is in the sky. Similarly, since there is some consciousness in all bodies—whether man or animal—we can understand the presence of the soul. This consciousness of the soul is, however, different from the consciousness of the Supreme because the supreme consciousness is all-knowledge—past, present and future. The consciousness of the individual soul is prone to be forgetful. When he is forgetful of his real nature, he obtains education and enlightenment from the superior lessons of Kṛṣṇa. But Kṛṣṇa is not like the forgetful soul. If so, Kṛṣṇa's teachings of Bhagavad-gītā would be useless.
There are two kinds of souls—namely the minute particle soul (aṇu-ātmā) and the Supersoul (the vibhu-ātmā). This is also confirmed in the Kaṭha Upaniṣad in this way:
aṇor aṇīyān mahato mahīyān
ātmāsya jantor nihito guhāyām
tam akratuḥ paśyati vīta-śoko
dhātuḥ prasādān mahimānam ātmanaḥ
(Kaṭha 1.2.20)
"Both the Supersoul [Paramātmā] and the atomic soul [jīvātmā] are situated on the same tree of the body within the same heart of the living being, and only one who has become free from all material desires as well as lamentations can, by the grace of the Supreme, understand the glories of the soul." Kṛṣṇa is the fountainhead of the Supersoul also, as it will be disclosed in the following chapters, and Arjuna is the atomic soul, forgetful of his real nature; therefore he requires to be enlightened by Kṛṣṇa, or by His bona fide representative (the spiritual master).`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/20',
  },
  {
    n: 21,
    skr: `वेदाविनाशिनं नित्यं य एनमजमव्ययम् ।
कथं स पुरुषः पार्थ कं घातयति हन्ति कम् ॥ २१ ॥`,
    tr: `vedāvināśinaṁ nityaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ya enam ajam avyayam
kathaṁ sa puruṣaḥ pārtha
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kaṁ ghātayati hanti kam`,
    wbw_en: `veda—in knowledge; avināśinam—indestructible; nityam—always; yaḥ—one who; enam—this (soul); ajam—unborn; avyayam—immutable; katham—how; saḥ—he; puruṣaḥ—person; pārtha—O Pārtha (Arjuna); kam—whom; ghātayati—hurts; hanti—kills; kam—whom.`,
    wbw_ru: ``,
    tr_en: `O Pārtha, how can a person who knows that the soul is indestructible, unborn, eternal and immutable, kill anyone or cause anyone to kill?`,
    tr_ru: ``,
    pur_en: `Everything has its proper utility, and a man who is situated in complete knowledge knows how and where to apply a thing for its proper utility. Similarly, violence also has its utility, and how to apply violence rests with the person in knowledge. Although the justice of the peace awards capital punishment to a person condemned for murder, the justice of the peace cannot be blamed because he orders violence to another person according to the codes of justice. In Manu-saṁhitā, the lawbook for mankind, it is supported that a murderer should be condemned to death so that in his next life he will not have to suffer for the great sin he has committed. Therefore, the king's punishment of hanging a murderer is actually beneficial. Similarly, when Kṛṣṇa orders fighting, it must be concluded that violence is for supreme justice, and, as such, Arjuna should follow the instruction, knowing well that such violence, committed in the act of fighting for Kṛṣṇa, is not violence at all because, at any rate, the man, or rather the soul, cannot be killed; so for the administration of justice, so-called violence is permitted. A surgical operation is not meant to kill the patient, but to cure him. Therefore the fighting to be executed by Arjuna at the instruction of Kṛṣṇa is with full knowledge, so there is no possibility of sinful reaction.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/21',
  },
  {
    n: 22,
    skr: `वासांसि जीर्णानि यथा विहाय नवानि गृह्णाति नरोऽपराणि ।
तथा शरीराणि विहाय जीर्णान्य- न्यानि संयाति नवानि देही ॥ २२ ॥`,
    tr: `vāsāṁsi jīrṇāni yathā vihāya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;navāni gṛhṇāti naro 'parāṇi
tathā śarīrāṇi vihāya jīrṇāny
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;anyāni saṁyāti navāni dehī`,
    wbw_en: `vāsāṁsi—garments; jīrṇāni—old and worn out; yathā—as it is; vihāya—giving up; navāni—new garments; gṛhṇāti—does accept; naraḥ—a man; aparāṇi—other; tathā—in the same way; śarīrāṇi—bodies; vihāya—giving up; jīrṇāni—old and useless; anyāni—different; saṁyāti—verily accepts; navāni—new sets; dehī—the embodied.`,
    wbw_ru: ``,
    tr_en: `As a person puts on new garments, giving up old ones, similarly, the soul accepts new material bodies, giving up the old and useless ones.`,
    tr_ru: ``,
    pur_en: `Change of body by the atomic individual soul is an accepted fact. Even some of the modern scientists who do not believe in the existence of the soul, but at the same time cannot explain the source of energy from the heart, have to accept continuous changes of body which appear from childhood to boyhood and from boyhood to youth and again from youth to old age. From old age, the change is transferred to another body. This has already been explained in the previous verse.
Transference of the atomic individual soul to another body is made possible by the grace of the Supersoul. The Supersoul fulfills the desire of the atomic soul as one friend fulfills the desire of another. The Vedas, like the Muṇḍaka Upaniṣad, as well as the Śvetāśvatara Upanisad, compare the soul and the Supersoul to two friendly birds sitting on the same tree. One of the birds (the individual atomic soul) is eating the fruit of the tree, and the other bird (Kṛṣṇa) is simply watching His friend. Of these two birds—although they are the same in quality—one is captivated by the fruits of the material tree, while the other is simply witnessing the activities of His friend. Kṛṣṇa is the witnessing bird, and Arjuna is the eating bird. Although they are friends, one is still the master and the other is the servant. Forgetfulness of this relationship by the atomic soul is the cause of one's changing his position from one tree to another or from one body to another. The jīva soul is struggling very hard on the tree of the material body, but as soon as he agrees to accept the other bird as the supreme spiritual master—as Arjuna agreed to do by voluntary surrender unto Kṛṣṇa for instruction—the subordinate bird immediately becomes free from all lamentations. Both the Kaṭha Upaniṣad and Śvetāśvatara Upaniṣad confirm this:
samāne vṛkṣe puruṣo nimagno
'nīśayā śocati muhyamānaḥ
juṣṭaṁ yadā paśyaty anyam īśam asya
mahimānam iti vīta-śokaḥ
"Although the two birds are in the same tree, the eating bird is fully engrossed with anxiety and moroseness as the enjoyer of the fruits of the tree. But if in some way or other he turns his face to his friend who is the Lord and knows His glories—at once the suffering bird becomes free from all anxieties." Arjuna has now turned his face towards his eternal friend, Kṛṣṇa, and is understanding the Bhagavad-gītā from Him. And thus, hearing from Kṛṣṇa, he can understand the supreme glories of the Lord and be free from lamentation.
Arjuna is advised herewith by the Lord not to lament for the bodily change of his old grandfather and his teacher. He should rather be happy to kill their bodies in the righteous fight so that they may be cleansed at once of all reactions from various bodily activities. One who lays down his life on the sacrificial altar, or in the proper battlefield, is at once cleansed of bodily reactions and promoted to a higher status of life. So there was no cause for Arjuna's lamentation.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/22',
  },
  {
    n: 23,
    skr: `नैनं छिन्दन्ति शस्त्राणि नैनं दहति पावकः ।
न चैनं क्लेदयन्त्यापो न शोषयति मारुतः ॥ २३ ॥`,
    tr: `nainaṁ chindanti śastrāṇi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nainaṁ dahati pāvakaḥ
na cainaṁ kledayanty āpo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na śoṣayati mārutaḥ`,
    wbw_en: `na—never; enam—unto this soul; chindanti—can cut into pieces; śastrāṇi —all weapons; na—never; enam—unto this soul; dahati—burns; pāvakaḥ—fire; na—never; ca—also; enam—unto this soul; kledayanti—moistens; āpaḥ —water; na—never; śoṣayati—dries; mārutaḥ—wind.`,
    wbw_ru: ``,
    tr_en: `The soul can never be cut into pieces by any weapon, nor can he be burned by fire, nor moistened by water, nor withered by the wind.`,
    tr_ru: ``,
    pur_en: `All kinds of weapons, swords, flames, rains, tornadoes, etc., are unable to kill the spirit soul. It appears that there were many kinds of weapons made of earth, water, air, ether, etc., in addition to the modern weapons of fire. Even the nuclear weapons of the modern age are classified as fire weapons, but formerly there were other weapons made of all different types of material elements. Firearms were counteracted by water weapons, which are now unknown to modern science. Nor do modern scientists have knowledge of tornado weapons. Nonetheless, the soul can never be cut into pieces, nor annihilated by any number of weapons, regardless of scientific devices.
Nor was it ever possible to cut the individual souls from the original Soul. The Māyāvādī, however, cannot describe how the individual soul evolved from ignorance and consequently became covered by illusory energy. Because they are atomic individual souls (sanātana) eternally, they are prone to be covered by the illusory energy, and thus they become separated from the association of the Supreme Lord, just as the sparks of the fire, although one in quality with the fire, are prone to be extinguished when out of the fire. In the Varāha Purāṇa, the living entities are described as separated parts and parcels of the Supreme. They are eternally so, according to the Bhagavad-gītā also. So, even after being liberated from illusion, the living entity remains a separate identity, as is evident from the teachings of the Lord to Arjuna. Arjuna became liberated by the knowledge received from Kṛṣṇa, but he never became one with Kṛṣṇa.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/23',
  },
  {
    n: 24,
    skr: `अच्छेद्योऽयमदाह्योऽयमक्लेद्योऽशोष्य एव च ।
नित्यः सर्वगतः स्थाणुरचलोऽयं सनातनः ॥ २४ ॥`,
    tr: `acchedyo 'yam adāhyo 'yam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;akledyo 'śoṣya eva ca
nityaḥ sarva-gataḥ sthāṇur
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;acalo 'yaṁ sanātanaḥ`,
    wbw_en: `acchedyaḥ—unbreakable; ayam—this soul; adāhyaḥ—cannot be burned; ayam—this soul; akledyaḥ—insoluble; aśoṣyaḥ—cannot be dried; eva—certainly; ca—and; nityaḥ—everlasting; sarva-gataḥ—all-pervading; sthāṇuḥ—unchangeable; acalaḥ—immovable; ayam—this soul; sanātanaḥ—eternally the same.`,
    wbw_ru: ``,
    tr_en: `This individual soul is unbreakable and insoluble, and can be neither burned nor dried. He is everlasting, all-pervading, unchangeable, immovable and eternally the same.`,
    tr_ru: ``,
    pur_en: `All these qualifications of the atomic soul definitely prove that the individual soul is eternally the atomic particle of the spirit whole, and he remains the same atom eternally, without change. The theory of monism is very difficult to apply in this case, because the individual soul is never expected to become one homogeneously. After liberation from material contamination, the atomic soul may prefer to remain as a spiritual spark in the effulgent rays of the Supreme Personality of Godhead, but the intelligent souls enter into the spiritual planets to associate with the Personality of Godhead.
The word sarva-gataḥ (all-pervading) is significant because there is no doubt that living entities are all over God's creation. They live on the land, in the water, in the air, within the earth and even within fire. The belief that they are sterilized in fire is not acceptable, because it is clearly stated here that the soul cannot be burned by fire. Therefore, there is no doubt that there are living entities also in the sun planet with suitable bodies to live there. If the sun globe is uninhabited, then the word sarva-gataḥ—living everywhere—becomes meaningless.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/24',
  },
  {
    n: 25,
    skr: `अव्यक्तोऽयमचिन्त्योऽयमविकार्योऽयमुच्यते ।
तस्मादेवं विदित्वैनं नानुशोचितुमर्हसि ॥ २५ ॥`,
    tr: `avyakto 'yam acintyo 'yam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;avikāryo 'yam ucyate
tasmād evaṁ viditvainaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nānuśocitum arhasi`,
    wbw_en: `avyaktaḥ—invisible; ayam—this soul; acintyaḥ—inconceivable; ayam—this soul; avikāryaḥ—unchangeable; ayam—this soul; ucyate—is said; tasmāt—therefore; evam—like this; viditvā—knowing it well; enam—this soul; na—do not; anuśocitum—may lament over; arhasi—you deserve.`,
    wbw_ru: ``,
    tr_en: `It is said that the soul is invisible, inconceivable, immutable, and unchangeable. Knowing this, you should not grieve for the body.`,
    tr_ru: ``,
    pur_en: `As described previously, the magnitude of the soul is so small for our material calculation that he cannot be seen even by the most powerful microscope; therefore, he is invisible. As far as the soul's existence is concerned, no one can establish his existence experimentally beyond the proof of śruti or Vedic wisdom. We have to accept this truth, because there is no other source of understanding the existence of the soul, although it is a fact by perception. There are many things we have to accept solely on grounds of superior authority. No one can deny the existence of his father, based upon the authority of his mother. There is no other source of understanding the identity of the father except by the authority of the mother. Similarly, there is no other source of understanding the soul except by studying the Vedas. In other words, the soul is inconceivable by human experimental knowledge. The soul is consciousness and conscious—that also is the statement of the Vedas, and we have to accept that. Unlike the bodily changes, there is no change in the soul. As eternally unchangeable, the soul remains atomic in comparison to the infinite Supreme Soul. The Supreme Soul is infinite, and the atomic soul is infinitesimal. Therefore, the infinitesimal soul, being unchangeable, can never become equal to the infinite soul, or the Supreme Personality of Godhead. This concept is repeated in the Vedas in different ways just to confirm the stability of the conception of the soul. Repetition of something is necessary in order that we understand the matter thoroughly without error.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/25',
  },
  {
    n: 26,
    skr: `अथ चैनं नित्यजातं नित्यं वा मन्यसे मृतम् ।
तथापि त्वं महाबाहो नैनं शोचितुमर्हसि ॥ २६ ॥`,
    tr: `atha cainaṁ nitya-jātaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nityaṁ vā manyase mṛtam
tathāpi tvaṁ mahā-bāho
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nainaṁ śocitum arhasi`,
    wbw_en: `atha—if, however; ca—also; enam—this soul; nitya-jātam—always born; nityam—forever; vā—either; manyase—so think; mṛtam—dead; tathāpi—still; tvam—you; mahā-bāho—O mighty-armed one; na—never; enam—about the soul; śocitum—to lament; arhasi—deserve.`,
    wbw_ru: ``,
    tr_en: `If, however, you think that the soul is perpetually born and always dies, still you have no reason to lament, O mighty-armed.`,
    tr_ru: ``,
    pur_en: `There is always a class of philosophers, almost akin to the Buddhists, who do not believe in the separate existence of the soul beyond the body. When Lord Kṛṣṇa spoke the Bhagavad-gītā, it appears that such philosophers existed, and they were known as the Lokāyatikas and Vaibhāṣikas. These philosophers maintained that life symptoms, or soul, takes place at a certain mature condition of material combination. The modern material scientist and materialist philosophers also think similarly. According to them, the body is a combination of physical elements, and at a certain stage the life symptoms develop by interaction of the physical and chemical elements. The science of anthropology is based on this philosophy. Currently, many pseudo-religions—now becoming fashionable in America—are also adhering to this philosophy, as well as to the nihilistic nondevotional Buddhist sects.
Even if Arjuna did not believe in the existence of the soul—as in the Vaibhāṣika philosophy—there would still have been no cause for lamentation. No one laments the loss of a certain bulk of chemicals and stops discharging his prescribed duty. On the other hand, in modern science and scientific warfare, so many tons of chemicals are wasted for achieving victory over the enemy. According to the Vaibhāṣika philosophy, the so-called soul or ātmā vanishes along with the deterioration of the body. So, in any case, whether Arjuna accepted the Vedic conclusion that there is an atomic soul, or whether he did not believe in the existence of the soul, he had no reason to lament. According to this theory, since there are so many living entities generating out of matter every moment, and so many of them are being vanquished every moment, there is no need to grieve for such an incidence. However, since he was not risking rebirth of the soul, Arjuna had no reason to be afraid of being affected with sinful reactions due to his killing his grandfather and teacher. But at the same time, Kṛṣṇa sarcastically addressed Arjuna as mahā-bāhu, mighty-armed, because He, at least, did not accept the theory of the Vaibhāṣikas, which leaves aside the Vedic wisdom. As a kṣatriya, Arjuna belonged to the Vedic culture, and it behooved him to continue to follow its principles.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/26',
  },
  {
    n: 27,
    skr: `जातस्य हि ध्रुवो मृत्युर्ध्रुवं जन्म मृतस्य च ।
तस्मादपरिहार्येऽर्थे न त्वं शोचितुमर्हसि ॥ २७ ॥`,
    tr: `jātasya hi dhruvo mṛtyur
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dhruvaṁ janma mṛtasya ca
tasmād aparihārye 'rthe
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na tvaṁ śocitum arhasi`,
    wbw_en: `jātasya—one who has taken his birth; hi—certainly; dhruvaḥ—a fact; mṛtyuḥ—death; dhruvam—it is also a fact; janma—birth; mṛtasya—of the dead; ca—also; tasmāt—therefore; aparihārye—for that which is unavoidable; arthe—in the matter of; na—do not; tvam—you; śocitum—to lament; arhasi—deserve.`,
    wbw_ru: ``,
    tr_en: `For one who has taken his birth, death is certain; and for one who is dead, birth is certain. Therefore, in the unavoidable discharge of your duty, you should not lament.`,
    tr_ru: ``,
    pur_en: `One has to take birth according to one's activities of life. And, after finishing one term of activities, one has to die to take birth for the next. In this way the cycle of birth and death is revolving, one after the other without liberation. This cycle of birth and death does not, however, support unnecessary murder, slaughter and war. But at the same time, violence and war are inevitable factors in human society for keeping law and order.
The Battle of Kurukṣetra, being the will of the Supreme, was an inevitable event, and to fight for the right cause is the duty of a kṣatriya. Why should he be afraid of or aggrieved at the death of his relatives since he was discharging his proper duty? He did not deserve to break the law, thereby becoming subjected to the reactions of sinful acts, of which he was so afraid. By avoiding the discharge of his proper duty, he would not be able to stop the death of his relatives, and he would be degraded due to his selection of the wrong path of action.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/27',
  },
  {
    n: 28,
    skr: `अव्यक्तादीनि भूतानि व्यक्तमध्यानि भारत ।
अव्यक्तनिधनान्येव तत्र का परिदेवना ॥ २८ ॥`,
    tr: `avyaktādīni bhūtāni
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;vyakta-madhyāni bhārata
avyakta-nidhanāny eva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tatra kā paridevanā`,
    wbw_en: `avyaktādīni—in the beginning unmanifested; bhūtāni—all that are created; vyakta—manifested; madhyāni—in the middle; bhārata—O descendant of Bharata; avyakta—nonmanifested; nidhanāni—all that are vanquished; eva—it is all like that; tatra—therefore; kā-what; paridevanā—lamentation.`,
    wbw_ru: ``,
    tr_en: `All created beings are unmanifest in their beginning, manifest in their interim state, and unmanifest again when they are annihilated. So what need is there for lamentation?`,
    tr_ru: ``,
    pur_en: `Accepting that there are two classes of philosophers, one believing in the existence of soul and the other not believing in the existence of the soul, there is no cause for lamentation in either case. Nonbelievers in the existence of the soul are called atheists by followers of Vedic wisdom. Yet even if, for argument's sake, we accept the atheistic theory, there is still no cause for lamentation. Apart from the separate existence of the soul, the material elements remain unmanifested before creation. From this subtle state of unmanifestation comes manifestation, just as from ether, air is generated; from air, fire is generated; from fire, water is generated; and from water, earth becomes manifested. From the earth, many varieties of manifestations take place. Take, for example, a big skyscraper manifested from the earth. When it is dismantled, the manifestation becomes again unmanifested and remains as atoms in the ultimate stage. The law of conservation of energy remains, but in course of time things are manifested and unmanifested—that is the difference. Then what cause is there for lamentation either in the stage of manifestation or unmanifestation? Somehow or other, even in the unmanifested stage, things are not lost. Both at the beginning and at the end, all elements remain unmanifested, and only in the middle are they manifested, and this does not make any real material difference.
And if we accept the Vedic conclusion as stated in the Bhagavad-gītā (antavanta ime dehāḥ) that these material bodies are perishable in due course of time (nityasyoktāḥ śarīriṇaḥ) but that soul is eternal, then we must remember always that the body is like a dress; therefore why lament the changing of a dress? The material body has no factual existence in relation to the eternal soul. It is something like a dream. In a dream we may think of flying in the sky, or sitting on a chariot as a king, but when we wake up we can see that we are neither in the sky nor seated on the chariot. The Vedic wisdom encourages self-realization on the basis of the nonexistence of the material body. Therefore, in either case, whether one believes in the existence of the soul, or one does not believe in the existence of the soul, there is no cause for lamentation for loss of the body.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/28',
  },
  {
    n: 29,
    skr: `आश्चर्यवत्पश्यति कश्चिदेनम् आश्चर्यवद्वदति तथैव चान्यः ।
आश्चर्यवच्चैनमन्यः शृणोति श्रुत्वाप्येनं वेद न चैव कश्चित् ॥ २९ ॥`,
    tr: `āścarya-vat paśyati kaścid enam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;āścarya-vad vadati tathaiva cānyaḥ
āścarya-vac cainam anyaḥ śṛṇoti
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śrutvāpy enaṁ veda na caiva kaścit`,
    wbw_en: `āścaryavat—amazing; paśyati—see; kaścit—some; enam—this soul; āścaryavat—amazing; vadati—speak; tathā—there; eva—certainly; ca—also; anyaḥ—others; āścaryavat—similarly amazing; ca—also; enam—this soul; anyaḥ—others; śṛṇoti—hear; śrutvā—having heard; api—even; enam—this soul; veda—do know; na—never; ca—and; eva—certainly; kaścit—anyone.`,
    wbw_ru: ``,
    tr_en: `Some look on the soul as amazing, some describe him as amazing, and some hear of him as amazing, while others, even after hearing about him, cannot understand him at all.`,
    tr_ru: ``,
    pur_en: `Since Gītopaniṣad is largely based on the principles of the Upaniṣads, it is not surprising to also find this passage in the Kaṭha Upaniṣad.
śravaṇāyāpi bahubhir yo na labhyaḥ
śṛṇvanto 'pi bahavo yaḥ na vidyuḥ
āścaryo vaktā kuśalo 'sya labdhā
āścaryo jñātā kuśalānuśiṣṭaḥ.
The fact that the atomic soul is within the body of a gigantic animal, in the body of a gigantic banyan tree, and also in the microbic germs, millions and billions of which occupy only an inch of space, is certainly very amazing. Men with a poor fund of knowledge and men who are not austere cannot understand the wonders of the individual atomic spark of spirit, even though it is explained by the greatest authority of knowledge, who imparted lessons even to Brahmā, the first living being in the universe. Owing to a gross material conception of things, most men in this age cannot imagine how such a small particle can become both so great and so small. So men look at the soul proper as wonderful either by constitution or by description. Illusioned by the material energy, people are so engrossed in subject matter for sense gratification that they have very little time to understand the question of self-understanding, even though it is a fact that without this self-understanding all activities result in ultimate defeat in the struggle for existence. Perhaps one has no idea that one must think of the soul, and also make a solution of the material miseries.
Some people who are inclined to hear about the soul may be attending lectures, in good association, but sometimes, owing to ignorance, they are misguided by acceptance of the Supersoul and the atomic soul as one without distinction of magnitude. It is very difficult to find a man who perfectly understands the position of the soul, the Supersoul, the atomic soul, their respective functions, relationships and all other major and minor details. And it is still more difficult to find a man who has actually derived full benefit from knowledge of the soul, and who is able to describe the position of the soul in different aspects. But if, somehow or other, one is able to understand the subject matter of the soul, then one's life is successful. The easiest process for understanding the subject matter of self, however, is to accept the statements of the Bhagavad-gītā spoken by the greatest authority, Lord Kṛṣṇa, without being deviated by other theories. But it also requires a great deal of penance and sacrifice, either in this life or in the previous ones, before one is able to accept Kṛṣṇa as the Supreme Personality of Godhead. Kṛṣṇa can, however, be known as such by the causeless mercy of the pure devotee and by no other way.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/29',
  },
  {
    n: 30,
    skr: `देही नित्यमवध्योऽयं देहे सर्वस्य भारत ।
तस्मात्सर्वाणि भूतानि न त्वं शोचितुमर्हसि ॥ ३० ॥`,
    tr: `dehī nityam avadhyo 'yaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dehe sarvasya bhārata
tasmāt sarvāṇi bhūtāni
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na tvaṁ śocitum arhasi`,
    wbw_en: `dehī—the owner of the material body; nityam—eternally; avadhyaḥ—cannot be killed; ayam—this soul; dehe—in the body; sarvasya—of everyone; bhārata—O descendant of Bharata; tasmāt—therefore; sarvāṇi—all; bhūtāni—living entities (that are born); na—never; tvam—yourself; śocitum —to lament; arhasi- deserve.`,
    wbw_ru: ``,
    tr_en: `O descendant of Bharata, he who dwells in the body is eternal and can never be slain. Therefore you need not grieve for any creature.`,
    tr_ru: ``,
    pur_en: `The Lord now concludes the chapter of instruction on the immutable spirit soul. In describing the immortal soul in various ways, Lord Kṛṣṇa establishes that the soul is immortal and the body is temporary. Therefore Arjuna as a kṣatriya should not abandon his duty out of fear that his grandfather and teacher—Bhīṣma and Droṇa—will die in the battle. On the authority of Śrī Kṛṣṇa, one has to believe that there is a soul different from the material body, not that there is no such thing as soul, or that living symptoms develop at a certain stage of material maturity resulting from the interaction of chemicals. Though the soul is immortal, violence is not encouraged, but at the time of war it is not discouraged when there is actual need for it. That need must be justified in terms of the sanction of the Lord, and not capriciously.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/30',
  },
  {
    n: 31,
    skr: `स्वधर्ममपि चावेक्ष्य न विकम्पितुमर्हसि ।
धर्म्याद्धि युद्धाच्छ्रेयोऽन्यत्क्षत्रियस्य न विद्यते ॥ ३१ ॥`,
    tr: `sva-dharmam api cāvekṣya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na vikampitum arhasi
dharmyād dhi yuddhāc chreyo 'nyat
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kṣatriyasya na vidyate`,
    wbw_en: `svadharmam—one's own religious principles; api—also; ca—indeed; avekṣya—considering; na—never; vikampitum—to hesitate; arhasi—you deserve; dharmyāt—from religious principles; hi—indeed; yuddhāt—of fighting; śreyaḥ—better engagements; anyat—anything else; kṣatriyasya—of the kṣatriya; na—does not; vidyate—exist.`,
    wbw_ru: ``,
    tr_en: `Considering your specific duty as a kṣatriya, you should know that there is no better engagement for you than fighting on religious principles; and so there is no need for hesitation.`,
    tr_ru: ``,
    pur_en: `Out of the four orders of social administration, the second order, for the matter of good administration, is called kṣatriya. Kṣat means hurt. One who gives protection from harm is called kṣatriya (trayate—to give protection). The kṣatriyas are trained for killing in the forest. A kṣatriya would go into the forest and challenge a tiger face to face and fight with the tiger with his sword. When the tiger was killed, it would be offered the royal order of cremation. This system is being followed even up to the present day by the kṣatriya kings of Jaipur state. The kṣatriyas are specially trained for challenging and killing because religious violence is sometimes a necessary factor. Therefore, kṣatriyas are never meant for accepting directly the order of sannyāsa or renunciation. Nonviolence in politics may be a diplomacy, but it is never a factor or principle. In the religious law books it is stated:
āhaveṣu mitho 'nyonyaṁ jighāṁsanto mahīkṣitaḥ
yuddhamānāḥ paraṁ śaktyā svargaṁ yānty aparāṅmukhāḥ
yajñeṣu paśavo brahman hanyante satataṁ dvijaiḥ
saṁskṛtāḥ kila mantraiś ca te 'pi svargam avāpnuvan.
"In the battlefield, a king or kṣatriya, while fighting another king envious of him, is eligible for achieving heavenly planets after death, as the brāhmaṇas also attain the heavenly planets by sacrificing animals in the sacrificial fire." Therefore, killing on the battle on the religious principle and the killing of animals in the sacrificial fire are not at all considered to be acts of violence, because everyone is benefitted by the religious principles involved. The animal sacrificed gets a human life immediately without undergoing the gradual evolutionary process from one form to another, and the kṣatriyas killed in the battlefield also attain the heavenly planets as do the brāhmaṇas who attain them by offering sacrifice.
There are two kinds of svadharmas, specific duties. As long as one is not liberated, one has to perform the duties of that particular body in accordance with religious principles in order to achieve liberation. When one is liberated, one's svadharma—specific duty—becomes spiritual and is not in the material bodily concept. In the bodily conception of life there are specific duties for the brāhmaṇas and kṣatriyas respectively, and such duties are unavoidable. Svadharma is ordained by the Lord, and this will be clarified in the Fourth Chapter. On the bodily plane svadharma is called varṇāśrama-dharma, or man's steppingstone for spiritual understanding. Human civilization begins from the stage of varṇāśrama-dharma, or specific duties in terms of the specific modes of nature of the body obtained. Discharging one's specific duty in any field of action in accordance with varṇāśrama-dharma serves to elevate one to a higher status of life.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/31',
  },
  {
    n: 32,
    skr: `यदृच्छया चोपपन्नं स्वर्गद्वारमपावृतम् ।
सुखिनः क्षत्रियाः पार्थ लभन्ते युद्धमीदृशम् ॥ ३२ ॥`,
    tr: `yadṛcchayā copapannaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;svarga-dvāram apāvṛtam
sukhinaḥ kṣatriyāḥ pārtha
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;labhante yuddham īdṛśam`,
    wbw_en: `yadṛcchayā—by its own accord; ca—also; upapannam—arrived at; svarga—heavenly planet; dvāram—door; apāvṛtam—wide open; sukhinaḥ—very happy; kṣatriyāḥ—the members of the royal order; pārtha—O son of Pṛthā; labhante—do achieve; yuddham—war; īdṛśam—like this.`,
    wbw_ru: ``,
    tr_en: `O Pārtha, happy are the kṣatriyas to whom such fighting opportunities come unsought, opening for them the doors of the heavenly planets.`,
    tr_ru: ``,
    pur_en: `As supreme teacher of the world, Lord Kṛṣṇa condemns the attitude of Arjuna who said, "I do not find any good in this fighting. It will cause perpetual habitation in hell." Such statements by Arjuna were due to ignorance only. He wanted to become nonviolent in the discharge of his specific duty. For a kṣatriya to be in the battlefield and to become nonviolent is the philosophy of fools. In the Parāśara-smṛti or religious codes made by Parāśara, the great sage and father of Vyāsadeva, it is stated:
kṣatriyo hi prajā rakṣan śastra-pāṇiḥ pradaṇḍayan
nirjitya parasainyādi kṣitiṁ dharmeṇa pālayet.
"The kṣatriya's duty is to protect the citizens from all kinds of difficulties, and for that reason he has to apply violence in suitable cases for law and order. Therefore he has to conquer the soldiers of inimical kings, and thus, with religious principles, he should rule over the world."
Considering all aspects, Arjuna had no reason to refrain from fighting. If he should conquer his enemies, he would enjoy the kingdom; and if he should die in the battle, he would be elevated to the heavenly planets whose doors were wide open to him. Fighting would be for his benefit in either case.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/32',
  },
  {
    n: 33,
    skr: `अथ चेत्त्वमिमं धर्म्यं सङ्ग्रामं न करिष्यसि ।
ततः स्वधर्मं कीर्तिं च हित्वा पापमवाप्स्यसि ॥ ३३ ॥`,
    tr: `atha cet tvam imaṁ dharmyaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;saṅgrāmaṁ na kariṣyasi
tataḥ sva-dharmaṁ kīrtiṁ ca
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;hitvā pāpam avāpsyasi`,
    wbw_en: `atha—therefore; cet—if; tvam—you; imam—this; dharmyam—religious duty; saṅgrāmam—fighting; na—do not; kariṣyasi—perform; tataḥ—then; svadharmam—your religious duty; kīrtim-—reputation; ca—also; hitvā—losing; pāpam—sinful reaction; avāpsyasi—do gain.`,
    wbw_ru: ``,
    tr_en: `If, however, you do not fight this religious war, then you will certainly incur sins for neglecting your duties and thus lose your reputation as a fighter.`,
    tr_ru: ``,
    pur_en: `Arjuna was a famous fighter, and he attained fame by fighting many great demigods, including even Lord Śiva. After fighting and defeating Lord Śiva in the dress of a hunter, Arjuna pleased the Lord and received as a reward a weapon called pāśupata-astra. Everyone knew that he was a great warrior. Even Droṇācārya gave him benediction and awarded him the special weapon by which he could kill even his teacher. So he was credited with so many military certificates from many authorities, including his adopted father Indra, the heavenly king. But if he abandoned the battle, he would not only neglect his specific duty as a kṣatriya, but he would lose all his fame and good name and thus prepare his royal road to hell. In other words, he would go to hell, not by fighting, but by withdrawing from battle.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/33',
  },
  {
    n: 34,
    skr: `अकीर्तिं चापि भूतानि कथयिष्यन्ति तेऽव्ययाम् ।
सम्भावितस्य चाकीर्तिर्मरणादतिरिच्यते ॥ ३४ ॥`,
    tr: `akīrtiṁ cāpi bhūtāni
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kathayiṣyanti te 'vyayām
sambhāvitasya cākīrtir
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;maraṇād atiricyate`,
    wbw_en: `akīrtim—infamy; ca—also; api—over and above; bhūtāni—all people; kathayiṣyanti—will speak; te-of you; avyayām—forever; sambhāvitasya—for a respectable man; ca—also; akīrtiḥ—ill fame; maraṇāt—than death; atiricyate—becomes more than.`,
    wbw_ru: ``,
    tr_en: `People will always speak of your infamy, and for one who has been honored, dishonor is worse than death.`,
    tr_ru: ``,
    pur_en: `Both as friend and philosopher to Arjuna, Lord Kṛṣṇa now gives His final judgement regarding Arjuna's refusal to fight. The Lord says, "Arjuna, if you leave the battlefield, people will call you a coward even before your actual flight. And if you think that people may call you bad names but that you will save your life by fleeing the battlefield, then My advice is that you'd do better to die in the battle. For a respectable man like you, ill fame is worse than death. So, you should not flee for fear of your life; better to die in the battle. That will save you from the ill fame of misusing My friendship and from losing your prestige in society."
So, the final judgement of the Lord was for Arjuna to die in the battle and not withdraw.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/34',
  },
  {
    n: 35,
    skr: `भयाद्रणादुपरतं मंस्यन्ते त्वां महारथाः ।
येषां च त्वं बहुमतो भूत्वा यास्यसि लाघवम् ॥ ३५ ॥`,
    tr: `bhayād raṇād uparataṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;maṁsyante tvāṁ mahā-rathāḥ
yeṣāṁ ca tvaṁ bahu-mato
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;bhūtvā yāsyasi lāghavam`,
    wbw_en: `bhayāt—out of fear; raṇāt—from the battlefield; uparatam—ceased; maṁsyante—will consider; tvām—unto you; mahā-rathāḥ—the great generals; yeṣām—of those who; ca—also; tvam—you; bahu-mataḥ—in great estimation; bhūtvā—will become; yāsyasi—will go; lāghavam—decreased in value.`,

    tr_en: `The great generals who have highly esteemed your name and fame will think that you have left the battlefield out of fear only, and thus they will consider you a coward.`,
    tr_ru: ``,
    pur_en: `Lord Kṛṣṇa continued to give His verdict to Arjuna: "Do not think that the great generals like Duryodhana, Karṇa, and other contemporaries will think that you have left the battlefield out of compassion for your brothers and grandfather. They will think that you have left out of fear for your life. And thus their high estimation of your personality will go to hell."`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/35',
  },
  {
    n: 36,
    skr: `अवाच्यवादांश्च बहून्वदिष्यन्ति तवाहिताः ।
निन्दन्तस्तव सामर्थ्यं ततो दुःखतरं नु किम् ॥ ३६ ॥`,
    tr: `avācya-vādāṁś ca bahūn
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;vadiṣyanti tavāhitāḥ
nindantas tava sāmarthyaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tato duḥkhataraṁ nu kim`,
    wbw_en: `avācya—unkind; vādān—fabricated words; ca—also; bahūn—many; vadiṣyanti—will say; tava—your; ahitāḥ—enemies; nindantaḥ—while vilifying; tava—your; sāmarthyam—ability; tataḥ—thereafter; duḥkhataram—more painful; nu—of course; kim—what is there.`,
    wbw_ru: ``,
    tr_en: `Your enemies will describe you in many unkind words and scorn your ability. What could be more painful for you?`,
    tr_ru: ``,
    pur_en: `Lord Kṛṣṇa was astonished in the beginning at Arjuna's uncalled-for plea for compassion, and He described his compassion as befitting the non-Aryans. Now in so many words, He has proved His statements against Arjuna's so-called compassion.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/36',

  {
    n: 37,
    skr: `हतो वा प्राप्स्यसि स्वर्गं जित्वा वा भोक्ष्यसे महीम् ।
तस्मादुत्तिष्ठ कौन्तेय युद्धाय कृतनिश्चयः ॥ ३७ ॥`,
    tr: `hato vā prāpsyasi svargaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;jitvā vā bhokṣyase mahīm
tasmād uttiṣṭha kaunteya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yuddhāya kṛta-niścayaḥ`,
    wbw_en: `hataḥ—being killed; vā—either; prāpsyasi—you gain; svargam—the heavenly kingdom; jitvā—by conquering; vā—or; bhokṣyase—you enjoy; mahīm—the world; tasmāt—therefore; uttiṣṭha—get up; kaunteya—O son of Kuntī; yuddhāya—to fight; kṛta—determination; niścayaḥ—uncertainty.`,
    wbw_ru: ``,
    tr_en: `O son of Kuntī, either you will be killed on the battlefield and attain the heavenly planets, or you will conquer and enjoy the earthly kingdom. Therefore get up and fight with determination.`,
    tr_ru: ``,
    pur_en: `Even though there was no certainty of victory for Arjuna's side, he still had to fight; for, even being killed there, he could be elevated into the heavenly planets.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/37',
  },
  {
    n: 38,
    skr: `सुखदुःखे समे कृत्वा लाभालाभौ जयाजयौ ।
ततो युद्धाय युज्यस्व नैवं पापमवाप्स्यसि ॥ ३८ ॥`,
    tr: `sukha-duḥkhe same kṛtvā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;lābhālābhau jayājayau
tato yuddhāya yujyasva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;naivaṁ pāpam avāpsyasi`,
    wbw_en: `sukha—happiness; duḥkhe—in distress; same—in equanimity; kṛtvā—doing so; lābhālābhau—both in loss and profit; jayājayau—both in defeat and victory; tataḥ—thereafter; yuddhāya—for the sake of fighting; yujyasva—do fight; na—never; evam—in this way; pāpam—sinful reaction; avāpsyasi—you will gain.`,
    wbw_ru: ``,
    tr_en: `Do thou fight for the sake of fighting, without considering happiness or distress, loss or gain, victory or defeat—and, by so doing, you shall never incur sin.`,
    tr_ru: ``,
    pur_en: `Lord Kṛṣṇa now directly says that Arjuna should fight for the sake of fighting because He desires the battle. There is no consideration of happiness or distress, profit or gain, victory or defeat in the activities of Kṛṣṇa consciousness. That everything should be performed for the sake of Kṛṣṇa is transcendental consciousness; so there is no reaction to material activities. He who acts for his own sense gratification, either in goodness or in passion, is subject to the reaction, good or bad. But he who has completely surrendered himself in the activities of Kṛṣṇa consciousness is no longer obliged to anyone, nor is he a debtor to anyone, as one is in the ordinary course of activities. It is said:
devarṣi-bhutāpta-nṛṇāṁ pitṝṇāṁ
na kiṅkaro nāyamṛṇī ca rājan
sarvātmanā yaḥ śaraṇaṁ śaraṇyaṁ
gato mukundaṁ parihṛtya kartam
(Bhag. 11.5.41)
"Anyone who has completely surrendered unto Kṛṣṇa, Mukunda, giving up all other duties, is no longer a debtor, nor is he obliged to anyone—not the demigods, nor the sages, nor the people in general, nor kinsmen, nor humanity, nor forefathers." That is the indirect hint given by Kṛṣṇa to Arjuna in this verse, and the matter will be more clearly explained in the following verses.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/38',
  },
  {
    n: 39,
    skr: `एषा तेऽभिहिता साङ्ख्ये बुद्धिर्योगे त्विमां शृणु ।
बुद्ध्या युक्तो यया पार्थ कर्मबन्धं प्रहास्यसि ॥ ३९ ॥`,
    tr: `eṣā te 'bhihitā sāṅkhye
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;buddhir yoge tv imāṁ śṛṇu
buddhyā yukto yayā pārtha
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;karma-bandhaṁ prahāsyasi`,
    wbw_en: `eṣā—all these; te—unto you; abhihitā—described; śāṅkhye—by analytical study; buddhiḥ—intelligence; yoge—work without fruitive result; tu—but; imām-this; śṛṇu—just hear; buddhyā—by intelligence; yuktaḥ—dovetailed; yayā—by which; pārtha—O son of Pṛthā; karma-bandham—bondage of reaction; prahāsyasi—you can be released from.`,
    wbw_ru: ``,
    tr_en: `Thus far I have declared to you the analytical knowledge of sāṅkhya philosophy. Now listen to the knowledge of yoga whereby one works without fruitive result. O son of Pṛthā, when you act by such intelligence, you can free yourself from the bondage of works.`,
    tr_ru: ``,
    pur_en: `According to the Nirukti, or the Vedic dictionary, saṅkhya means that which describes phenomena in detail, and saṅkhya refers to that philosophy which describes the real nature of the soul. And yoga involves controlling the senses. Arjuna's proposal not to fight was based on sense gratification. Forgetting his prime duty, he wanted to cease fighting because he thought that by not killing his relatives and kinsmen he would be happier than by enjoying the kingdom by conquering his cousins and brothers, the sons of Dhṛtarāṣṭra. In both ways, the basic principles were for sense gratification. Happiness derived from conquering them and happiness derived by seeing kinsmen alive are both on the basis of personal sense gratification, for there is a sacrifice of wisdom and duty. Kṛṣṇa, therefore, wanted to explain to Arjuna that by killing the body of his grandfather he would not be killing the soul proper, and He explained that all individual persons, including the Lord Himself, are eternal individuals; they were individuals in the past, they are individuals in the present, and they will continue to remain individuals in the future, because all of us are individual souls eternally, and we simply change our bodily dress in different manners. But, actually, we keep our individuality even after liberation from the bondage of material dress. An analytical study of the soul and the body has been very graphically explained by Lord Kṛṣṇa. And this descriptive knowledge of the soul and the body from different angles of vision has been described here as sāṅkhya, in terms of the Nirukti dictionary. This sāṅkhya has nothing to do with the sāṅkhya philosophy of the atheist Kapila. Long before the imposter Kapila's sāṅkhya, the sāṅkhya philosophy was expounded in the Śrīmad-Bhāgavatam by the true Lord Kapila, the incarnation of Lord Kṛṣṇa, who explained it to His mother, Devahūti. It is clearly explained by Him that the Puruṣa, or the Supreme Lord, is active and that He creates by looking over the prakṛti. This is accepted in the Vedas and in the Gītā. The description in the Vedas indicates that the Lord glanced over the prakṛti, or nature, and impregnated it with atomic individuals souls. All these individuals are working in the material world for sense gratification, and under the spell of material energy they are thinking of being enjoyers. This mentality is dragged to the last point of liberation when the living entity wants to become one with the Lord. This is the last snare of māyā or sense gratificatory illusion, and it is only after many, many births of such sense gratificatory activities that a great soul surrenders unto Vāsudeva, Lord Kṛṣṇa, thereby fulfilling the search after the ultimate truth.
Arjuna has already accepted Kṛṣṇa as his spiritual master by surrendering himself unto Him: śiṣyas te 'haṁ śādhi māṁ tvāṁ prapannam. Consequently, Kṛṣṇa will now tell him about the working process in buddhi-yoga, or karma-yoga, or in other words, the practice of devotional service only for the sense gratification of the Lord. This buddhi-yoga is clearly explained in Chapter Ten, verse ten, as being direct communion with the Lord, who is sitting as Paramātmā in everyone's heart. But such communion does not take place without devotional service. One who is therefore situated in devotional or transcendental loving service to the Lord, or, in other words, in Kṛṣṇa consciousness, attains to this stage of buddhi-yoga by the special grace of the Lord. The Lord says, therefore, that only to those who are always engaged in devotional service out of transcendental love does He award the pure knowledge of devotion in love. In that way the devotee can reach Him easily in the ever-blissful kingdom of God.
Thus the buddhi-yoga mentioned in this verse is the devotional service of the Lord, and the word sāṅkhya mentioned herein has nothing to do with the atheistic sāṅkhya-yoga enunciated by the impostor Kapila. One should not, therefore, misunderstand that the sāṅkhya-yoga mentioned herein has any connection with the atheistic sāṅkhya. Nor did that philosophy have any influence during that time; nor would Lord Kṛṣṇa care to mention such godless philosophical speculations. Real sāṅkhya philosophy is described by Lord Kapila in the Śrīmad-Bhāgavatam, but even that sāṅkhya has nothing to do with the current topics. Here, sāṅkhya means analytical description of the body and the soul. Lord Kṛṣṇa made an analytical description of the soul just to bring Arjuna to the point of buddhi-yoga, or bhakti-yoga. Therefore, Lord Kṛṣṇa's sāṅkhya and Lord Kapila's sāṅkhya, as described in the Bhāgavatam; are one and the same. They are all bhakti-yoga. He said, therefore, that only the less intelligent class of men make a distinction between sāṅkhya-yoga and bhakti-yoga.
Of course, atheistic sāṅkhya-yoga has nothing to do with bhakti-yoga, yet the unintelligent claim that the atheistic sāṅkhya-yoga is referred to in the Bhagavad-gītā.
One should therefore understand that buddhi-yoga means to work in Kṛṣṇa consciousness, in the full bliss and knowledge of devotional service. One who works for the satisfaction of the Lord only, however difficult such work may be, is working under the principles of buddhi-yoga and finds himself always in transcendental bliss. By such transcendental engagement, one achieves all transcendental qualities automatically, by the grace of the Lord, and thus his liberation is complete in itself, without his making extraneous endeavors to acquire knowledge. There is much difference between work in Kṛṣṇa consciousness and work for fruitive results, especially in the matter of sense gratification for achieving results in terms of family or material happiness. Buddhi-yoga is therefore the transcendental quality of the work that we perform.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/39',
  },
  {
    n: 40,
    skr: `नेहाभिक्रमनाशोऽस्ति प्रत्यवायो न विद्यते ।
स्वल्पमप्यस्य धर्मस्य त्रायते महतो भयात् ॥ ४० ॥`,
    tr: `nehābhikrama-nāśo 'sti
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pratyavāyo na vidyate
sv-alpam apy asya dharmasya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;trāyate mahato bhayāt`,
    wbw_en: `na—there is not; iha—in this world; abhikrama—endeavoring; nāśaḥ—loss; asti—there is; pratyavāyaḥ—diminution; na—never; vidyate—there is; svalpam—little; api—although; asya—of this; dharmasya—of this occupation; trāyate—releases; mahataḥ—of very great; bhayāt—from danger.`,
    wbw_ru: ``,
    tr_en: `In this endeavor there is no loss or diminution, and a little advancement on this path can protect one from the most dangerous type of fear.`,
    tr_ru: ``,
    pur_en: `Activity in Kṛṣṇa consciousness, or acting for the benefit of Kṛṣṇa without expectation of sense gratification, is the highest transcendental quality of work. Even a small beginning of such activity finds no impediment, nor can that small beginning be lost at any stage. Any work begun on the material plane has to be completed, otherwise the whole attempt becomes a failure. But any work begun in Kṛṣṇa consciousness has a permanent effect, even though not finished. The performer of such work is therefore not at a loss even if his work in Kṛṣṇa consciousness is incomplete. One percent done in Kṛṣṇa consciousness bears permanent results, so that the next beginning is from the point of two percent; whereas, in material activity, without a hundred percent success, there is no profit. Ajāmila performed his duty in some percentage of Kṛṣṇa consciousness, but the result he enjoyed at the end was a hundred percent, by the grace of the Lord. There is a nice verse in this connection in Śrīmad-Bhāgavatam:
tyaktvā sva-dharmaṁ caraṇāmbujaṁ harer
bhajan na pakko 'tha patet tato yadi
yatra kva vābhadram abhūd amuṣya kiṁ
ko vārtha āpto 'bhajatāṁ sva-dharmataḥ
"If someone gives up self-gratificatory pursuits and works in Kṛṣṇa consciousness and then falls down on account of not completing his work, what loss is there on his part? And, what can one gain if one performs his material activities perfectly?" (Bhāg. 1.5.17) Or, as the Christians say, "What profiteth a man if he gain the whole world yet suffers the loss of his eternal soul?"
Material activities and their results end with the body. But work in Kṛṣṇa consciousness carries the person again to Kṛṣṇa consciousness, even after the loss of the body. At least one is sure to have a chance in the next life of being born again as a human being, either in the family of a great cultured brāhmaṇa or in a rich aristocratic family that will give one a further chance for elevation. That is the unique quality of work done in Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/40',
  },
  {
    n: 41,
    skr: `व्यवसायात्मिका बुद्धिरेकेह कुरुनन्दन ।
बहुशाखा ह्यनन्ताश्च बुद्धयोऽव्यवसायिनाम् ॥ ४१ ॥`,
    tr: `vyavasāyātmikā buddhir
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ekeha kuru-nandana
bahu-śākhā hy anantāś ca
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;buddhayo 'vyavasāyinām`,
    wbw_en: `vyavasāyātmikā—resolute Kṛṣṇa consciousness; buddhiḥ—intelligence; ekā—only one; iha—in this world; kuru-nandana—O beloved child of the Kurus; bahu-śākhāḥ—various branches; hi—indeed; anantāḥ—unlimited; ca—also; buddhayaḥ—intelligence; avyavasāyinām—of those who are not in Kṛṣṇa consciousness.`,
    wbw_ru: ``,
    tr_en: `Those who are on this path are resolute in purpose, and their aim is one. O beloved child of the Kurus, the intelligence of those who are irresolute is many-branched.`,
    tr_ru: ``,
    pur_en: `A strong faith in Kṛṣṇa consciousness that one should be elevated to the highest perfection of life is called vyavasāyātmikā intelligence. The Caitanya-caritāmṛta states:
'śraddhā'-śabde viśvāsa kahe sudṛḍha niścaya
kṛṣṇe bhakti kaile sarva-karma kṛta haya
Faith means unflinching trust in something sublime. When one is engaged in the duties of Kṛṣṇa consciousness, he need not act in relationship to the material world with obligations to family traditions, humanity, or nationality. Fruitive activities are the engagements of one's reactions from past good or bad deeds. When one is awake in Kṛṣṇa consciousness, he need no longer endeavor for good results in his activities. When one is situated in Kṛṣṇa consciousness, all activities are on the absolute plane, for they are no longer subject to dualities like good and bad. The highest perfection of Kṛṣṇa consciousness is renunciation of the material conception of life. This state is automatically achieved by progressive Kṛṣṇa consciousness. The resolute purpose of a person in Kṛṣṇa consciousness is based on knowledge ("Vāsudevaḥ sarvam iti sa mahātmā sudurlabhaḥ") by which one comes to know perfectly that Vāsudeva, or Kṛṣṇa, is the root of all manifested causes. As water on the root of a tree is automatically distributed to the leaves and branches, in Kṛṣṇa consciousness, one can render the highest service to everyone—namely self, family, society, country, humanity, etc. If Kṛṣṇa is satisfied by one's actions, then everyone will be satisfied.
Service in Kṛṣṇa consciousness is, however, best practiced under the able guidance of a spiritual master who is a bona fide representative of Kṛṣṇa, who knows the nature of the student and who can guide him to act in Kṛṣṇa consciousness. As such, to be well-versed in Kṛṣṇa consciousness one has to act firmly and obey the representative of Kṛṣṇa, and one should accept the instruction of the bona fide spiritual master as one's mission in life. Śrīla Viśvanātha Cakravartī Ṭhākur instructs us, in his famous prayers for the spiritual master, as follows:
yasya prasādād bhagavat-prasādo
yasyāprasādānna gatiḥ kuto 'pi
dhyāyaṁ stuvaṁs tasya yaśas tri-sandhyaṁ
vande guroḥ śrī-caraṇāravindam.
"By satisfaction of the spiritual master, the Supreme Personality of Godhead becomes satisfied. And by not satisfying the spiritual master, there is no chance of being promoted to the plane of Kṛṣṇa consciousness. I should, therefore, meditate and pray for his mercy three times a day, and offer my respectful obeisances unto him, my spiritual master."
The whole process, however, depends on perfect knowledge of the soul beyond the conception of the body—not theoretically but practically, when there is no longer chance for sense gratification manifested in fruitive activities. One who is not firmly fixed in mind is diverted by various types of fruitive acts.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/41',
  },

    n: 42,
    skr: `यामिमां पुष्पितां वाचं प्रवदन्त्यविपश्चितः ।
वेदवादरताः पार्थ नान्यदस्तीति वादिनः ॥ ४२ ॥`,
    tr: `yām imāṁ puṣpitāṁ vācaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pravadanty avipaścitaḥ
veda-vāda-ratāḥ pārtha
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nānyad astīti vādinaḥ
kāmātmānaḥ svarga-parā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;janma-karma-phala-pradām
kriyā-viśeṣa-bahulāṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;bhogaiśvarya-gatiṁ prati`,
    wbw_en: `yām imām—all these; puṣpitām—flowery; vācam—words; pravadanti—say; avipaścitaḥ—men with a poor fund of knowledge; veda-vāda-ratāḥ—supposed followers of the Vedas; pārtha—O son of Pṛthā; na—never; anyat—anything else; asti—there is; iti—this; vādinaḥ—advocates; kāma-ātmānaḥ—desirous of sense gratification; svarga-parāḥ—aiming to achieve heavenly planets; janma-karma-phala-pradām—resulting in fruitive action, good birth, etc.; kriyā-viśeṣa—pompous ceremonies; bahulām—various; bhoga—sense enjoyment; aiśvarya—opulence; gatim—progress; prati—towards.`,
    wbw_ru: ``,
    tr_en: `Men of small knowledge are very much attached to the flowery words of the Vedas, which recommend various fruitive activities for elevation to heavenly planets, resultant good birth, power, and so forth. Being desirous of sense gratification and opulent life, they say that there is nothing more than this.`,
    tr_ru: ``,
    pur_en: `People in general are not very intelligent, and due to their ignorance they are most attached to the fruitive activities recommended in the karma-kāṇḍa portions of the Vedas. They do not want anything more than sense gratificatory proposals for enjoying life in heaven, where wine and women are available and material opulence is very common. In the Vedas many sacrifices are recommended for elevation to the heavenly planets, especially the jyotiṣṭoma sacrifices. In fact, it is stated that anyone desiring elevation to heavenly planets must perform these sacrifices, and men with a poor fund of knowledge think that this is the whole purpose of Vedic wisdom. It is very difficult for such inexperienced persons to be situated in the determined action of Kṛṣṇa consciousness. As fools are attached to the flowers of poisonous trees without knowing the results of such attractions, similarly unenlightened men are attracted by such heavenly opulence and the sense enjoyment thereof.
In the karma-kāṇḍa section of the Vedas it is said that those who perform the four monthly penances become eligible to drink the somarasa beverages to become immortal and happy forever. Even on this earth some are very eager to have somarasa to become strong and fit to enjoy sense gratifications. Such persons have no faith in liberation from material bondage, and they are very much attached to the pompous ceremonies of Vedic sacrifices. They are generally sensual, and they do not want anything other than the heavenly pleasures of life. It is understood that there are gardens called nandana-kānana in which there is good opportunity for association with angelic, beautiful women and having a profuse supply of somarasa wine. Such bodily happiness is certainly sensual; therefore there are those who are purely attached to material, temporary happiness, as lords of the material world.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/42',
  },

    n: 44,
    skr: `भोगैश्वर्यप्रसक्तानां तयापहृतचेतसाम् ।
व्यवसायात्मिका बुद्धिः समाधौ न विधीयते ॥ ४४ ॥`,

&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tayāpahṛta-cetasām

&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;samādhau na vidhīyate`,
    wbw_en: `bhoga—material enjoyment; aiśvarya—opulence; prasaktānām—those who are so attached; tayā—by such things; apahṛta-cetasām—bewildered in mind; vyavasāyātmikā—fixed determination; buddhiḥ—devotional service of the Lord; samādhau—in the controlled mind; na—never; vidhīyate—does take place.`,

  {
    n: 45,
    skr: `त्रैगुण्यविषया वेदा निस्त्रैगुण्यो भवार्जुन ।
निर्द्वन्द्वो नित्यसत्त्वस्थो निर्योगक्षेम आत्मवान् ॥ ४५ ॥`,
    tr: `trai-guṇya-viṣayā vedā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nistrai-guṇyo bhavārjuna
nirdvandvo nitya-sattva-stho
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;niryoga-kṣema ātmavān`,
    wbw_en: `traiguṇya—pertaining to the three modes of material nature; viṣayāḥ—on the subject matter; vedāḥ—Vedic literatures; nistraiguṇyaḥ—in a pure state of spiritual existence; bhava—be; arjuna-O Arjuna; nirdvandvaḥ—free from the pains of opposites; nitya-sattva-sthaḥ—ever remaining in sattva (goodness); niryoga-kṣemaḥ—free from (the thought of) acquisition and preservation; ātmavān—established in the Self.`,
    wbw_ru: ``,
    tr_en: `The Vedas mainly deal with the subject of the three modes of material nature. Rise above these modes, O Arjuna. Be transcendental to all of them. Be free from all dualities and from all anxieties for gain and safety, and be established in the Self.`,
    tr_ru: ``,
    pur_en: `All material activities involve actions and reactions in the three modes of material nature. They are meant for fruitive results, which cause bondage in the material world. The Vedas deal mostly with fruitive activities to gradually elevate the general public from the field of sense gratification to a position on the transcendental plane. Arjuna, as a student and friend of Lord Kṛṣṇa, is advised to raise himself to the transcendental position of Vedānta philosophy where, in the beginning, there is brahma-jijñāsā, or questions on the Supreme Transcendence. All the living entities who are in the material world are struggling very hard for existence. For them the Lord, after creation of the material world, gave the Vedic wisdom advising how to live and get rid of the material entanglement. When the activities for sense gratification, namely the karma-kāṇḍa chapter, are finished, then the chance for spiritual realization is offered in the form of the Upaniṣads, which are part of different Vedas, as the Bhagavad-gītā is a part of the fifth Veda, namely the Mahābhārata. The Upaniṣads mark the beginning of transcendental life.
As long as the material body exists, there are actions and reactions in the material modes. One has to learn tolerance in the face of dualities such as happiness and distress, or cold and warmth, and by tolerating such dualities become free from anxieties regarding gain and loss. This transcendental position is achieved in full Kṛṣṇa consciousness when one is fully dependant on the good will of Kṛṣṇa`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/45',
  },
  {
    n: 46,
    skr: `यावानर्थ उदपाने सर्वतः सम्प्लुतोदके ।
तावान्सर्वेषु वेदेषु ब्राह्मणस्य विजानतः ॥ ४६ ॥`,
    tr: `yāvān artha udapāne
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sarvataḥ samplutodake
tāvān sarveṣu vedeṣu
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;brāhmaṇasya vijānataḥ`,
    wbw_en: `yāvān—all that; arthaḥ—is meant; udapāne—in a well of water; sarvataḥ—in all respects; sampluta-udake—in a great reservoir of water; tāvān—similarly; sarveṣu—in all; vedeṣu—Vedic literatures; brāhmaṇasya—of the man who knows the Supreme Brahman; vijānataḥ—of one who is in complete knowledge.`,
    wbw_ru: ``,
    tr_en: `All purposes that are served by the small pond can at once be served by the great reservoirs of water. Similarly, all the purposes of the Vedas can be served to one who knows the purpose behind them.`,
    tr_ru: ``,
    pur_en: `The rituals and sacrifices mentioned in the karma-kāṇḍa division of the Vedic literature are to encourage gradual development of self-realization. And the purpose of self-realization is clearly stated in the Fifteenth Chapter of the Bhagavad-gītā (15.15): the purpose of studying the Vedas is to know Lord Kṛṣṇa, the primeval cause of everything. So, self-realization means understanding Kṛṣṇa and one's eternal relationship with Him. The relationship of the living entities with Kṛṣṇa is also mentioned in the Fifteenth Chapter of Bhagavad-gītā. The living entities are parts and parcels of Kṛṣṇa; therefore, revival of Kṛṣṇa consciousness by the individual living entity is the highest perfectional stage of Vedic knowledge. This is confirmed in the Śrīmad-Bhāgavatam (3.33.7) as follows:
aho bata śvapaco'to garīyān
yaj-jihvāgre vartate nāma tubhyam
tepus tapas te juhuvuḥ sasnur āryā
brahmānūcur nāma gṛṇanti ye te.
"O my Lord, a person who is chanting Your holy name, although born of a low family like that of a cāṇḍāla [dog eater], is situated on the highest platform of self-realization. Such a person must have performed all kinds of penances and sacrifices according to Vedic rituals and studied the Vedic literatures many, many times after taking his bath in all the holy places of pilgrimage. Such a person is considered to be the best of the Āryan family." So one must be intelligent enough to understand the purpose of the Vedas, without being attached to the rituals only, and must not desire to be elevated to the heavenly kingdoms for a better quality of sense gratification. It is not possible for the common man in this age to follow all the rules and regulations of the Vedic rituals and the injunctions of the Vedāntas and the Upaniṣads. It requires much time, energy, knowledge and resources to execute the purposes of the Vedas. This is hardly possible in this age. The best purpose of Vedic culture is served, however, by chanting the holy name of the Lord, as recommended by Lord Caitanya, the deliverer of all fallen souls. When Lord Caitanya was asked by a great Vedic scholar, Prakāśānanda Sarasvatī, why He, the Lord, was chanting the holy name of the Lord like a sentimentalist instead of studying Vedānta philosophy, the Lord replied that His spiritual master found Him to be a great fool, and thus he asked Him to chant the holy name of Lord Kṛṣṇa. He did so, and became ecstatic like a madman. In this age of Kali, most of the population is foolish and not adequately educated to understand Vedānta philosophy; the best purpose of Vedānta philosophy is served by inoffensively chanting the holy name of the Lord. Vedānta is the last word in Vedic wisdom, and the author and knower of the Vedānta philosophy is Lord Kṛṣṇa; and the highest Vedantist is the great soul who takes pleasure in chanting the holy name of the Lord. That is the ultimate purpose of all Vedic mysticism.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/46',
  },
  {
    n: 47,
    skr: `कर्मण्येवाधिकारस्ते मा फलेषु कदाचन ।
मा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि ॥ ४७ ॥`,
    tr: `karmaṇy evādhikāras te
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mā phaleṣu kadācana
mā karma-phala-hetur bhūr
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mā te saṅgo 'stv akarmaṇi`,
    wbw_en: `karmaṇi—prescribed duties; eva—certainly; adhikāraḥ—right; te-of you; mā—never; phaleṣu—in the fruits; kadācana—at any time; mā—never; karma-phala—in the result of the work; hetuḥ—cause; bhūḥ—become; mā—never; te—of you; saṅgaḥ—attachment; astu—be there; akarmaṇi—in not doing.`,
    wbw_ru: ``,
    tr_en: `You have a right to perform your prescribed duty, but you are not entitled to the fruits of action. Never consider yourself to be the cause of the results of your activities, and never be attached to not doing your duty.`,
    tr_ru: ``,
    pur_en: `There are three considerations here: prescribed duties, capricious work, and inaction. Prescribed duties refer to activities performed while one is in the modes of material nature. Capricious work means actions without the sanction of authority, and inaction means not performing one's prescribed duties. The Lord advised that Arjuna not be inactive, but that he perform his prescribed duty without being attached to the result. One who is attached to the result of his work is also the cause of the action. Thus he is the enjoyer or sufferer of the result of such actions.
As far as prescribed duties are concerned, they can be fitted into three subdivisions, namely routine work, emergency work and desired activities. Routine work, in terms of the scriptural injunctions, is done without desire for results. As one has to do it, obligatory work is action in the mode of goodness. Work with results becomes the cause of bondage; therefore such work is not auspicious. Everyone has his proprietory right in regard to prescribed duties, but should act without attachment to the result; such disinterested obligatory duties doubtlessly lead one to the path of liberation.
Arjuna was therefore advised by the Lord to fight as a matter of duty without attachment to the result. His nonparticipation in the battle is another side of attachment. Such attachment never leads one to the path of salvation. Any attachment, positive or negative, is cause for bondage. Inaction is sinful. Therefore, fighting as a matter of duty was the only auspicious path of salvation for Arjuna.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/47',
  },
  {
    n: 48,
    skr: `योगस्थः कुरु कर्माणि सङ्गं त्यक्त्वा धनञ्जय ।
सिद्ध्यसिद्ध्योः समो भूत्वा समत्वं योग उच्यते ॥ ४८ ॥`,
    tr: `yoga-sthaḥ kuru karmāṇi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;saṅgaṁ tyaktvā dhanañjaya
siddhy-asiddhyoḥ samo bhūtvā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;samatvaṁ yoga ucyate`,
    wbw_en: `yoga-sthaḥ—steadfast in yoga; kuru—perform; karmāṇi—your duty; saṅgam—attachment; tyaktvā—having abandoned; dhanañjaya—O Dhanañjaya; siddhi-asiddhyoḥ—in success and failure; samaḥ—the same; bhūtvā—having become; samatvam—evenness of mind; yogaḥ-yoga; ucyate—is called.`,
    wbw_ru: ``,
    tr_en: `Be steadfast in yoga, O Arjuna. Perform your duty and abandon all attachment to success or failure. Such evenness of mind is called yoga.`,
    tr_ru: ``,
    pur_en: `Kṛṣṇa tells Arjuna that he should act in yoga. And what is that yoga? Yoga means to concentrate the mind upon the Supreme by controlling the ever-disturbing senses. And who is the Supreme? The Supreme is the Lord. And because He Himself is telling Arjuna to fight, Arjuna has nothing to do with the results of the fight. Gain or victory are Kṛṣṇa's concern; Arjuna is simply advised to act according to the dictation of Kṛṣṇa. The following of Kṛṣṇa's dictation is real yoga, and this is practiced in the process called Kṛṣṇa consciousness. By Kṛṣṇa consciousness only can one give up the sense of proprietorship. One has to become the servant of Kṛṣṇa, or the servant of the servant of Kṛṣṇa. That is the right way to discharge duty in Kṛṣṇa consciousness, which alone can help one to act in yoga.
Arjuna is a kṣatriya, and as such he is participating in the varṇāśrama-dharma institution. It is said in the Viṣṇu Puraṇa that in the varṇāśrama-dharma, the whole aim is to satisfy Viṣṇu. No one should satisfy himself, as is the rule in the material world, but one should satisfy Kṛṣṇa. So, unless one satisfies Kṛṣṇa, one cannot correctly observe the principles of varṇāśrama-dharma. Indirectly, Arjuna was advised to act as Kṛṣṇa told him.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/48',
  },
  {
    n: 49,
    skr: `दूरेण ह्यवरं कर्म बुद्धियोगाद्धनञ्जय ।
बुद्धौ शरणमन्विच्छ कृपणाः फलहेतवः ॥ ४९ ॥`,
    tr: `dūreṇa hy avaraṁ karma
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;buddhi-yogād dhanañjaya
buddhau śaraṇam anviccha
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kṛpaṇāḥ phala-hetavaḥ`,
    wbw_en: `dūreṇa—by discarding it at a long distance; hi—certainly; avaram—abominable; karma—activities; buddhi-yogāt—on the strength of Kṛṣṇa consciousness; dhanañjaya—O conqueror of wealth; buddhau—in such consciousness; śaraṇam—full surrender; anviccha—desire; kṛpaṇāḥ—the misers; phala-hetavaḥ—those desiring fruitive action.`,
    wbw_ru: ``,
    tr_en: `O Dhanañjaya, rid yourself of all fruitive activities by devotional service, and surrender fully to that consciousness. Those who want to enjoy the fruits of their work are misers.`,
    tr_ru: ``,
    pur_en: `One who has actually come to understand one's constitutional position as the eternal servitor of the Lord gives up all engagements save working in Kṛṣṇa consciousness. As already explained, buddhi-yoga means transcendental loving service to the Lord. Such devotional service is the right course of action for the living entity. Only misers desire to enjoy the fruit of their own work just to be further entangled in material bondage. Except for work in Kṛṣṇa consciousness, all activities are abominable because they continually bind the worker to the cycle of birth and death. One should therefore never desire to be the cause of work. Everything should be done in Kṛṣṇa consciousness for the satisfaction of Kṛṣṇa. Misers do not know how to utilize the assets of riches which they acquire by good fortune or by hard labor. One should spend all energies working in Kṛṣṇa consciousness, and that will make one's life successful. Like the misers, unfortunate persons do not employ their human energy in the service of the Lord.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/49',
  },
  {
    n: 50,
    skr: `बुद्धियुक्तो जहातीह उभे सुकृतदुष्कृते ।
तस्माद्योगाय युज्यस्व योगः कर्मसु कौशलम् ॥ ५० ॥`,
    tr: `buddhi-yukto jahātīha
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ubhe sukṛta-duṣkṛte
tasmād yogāya yujyasva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yogaḥ karmasu kauśalam`,
    wbw_en: `buddhi-yuktaḥ—one who is engaged in devotional service; jahāti—can get rid of; iha—in this life; ubhe—in both; sukṛta-duṣkṛte—in good and bad results; tasmāt—therefore; yogāya—for the sake of devotional service; yujyasva—be so engaged; yogaḥ—Kṛṣṇa consciousness; karmasu—in all activities; kauśalam—art.`,
    wbw_ru: ``,
    tr_en: `A man engaged in devotional service rids himself of both good and bad actions even in this life. Therefore strive for yoga, O Arjuna, which is the art of all work.`,
    tr_ru: ``,
    pur_en: `Since time immemorial each living entity has accumulated the various reactions of his good and bad work, As such, he is continuously ignorant of his real constitutional position. One's ignorance can be removed by the instruction of the Bhagavad-gītā which teaches one to surrender unto Lord Śrī Kṛṣṇa in all respects and become liberated from the chained victimization of action and reaction, birth after birth. Arjuna is therefore advised to act in Kṛṣṇa consciousness, the purifying process of resultant action.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/50',
  },
  {
    n: 51,
    skr: `कर्मजं बुद्धियुक्ता हि फलं त्यक्त्वा मनीषिणः ।
जन्मबन्धविनिर्मुक्ताः पदं गच्छन्त्यनामयम् ॥ ५१ ॥`,
    tr: `karma-jaṁ buddhi-yuktā hi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;phalaṁ tyaktvā manīṣiṇaḥ
janma-bandha-vinirmuktāḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;padaṁ gacchanty anāmayam`,
    wbw_en: `karma-jam—because of fruitive activities; buddhi-yuktāḥ—being done in devotional service; hi—certainly; phalam—results; tyaktvā—giving up; manīṣiṇaḥ—devotees who are great sages; janma-bandha—the bondage of birth and death; vinirmuktāḥ—liberated souls; padam—position; gacchanti—reach; anāmayam—without miseries.`,
    wbw_ru: ``,
    tr_en: `The wise, engaged in devotional service, take refuge in the Lord, and free themselves from the cycle of birth and death by renouncing the fruits of action in the material world. In this way they can attain that state beyond all miseries.`,
    tr_ru: ``,
    pur_en: `The liberated living entities seek that place where there are no material miseries. The Bhāgavatam says:
samāśritā ye padapallava-plavaṁ
mahat-padaṁ puṇya-yaśo murāreḥ
bhāvambudhir vatsa-padaṁ paraṁ padaṁ
paraṁ padaṁ yad vipadāṁ na teṣām
(Bhāg. 10.14.58)
"For one who has accepted the boat of the lotus feet of the Lord, who is the shelter of the cosmic manifestation and is famous as Mukunda or the giver of mukti, the ocean of the material world is like the water contained in a calf's hoofprint. Param padam, or the place where there are no material miseries, or Vaikuṇṭha, is his goal, not the place where there is danger in every step of life."
