Owing to ignorance, one does not know that this material world is a miserable place where there are dangers at every step. Out of ignorance only, less intelligent persons try to adjust to the situation by fruitive activities, thinking that resultant actions will make them happy. They do not know that no kind of material body anywhere within the universe can give life without miseries. The miseries of life, namely birth, death, old age and diseases, are present everywhere within the material world. But one who understands his real constitutional position as the eternal servitor of the Lord, and thus knows the position of the Personality of Godhead, engages himself in the transcendental loving service of the Lord. Consequently he becomes qualified to enter into the Vaikuṇṭha planets, where there is neither material, miserable life, nor the influence of time and death. To know one's constitutional position means to know also the sublime position of the Lord. One who wrongly thinks that the living entity's position and the Lord's position are on the same level is to be understood to be in darkness and therefore unable to engage himself in the devotional service of the Lord. He becomes a lord himself and thus paves the way for the repetition of birth and death. But one who, understanding that his position is to serve, transfers himself to the service of the Lord, at once becomes eligible for Vaikuṇṭhaloka. Service for the cause of the Lord is called karma-yoga or buddhi-yoga, or in plain words, devotional service to the Lord.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/51',
  },
  {
    n: 52,
    skr: `यदा ते मोहकलिलं बुद्धिर्व्यतितरिष्यति ।
तदा गन्तासि निर्वेदं श्रोतव्यस्य श्रुतस्य च ॥ ५२ ॥`,
    tr: `yadā te moha-kalilaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;buddhir vyatitariṣyati
tadā gantāsi nirvedaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śrotavyasya śrutasya ca`,
    wbw_en: `yadā—when; te—your; moha—illusory; kalilam—dense forest; buddhiḥ—transcendental service with intelligence; vyatitariṣyati—surpasses; tadā—at that time; gantāsi—you shall go; nirvedam—callousness; śrotavyasya—all that is to be heard; śrutasya—all that is already heard; ca—also.`,
    wbw_ru: ``,
    tr_en: `When your intelligence has passed out of the dense forest of delusion, you shall become indifferent to all that has been heard and all that is to be heard.`,
    tr_ru: ``,
    pur_en: `There are many good examples in the lives of the great devotees of the Lord of those who became indifferent to the rituals of the Vedas simply by devotional service to the Lord. When a person factually understands Kṛṣṇa and his relationship with Kṛṣṇa, he naturally becomes completely indifferent to the rituals of fruitive activities, even though an experienced brāhmaṇa. Śrī Mādhavendra Purī, a great devotee and ācārya in the line of the devotees, says:
sandhyā-vandana bhadram astu bhavato bhoḥ snāna tubhyaṁ namo
bho devāḥ pitaraś ca tarpaṇa-vidhau nāhaṁ kṣamaḥ kṣamyatām
yatra kvāpi niṣadya yādava-kulottamasya kaṁsa-dviṣaḥ
smāraṁ smāram aghaṁ harāmi tad alaṁ manye kim anyena me.
"O Lord, in my prayers three times a day, all glory to You. Bathing, I offer my obeisances unto You. O demigods! O forefathers! Please excuse me for my inability to offer you my respects. Now wherever I sit, I can remember the great descendant of the Yadu dynasty [Kṛṣṇa], the enemy of Kaṁsa, and thereby I can free myself from all sinful bondage. I think this is sufficient for me."
The Vedic rites and rituals are imperative for neophytes: comprehending all kinds of prayer three times a day, taking a bath early in the morning, offering respects to the forefathers, etc. But, when one is fully in Kṛṣṇa consciousness and is engaged in His transcendental loving service, one becomes indifferent to all these regulative principles because he has already attained perfection. If one can reach the platform of understanding by service to the Supreme Lord Kṛṣṇa, he has no longer to execute different types of penances and sacrifices as recommended in revealed scriptures. And, similarly, if one has not understood that the purpose of the Vedas is to reach Kṛṣṇa and simply engages in the rituals, etc., then he is uselessly wasting time in such engagements. Persons in Kṛṣṇa consciousness transcend the limit of śabda-brahma, or the range of the Vedas and Upaniṣads.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/52',
  },
  {
    n: 53,
    skr: `श्रुतिविप्रतिपन्ना ते यदा स्थास्यति निश्चला ।
समाधावचला बुद्धिस्तदा योगमवाप्स्यसि ॥ ५३ ॥`,
    tr: `śruti-vipratipannā te
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yadā sthāsyati niścalā
samādhāv acalā buddhis
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tadā yogam avāpsyasi`,
    wbw_en: `śruti—Vedic revelation; vipratipannā—without being influenced by the fruitive results of the Vedas; te—your; yadā—when; sthāsyati—remains; niścalā—unmoved; samādhau—in transcendental consciousness, or Kṛṣṇa consciousness; acalā—unflinching; buddhiḥ—intelligence; tadā—at that time; yogam—self-realization; avāpsyasi—you will achieve.`,
    wbw_ru: ``,
    tr_en: `When your mind is no longer disturbed by the flowery language of the Vedas, and when it remains fixed in the trance of self-realization, then you will have attained the Divine consciousness.`,
    tr_ru: ``,
    pur_en: `To say that one is in samādhi is to say that one has fully realized Kṛṣṇa consciousness; that is, one in full samādhi has realized Brahman, Paramātmā and Bhagavān. The highest perfection of self-realization is to understand that one is eternally the servitor of Kṛṣṇa and that one's only business is to discharge one's duties in Kṛṣṇa consciousness. A Kṛṣṇa conscious person, or unflinching devotee of the Lord, should not be disturbed by the flowery language of the Vedas nor be engaged in fruitive activities for promotion to the heavenly kingdom. In Kṛṣṇa consciousness, one comes directly into communion with Kṛṣṇa, and thus all directions from Kṛṣṇa may be understood in that transcendental state. One is sure to achieve results by such activities and attain conclusive knowledge. One has only to carry out the orders of Kṛṣṇa or His representative, the spiritual master.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/53',
  },
  {
    n: 54,
    skr: `अर्जुन उवाच ।
स्थितप्रज्ञस्य का भाषा समाधिस्थस्य केशव ।
स्थितधीः किं प्रभाषेत किमासीत व्रजेत किम् ॥ ५४ ॥`,
    tr: `arjuna uvāca
sthita-prajñasya kā bhāṣā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;samādhi-sthasya keśava
sthita-dhīḥ kiṁ prabhāṣeta
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kim āsīta vrajeta kim`,
    wbw_en: `arjuna uvāca—Arjuna said; sthita-prajñasya—of one who is situated in fixed Kṛṣṇa consciousness; kā—what; bhāṣā—language; samādhi-sthasya—of one situated in trance; keśava—O Kṛṣṇa; sthita-dhīḥ—one fixed in Kṛṣṇa consciousness; kim—what; prabhāṣeta—speak; kim—how; āsīta—does remain; vrajeta—walk; kim—how.`,
    wbw_ru: ``,
    tr_en: `Arjuna said: What are the symptoms of one whose consciousness is thus merged in Transcendence? How does he speak, and what is his language? How does he sit, and how does he walk?`,
    tr_ru: ``,
    pur_en: `As there are symptoms for each and every man, in terms of his particular situation, similarly one who is Kṛṣṇa conscious has his particular nature—talking, walking, thinking, feeling, etc. As a rich man has his symptoms by which he is known as a rich man, as a diseased man has his symptoms, by which he is known as diseased, or as a learned man has his symptoms, so a man in transcendental consciousness of Kṛṣṇa has specific symptoms in various dealings. One can know his specific symptoms from the Bhagavad-gītā. Most important is how the man in Kṛṣṇa consciousness speaks, for speech is the most important quality of any man. It is said that a fool is undiscovered as long as he does not speak, and certainly a well-dressed fool cannot be identified unless he speaks, but as soon as he speaks, he reveals himself at once. The immediate symptom of a Kṛṣṇa conscious man is that he speaks only of Kṛṣṇa and of matters relating to Him. Other symptoms then automatically follow, as stated below.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/54',
  },
  {
    n: 55,
    skr: `श्रीभगवानुवाच ।
प्रजहाति यदा कामान्सर्वान्पार्थ मनोगतान् ।
आत्मन्येवात्मना तुष्टः स्थितप्रज्ञस्तदोच्यते ॥ ५५ ॥`,
    tr: `śrī-bhagavān uvāca
prajahāti yadā kāmān
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sarvān pārtha mano-gatān
ātmany evātmanā tuṣṭaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sthita-prajñas tadocyate`,
    wbw_en: `śrī bhagavān uvāca—the Supreme Personality of Godhead said; prajahāti—gives up; yadā—when; kāmān—desires for sense gratification; sarvān—of all varieties; pārtha—O son of Pṛthā; manaḥ-gatān—of mental concoction; ātmani—in the pure state of the soul; eva—certainly; ātmanā—by the purified mind; tuṣṭaḥ—satisfied; sthita-prajñaḥ—transcendentally situated; tadā—at that time; ucyate—is said.`,
    wbw_ru: ``,
    tr_en: `The Blessed Lord said: O Pārtha, when a man gives up all varieties of sense desire which arise from mental concoction, and when his mind finds satisfaction in the self alone, then he is said to be in pure transcendental consciousness.`,
    tr_ru: ``,
    pur_en: `The Bhāgavatam affirms that any person who is fully in Kṛṣṇa consciousness, or devotional service of the Lord, has all the good qualities of the great sages, whereas a person who is not so transcendentally situated has no good qualifications, because he is sure to be taking refuge in his own mental concoctions. Consequently, it is rightly said herein that one has to give up all kinds of sense desire manufactured by mental concoction. Artificially, such sense desires cannot be stopped. But if one is engaged in Kṛṣṇa consciousness, then, automatically, sense desires subside without extraneous efforts. Therefore, one has to engage himself in Kṛṣṇa consciousness without hesitation, for this devotional service will instantly help one on to the platform of transcendental consciousness. The highly developed soul always remains satisfied in himself by realizing himself as the eternal servitor of the Supreme Lord. Such a transcendentally situated person has no sense desires resulting from petty materialism; rather, he remains always happy in his natural position of eternally serving the Supreme Lord.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/55',
  },
  {
    n: 56,
    skr: `दुःखेष्वनुद्विग्नमनाः सुखेषु विगतस्पृहः ।
वीतरागभयक्रोधः स्थितधीर्मुनिरुच्यते ॥ ५६ ॥`,
    tr: `duḥkheṣv anudvigna-manāḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sukheṣu vigata-spṛhaḥ
vīta-rāga-bhaya-krodhaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sthita-dhīr munir ucyate`,
    wbw_en: `duḥkheṣu—in the threefold miseries; anudvigna-manāḥ—without being agitated in mind; sukheṣu—in happiness; vigata-spṛhaḥ—without being too interested; vīta—free from; rāga—attachment; bhaya—fear; krodhaḥ—anger; sthita-dhīḥ—one who is steady; muniḥ—sage; ucyate—is called.`,
    wbw_ru: ``,
    tr_en: `One who is not disturbed in spite of the threefold miseries, who is not elated when there is happiness, and who is free from attachment, fear and anger, is called a sage of steady mind.`,
    tr_ru: ``,
    pur_en: `The word muni means one who can agitate his mind in various ways for mental speculation without coming to a factual conclusion. It is said that every muni has a different angle of vision, and unless a muni differs from other munis, he cannot be called a muni in the strict sense of the term. Nāsau munir yasya mataṁ na binnam. But a sthita-dhī-muni as mentioned herein by the Lord, is different from an ordinary muni The sthita-dhī-muni is always in Kṛṣṇa consciousness, for he has exhausted all his business of creative speculation. He has surpassed the stage of mental speculations and has come to the conclusion that Lord Śrī Kṛṣṇa, or Vāsudeva, is everything. He is called a muni fixed in mind. Such a fully Kṛṣṇa conscious person is not at all disturbed by the onslaughts of the threefold miseries, for he accepts all miseries as the mercy of the Lord, thinking himself only worthy of more trouble due to his past misdeeds; and he sees that his miseries, by the grace of the Lord, are minimized to the lowest. Similarly, when he is happy he gives credit to the Lord, thinking himself unworthy of the happiness; he realizes that it is due only to the Lord's grace that he is in such a comfortable condition and able to render better service to the Lord. And, for the service of the Lord, he is always daring and active and is not influenced by attachment or aversion. Attachment means accepting things for one's own sense gratification, and detachment is the absence of such sensual attachment. But one fixed in Kṛṣṇa consciousness has neither attachment nor detachment because his life is dedicated in the service of the Lord. Consequently he is not at all angry even when his attempts are unsuccessful. A Kṛṣṇa conscious person is always steady in his determination.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/56',
  },
  {
    n: 57,
    skr: `यः सर्वत्रानभिस्नेहस्तत्तत्प्राप्य शुभाशुभम् ।
नाभिनन्दति न द्वेष्टि तस्य प्रज्ञा प्रतिष्ठिता ॥ ५७ ॥`,
    tr: `yaḥ sarvatrānabhisnehas
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tat tat prāpya śubhāśubham
nābhinandati na dveṣṭi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tasya prajñā pratiṣṭhitā`,
    wbw_en: `yaḥ—one who; sarvatra—everywhere; anabhisnehaḥ—without affection; tat—that; tat—that; prāpya—achieving; śubha—good; aśubham—evil; na—never; abhinandati—prays; na—never; dveṣṭi—envies; tasya—his; prajñā—perfect knowledge; pratiṣṭhita—fixed.`,
    wbw_ru: ``,
    tr_en: `He who is without attachment, who does not rejoice when he obtains good, nor lament when he obtains evil, is firmly fixed in perfect knowledge.`,
    tr_ru: ``,
    pur_en: `There is always some upheaval in the material world which may be good or evil. One who is not agitated by such material upheavals, who is unaffected by good and evil, is to be understood to be fixed in Kṛṣṇa consciousness. As long as one is in the material world there is always the possibility of good and evil because this world is full of duality. But one who is fixed in Kṛṣṇa consciousness is not affected by good and evil because he is simply concerned with Kṛṣṇa, who is all good absolute. Such consciousness in Kṛṣṇa situates one in a perfect transcendental position called, technically, samādhi.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/57',
  },
  {
    n: 58,
    skr: `यदा संहरते चायं कूर्मोऽङ्गानीव सर्वशः ।
इन्द्रियाणीन्द्रियार्थेभ्यस्तस्य प्रज्ञा प्रतिष्ठिता ॥ ५८ ॥`,
    tr: `yadā saṁharate cāyaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kūrmo 'ṅgānīva sarvaśaḥ
indriyāṇīndriyārthebhyas
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tasya prajñā pratiṣṭhitā`,
    wbw_en: `yadā—when; saṁharate—winds up; ca—also; ayam—all these; kūrmaḥ—tortoise; aṅgāni—limbs; iva—like; sarvaśaḥ—altogether; indriyāni—senses; indriya-arthebhyaḥ—from the sense objects; tasya—his; prajñā—consciousness; pratiṣṭhitā—fixed up.`,
    wbw_ru: ``,
    tr_en: `One who is able to withdraw his senses from sense objects, as the tortoise draws his limbs within the shell, is to be understood as truly situated in knowledge.`,
    tr_ru: ``,
    pur_en: `The test of a yogī, devotee, or self-realized soul is that he is able to control the senses according to his plan. Most people, however, are servants of the senses and are thus directed by the dictation of the senses. That is the answer to the question as to how the yogī is situated. The senses are compared to venomous serpents. They want to act very loosely and without restriction. The yogī, or the devotee, must be very strong to control the serpents—like a snake charmer. He never allows them to act independantly. There are many injunctions in the revealed scriptures; some of them are do-not's, and some of them are do's. Unless one is able to follow the do's and the do-not's, restricting oneself from sense enjoyment, it is not possible to be firmly fixed in Kṛṣṇa consciousness. The best example, set herein, is the tortoise. The tortoise can at any moment wind up his senses and exhibit them again at any time for particular purposes. Similarly, the senses of the Kṛṣṇa conscious persons are used only for some particular purpose in the service of the Lord and are withdrawn otherwise. Keeping the senses always in the service of the Lord is the example set by the analogy of the tortoise, who keeps the senses within.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/58',
  },
  {
    n: 59,
    skr: `विषया विनिवर्तन्ते निराहारस्य देहिनः ।
रसवर्जं रसोऽप्यस्य परं दृष्ट्वा निवर्तते ॥ ५९ ॥`,
    tr: `viṣayā vinivartante
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nirāhārasya dehinaḥ
rasa-varjaṁ raso 'py asya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;paraṁ dṛṣṭvā nivartate`,
    wbw_en: `viṣayāḥ—objects for sense enjoyment; vinivartante—are practiced to be refrained from; nirāhārasya—by negative restrictions; dehinaḥ—for the embodied; rasa-varjam—giving up the taste; rasaḥ—sense of enjoyment; api—although there is; asya—his; param—far superior things; dṛṣṭvā—by experiencing; nivartate—ceases from.`,
    wbw_ru: ``,
    tr_en: `The embodied soul may be restricted from sense enjoyment, though the taste for sense objects remains. But, ceasing such engagements by experiencing a higher taste, he is fixed in consciousness.`,
    tr_ru: ``,
    pur_en: `Unless one is transcendentally situated, it is not possible to cease from sense enjoyment. The process of restriction from sense enjoyment by rules and regulations is something like restricting a diseased person from certain types of eatables. The patient, however, neither likes such restrictions, nor loses his taste for eatables. Similarly, sense restriction by some spiritual process like aṣṭāṅga-yoga, in the matter of yama, niyama, āsana, prāṇāyāma, pratyāhāra, dharaṇā, dhyāna, etc., is recommended for less intelligent persons who have no better knowledge. But one who has tasted the beauty of the Supreme Lord Kṛṣṇa, in the course of his advancement in Kṛṣṇa consciousness, no longer has a taste for dead material things. Therefore, restrictions are there for the less intelligent neophytes in the spiritual advancement of life, but such restrictions are only good if one actually has a taste for Kṛṣṇa consciousness. When one is actually Kṛṣṇa conscious, he automatically loses his taste for pale things.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/59',
  },
  {
    n: 60,
    skr: `यततो ह्यपि कौन्तेय पुरुषस्य विपश्चितः ।
इन्द्रियाणि प्रमाथीनि हरन्ति प्रसभं मनः ॥ ६० ॥`,
    tr: `yatato hy api kaunteya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;puruṣasya vipaścitaḥ
indriyāṇi pramāthīni
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;haranti prasabhaṁ manaḥ`,
    wbw_en: `yatataḥ—while endeavoring; hi—certainly; api—in spite of; kaunteya—O son of Kuntī; puruṣasya—of the man; vipaścitaḥ—full of discriminating knowledge; indriyāṇi—the senses; pramāthīni—stimulated; haranti—throws forcefully; prasabhaṁ—by force; manaḥ—the mind.`,
    wbw_ru: ``,
    tr_en: `The senses are so strong and impetuous, O Arjuna, that they forcibly carry away the mind even of a man of discrimination who is endeavoring to control them.`,
    tr_ru: ``,
    pur_en: `There are many learned sages, philosophers and transcendentalists who try to conquer the senses, but in spite of their endeavors, even the greatest of them sometimes fall victim to material sense enjoyment due to the agitated mind. Even Viśvāmitra, a great sage and perfect yogī, was misled by Menakā into sex enjoyment, although the yogī was endeavoring for sense control with severe types of penance and yoga practice. And, of course, there are so many similar instances in the history of the world. Therefore, it is very difficult to control the mind and the senses without being fully Kṛṣṇa conscious. Without engaging the mind in Kṛṣṇa, one cannot cease such material engagements. A practical example is given by Śrī Yāmunācārya, a great saint and devotee, who says: "Since my mind has been engaged in the service of the lotus feet of Lord Kṛṣṇa, and I have been enjoying an ever new transcendental humor, whenever I think of sex life with a woman, my face at once turns from it, and I spit at the thought."
Kṛṣṇa consciousness is such a transcendentally nice thing that automatically material enjoyment becomes distasteful. It is as if a hungry man had satisfied his hunger by a sufficient quantity of nutritious eatables. Mahārāja Ambarīṣa also conquered a great yogī, Durvāsā Muni, simply because his mind was engaged in Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/60',
  },
  {
    n: 61,
    skr: `तानि सर्वाणि संयम्य युक्त आसीत मत्परः ।
वशे हि यस्येन्द्रियाणि तस्य प्रज्ञा प्रतिष्ठिता ॥ ६१ ॥`,
    tr: `tāni sarvāṇi saṁyamya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yukta āsīta mat-paraḥ
vaśe hi yasyendriyāṇi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tasya prajñā pratiṣṭhitā`,
    wbw_en: `tāni—those senses; sarvāṇi—all; saṁyamya—keeping under control; yuktaḥ—being engaged; āsīta—being so situated; mat-paraḥ—in relationship with Me; vaśe—in full subjugation; hi—certainly; yasya—one whose; indriyāṇi—senses; tasya—his; prajñā—consciousness; pratiṣṭhitā—fixed.`,
    wbw_ru: ``,
    tr_en: `One who restrains his senses and fixes his consciousness upon Me is known as a man of steady intelligence.`,
    tr_ru: ``,
    pur_en: `That the highest conception of yoga perfection is Kṛṣṇa consciousness is clearly explained in this verse. And, unless one is Kṛṣṇa conscious, it is not at all possible to control the senses. As cited above, the great sage Durvāsā Muni picked a quarrel with Mahārāja Ambarīṣa, and Durvāsā Muni unnecessarily became angry out of pride and therefore could not check his senses. On the other hand, the King, although not as powerful a yogī as the sage, but a devotee of the Lord, silently tolerated all the sage's injustices and thereby emerged victorious. The King was able to control his senses because of the following qualifications, as mentioned in the Śrīmad-Bhāgavatam:
sa vai manaḥ kṛṣṇa-padāravindayor
vacāṁsi vaikuṇṭha-guṇānavarṇane
karau harer mandira-mārjanādiṣu
śrutiṁ cakārācyuta-sat-kathodaye
mukunda-liṅgālaya-darśane dṛśau
tad-bhṛtya-gātra-sparśe'ṅga-saṅgamam
ghrāṇaṁ ca tat-pāda-saroja-saurabhe
śrīmat-tulasyā rasanāṁ tad-arpite
pādau hareḥ kṣetra-padānusarpaṇe
śiro hṛṣīkeśa-padābhivandane
kāmaṁ ca dāsye na tu kāma-kāmyayā
yathottamaśloka-janāśrayā ratiḥ
"King Ambarīṣa fixed his mind on the lotus feet of Lord Kṛṣṇa, engaged his words in describing the abode of the Lord, his hands in cleansing the temple of the Lord, his ears in hearing the pastimes of the Lord, his eyes in seeing the form of the Lord, his body in touching the body of the devotee, his nostrils in smelling the flavor of the flowers offered to the lotus feet of the Lord, his tongue in tasting the tulasī leaves offered to Him, his legs in traveling to the holy place where His temple is situated, his head in offering obeisances unto the Lord, and his desires in fulfilling the desires of the Lord...and all these qualifications made him fit to become a mat-paraḥ devotee of the Lord." (Bhāg. 9.4.18-20)
The word mat-paraḥ is most significant in this connection. How one can become a mat-paraḥ is described in the life of Mahārāja Ambarīṣa. Śrīla Baladeva Vidyābhūṣaṇa, a great scholar and ācārya in the line of the mat-paraḥ, remarks: "mad-bhakti-prabhāvena sarvendriya-vijaya-pūrvikā svātma dṛṣṭiḥ sulabheti bhāvaḥ." "The senses can be completely controlled only by the strength of devotional service to Kṛṣṇa." Also the example of fire is sometimes given: "As the small flames within burn everything within the room, similarly Lord Viṣṇu, situated in the heart of the yogī, burns up all kinds of impurities." The Yoga-sūtra also prescribes meditation on Viṣṇu, and not meditation on the void. The so-called yogīs who meditate on something which is not the Viṣṇu form simply waste their time in a vain search after some phantasmagoria. We have to be Kṛṣṇa conscious—devoted to the Personality of Godhead. This is the aim of the real yoga.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/61',
  },
  {
    n: 62,
    skr: `ध्यायतो विषयान्पुंसः सङ्गस्तेषूपजायते ।
सङ्गात्सञ्जायते कामः कामात्क्रोधोऽभिजायते ॥ ६२ ॥`,
    tr: `dhyāyato viṣayān puṁsaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;saṅgas teṣūpajāyate
saṅgāt sañjāyate kāmaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kāmāt krodho 'bhijāyate`,
    wbw_en: `dhyayataḥ—while contemplating; viṣayān—sense objects; puṁsaḥ—of the person; saṅgaḥ—attachment; teṣu—in the sense objects; upajāyate—develops; saṅgāt—attachment; sañjāyate—develops; kāmaḥ—desire; kāmāt—from desire; krodhaḥ—anger; abhijāyate—becomes manifest.`,
    wbw_ru: ``,
    tr_en: `While contemplating the objects of the senses, a person develops attachment for them, and from such attachment lust develops, and from lust anger arises.`,
    tr_ru: ``,
    pur_en: `One who is not Kṛṣṇa conscious is subjected to material desires while contemplating the objects of senses. The senses require real engagements, and if they are not engaged in the transcendental loving service of the Lord, they will certainly seek engagement in the service of materialism. In the material world everyone, including Lord Śiva and Lord Brahmā—to say nothing of other demigods in the heavenly planets—is subjected to the influence of sense objects, and the only method to get out of this puzzle of material existence is to become Kṛṣṇa conscious. Lord Śiva was deep in meditation, but when Pārvatī agitated him for sense pleasure, he agreed to the proposal, and as a result Kārtikeya was born. When Haridāsa Ṭhākur was a young devotee of the Lord, he was similarly allured by the incarnation of Māyā Devī, but Haridāsa easily passed the test because of his unalloyed devotion to Lord Kṛṣṇa. As illustrated in the above-mentioned verse of Śrī Yāmunācārya, a sincere devotee of the Lord shuns all material sense enjoyment due to his higher taste for spiritual enjoyment in the association of the Lord. That is the secret of success. One who is not, therefore, in Kṛṣṇa consciousness, however powerful he may be in controlling the senses by artificial repression, is sure ultimately to fail, for the slightest thought of sense pleasure will agitate him to gratify his desires.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/62',
  },
  {
    n: 63,
    skr: `क्रोधाद्भवति सम्मोहः सम्मोहात्स्मृतिविभ्रमः ।
स्मृतिभ्रंशाद् बुद्धिनाशो बुद्धिनाशात्प्रणश्यति ॥ ६३ ॥`,
    tr: `krodhād bhavati sammohaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sammohāt smṛti-vibhramaḥ
smṛti-bhraṁśād buddhi-nāśo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;buddhi-nāśāt praṇaśyati`,
    wbw_en: `krodhāt—from anger; bhavati—takes place; saṁmohaḥ—perfect illusion; saṁmohāt—from illusion; smṛti—of memory; vibhramaḥ—bewilderment; smṛti-bhraṁśāt—after bewilderment of memory; buddhi-nāśaḥ—loss of intelligence; buddhi-nāśāt—and from loss of intelligence; praṇaśyati—falls down.`,
    wbw_ru: ``,
    tr_en: `From anger, delusion arises, and from delusion bewilderment of memory. When memory is bewildered, intelligence is lost, and when intelligence is lost, one falls down again into the material pool.`,
    tr_ru: ``,
    pur_en: `By development of Kṛṣṇa consciousness one can know that everything has its use in the service of the Lord. Those who are without knowledge of Kṛṣṇa consciousness artificially try to avoid material objects, and as a result, although they desire liberation from material bondage, they do not attain to the perfect stage of renunciation. On the other hand, a person in Kṛṣṇa consciousness knows how to use everything in the service of the Lord; therefore he does not become a victim of material consciousness. For example, for an impersonalist, the Lord, or the Absolute, being impersonal, cannot eat. Whereas an impersonalist tries to avoid good eatables, a devotee knows that Kṛṣṇa is the supreme enjoyer and that He eats all that is offered to Him in devotion. So, after offering good eatables to the Lord, the devotee takes the remnants, called prasādam. Thus everything becomes spiritualized and there is no danger of a downfall. The devotee takes prasādam in Kṛṣṇa consciousness, whereas the nondevotee rejects it as material. The impersonalist, therefore, cannot enjoy life due to his artificial renunciation; and for this reason, a slight agitation of the mind pulls him down again into the pool of material existence. It is said that such a soul, even though rising up to the point of liberation, falls down again due to his not having support in devotional service.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/63',
  },
  {
    n: 64,
    skr: `रागद्वेषवियुक्तैस्तु विषयानिन्द्रियैश्चरन् ।
आत्मवश्यैर्विधेयात्मा प्रसादमधिगच्छति ॥ ६४ ॥`,
    tr: `rāga-dveṣa-vimuktais tu
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;viṣayān indriyaiś caran
ātma-vaśyair vidheyātmā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;prasādam adhigacchati`,
    wbw_en: `rāga—attachment; dveṣa—detachment; vimuktaiḥ—by one who has been free from such things; tu—but; viṣayān—sense objects; indriyaiḥ—by the senses; caran—acting; ātma-vaśyaiḥ—one who has control over; vidheyātmā—one who follows regulated freedom; prasādam—the mercy of the Lord; adhigacchati—attains.`,
    wbw_ru: ``,
    tr_en: `One who can control his senses by practicing the regulated principles of freedom can obtain the complete mercy of the Lord and thus become free from all attachment and aversion.`,
    tr_ru: ``,
    pur_en: `It is already explained that one may externally control the senses by some artificial process, but unless the senses are engaged in the transcendental service of the Lord, there is every chance of a fall. Although the person in full Kṛṣṇa consciousness may apparently be on the sensual plane, because of his being Kṛṣṇa conscious, he has no attachment to sensual activities. The Kṛṣṇa conscious person is concerned only with the satisfaction of Kṛṣṇa, and nothing else. Therefore he is transcendental to all attachment. If Kṛṣṇa wants, the devotee can do anything which is ordinarily undesirable; and if Kṛṣṇa does not want, he shall not do that which he would have ordinarily done for his own satisfaction. Therefore to act or not to act is within his control because he acts only under the direction of Kṛṣṇa. This consciousness is the causeless mercy of the Lord, which the devotee can achieve in spite of his being attached to the sensual platform.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/64',
  },
  {
    n: 65,
    skr: `प्रसादे सर्वदुःखानां हानिरस्योपजायते ।
प्रसन्नचेतसो ह्याशु बुद्धिः पर्यवतिष्ठते ॥ ६५ ॥`,
    tr: `prasāde sarva-duḥkhānāṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;hānir asyopajāyate
prasanna-cetaso hy āśu
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;buddhiḥ paryavatiṣṭhate`,
    wbw_en: `prasāde—on achievement of the causeless mercy of the Lord; sarva—all; duḥkhānām—material miseries; hāniḥ—destruction; asya—his; upajāyate—takes place; prasanna-cetasaḥ—of the happy-minded; hi—certainly; āśu—very soon; buddhiḥ—intelligence; pari—sufficiently; avatiṣṭhate—established.`,
    wbw_ru: ``,
    tr_en: `For one who is so situated in the Divine consciousness, the threefold miseries of material existence exist no longer; in such a happy state, one's intelligence soon becomes steady.`,
    tr_ru: ``,
    pur_en: ``,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/65',
  },
  {
    n: 66,
    skr: `नास्ति बुद्धिरयुक्तस्य न चायुक्तस्य भावना ।
न चाभावयतः शान्तिरशान्तस्य कुतः सुखम् ॥ ६६ ॥`,
    tr: `nāsti buddhir ayuktasya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na cāyuktasya bhāvanā
na cābhāvayataḥ śāntir
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;aśāntasya kutaḥ sukham`,
    wbw_en: `na asti—there cannot be; buddhiḥ—transcendental intelligence; ayuktasya—of one who is not connected (with Kṛṣṇa consciousness); na—neither; ca—and; ayuktasya—of one devoid of Kṛṣṇa consciousness; bhāvanā—mind fixed in happiness; na—neither; ca—and; abhāvayataḥ—one who is not fixed; śāntiḥ—peace; aśāntasya—of the unpeaceful; kutaḥ—where is; sukham—happiness.`,
    wbw_ru: ``,
    tr_en: `One who is not in transcendental consciousness can have neither a controlled mind nor steady intelligence, without which there is no possibility of peace. And how can there be any happiness without peace?`,
    tr_ru: ``,
    pur_en: `Unless one is in Kṛṣṇa consciousness, there is no possibility of peace. So it is confirmed in the Fifth Chapter (5.29) that when one understands that Kṛṣṇa is the only enjoyer of all the good results of sacrifice and penance, and that He is the proprietor of all universal manifestations, that He is the real friend of all living entities, then only can one have real peace. Therefore, if one is not in Kṛṣṇa consciousness, there cannot be a final goal for the mind. Disturbance is due to want of an ultimate goal, and when one is certain that Kṛṣṇa is the enjoyer, proprietor and friend of everyone and everything, then one can, with a steady mind, bring about peace. Therefore, one who is engaged without a relationship with Kṛṣṇa is certainly always in distress and is without peace, however much one may make a show of peace and spiritual advancement in life. Kṛṣṇa consciousness is a self-manifested peaceful condition which can be achieved only in relationship with Kṛṣṇa.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/66',
  },
  {
    n: 67,
    skr: `इन्द्रियाणां हि चरतां यन्मनोऽनुविधीयते ।
तदस्य हरति प्रज्ञां वायुर्नावमिवाम्भसि ॥ ६७ ॥`,
    tr: `indriyāṇāṁ hi caratāṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yan mano 'nuvidhīyate
tad asya harati prajñāṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;vāyur nāvam ivāmbhasi`,
    wbw_en: `indriyāṇām—of the senses; hi—certainly; caratām—while herding over; yat—that; manaḥ—mind; anuvidhīyate—becomes constantly engaged; tat—that; asya—his; harati—takes away; prajñām—intelligence; vāyuḥ—wind; nāvam—a boat; iva—like; ambhasi—on the water.`,
    wbw_ru: ``,
    tr_en: `As a boat on the water is swept away by a strong wind, even one of the senses on which the mind focuses can carry away a man's intelligence.`,
    tr_ru: ``,
    pur_en: `Unless all of the senses are engaged in the service of the Lord, even one of them engaged in sense gratification can deviate the devotee from the path of transcendental advancement. As mentioned in the life of Mahārāja Ambarīṣa, all of the senses must be engaged in Kṛṣṇa consciousness, for that is the correct technique for controlling the mind.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/67',
  },
  {
    n: 68,
    skr: `तस्माद्यस्य महाबाहो निगृहीतानि सर्वशः ।
इन्द्रियाणीन्द्रियार्थेभ्यस्तस्य प्रज्ञा प्रतिष्ठिता ॥ ६८ ॥`,
    tr: `tasmād yasya mahā-bāho
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nigṛhītāni sarvaśaḥ
indriyāṇīndriyārthebhyas
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tasya prajñā pratiṣṭhitā`,
    wbw_en: `tasmāt—therefore; yasya—of one's; mahā-bāho—O mighty-armed one; nigṛhītāni—so curbed down; sarvaśaḥ—all around; indriyāṇi—the senses; indriya-arthebhyaḥ—for the sake of sense objects; tasya—his; prajñā—intelligence; pratiṣṭhitā—fixed.`,
    wbw_ru: ``,
    tr_en: `Therefore, O mighty-armed, one whose senses are restrained from their objects is certainly of steady intelligence.`,
    tr_ru: ``,
    pur_en: `As enemies are curbed by superior force, similarly, the senses can be curbed not by any human endeavor, but only by keeping them engaged in the service of the Lord. One who has understood this—that only by Kṛṣṇa consciousness is one really established in intelligence and that one should practice this art under the guidance of a bona fide spiritual master—is called sādhaka, or a suitable candidate for liberation.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/68',
  },
  {
    n: 69,
    skr: `या निशा सर्वभूतानां तस्यां जागर्ति संयमी ।
यस्यां जाग्रति भूतानि सा निशा पश्यतो मुनेः ॥ ६९ ॥`,
    tr: `yā niśā sarva-bhūtānāṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tasyāṁ jāgarti saṁyamī
yasyāṁ jāgrati bhūtāni
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sā niśā paśyato muneḥ`,
    wbw_en: `yā—what; niśā—is night; sarva—all; bhūtānām—of living entities; tasyām—in that; jāgarti—wakeful; saṁyamī—the self-controlled; yasyām—in which; jāgrati—awake; bhūtāni—all beings; sā—that is; niśā—night; paśyataḥ—for the introspective; muneḥ—sage.`,
    wbw_ru: ``,
    tr_en: `What is night for all beings is the time of awakening for the self-controlled; and the time of awakening for all beings is night for the introspective sage.`,
    tr_ru: ``,
    pur_en: `There are two classes of intelligent men. The one is intelligent in material activities for sense gratification, and the other is introspective and awake to the cultivation of self-realization. Activities of the introspective sage, or thoughtful man, are night for persons materially absorbed. Materialistic persons remain asleep in such a night due to their ignorance of self-realization. The introspective sage remains alert in the "night" of the materialistic men. The sage feels transcendental pleasure in the gradual advancement of spiritual culture, whereas the man in materialistic activities, being asleep to self-realization, dreams of varieties of sense pleasure, feeling sometimes happy and sometimes distressed in his sleeping condition. The introspective man is always indifferent to materialistic happiness and distress. He goes on with his self-realization activities undisturbed by material reaction.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/69',
  },
  {
    n: 70,
    skr: `आपूर्यमाणमचलप्रतिष्ठं समुद्रमापः प्रविशन्ति यद्वत् ।
तद्वत्कामा यं प्रविशन्ति सर्वे स शान्तिमाप्नोति न कामकामी ॥ ७० ॥`,
    tr: `āpūryamāṇam acala-pratiṣṭhaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;samudram āpaḥ praviśanti yadvat
tadvat kāmā yaṁ praviśanti sarve
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sa śāntim āpnoti na kāma-kāmī`,
    wbw_en: `āpūryamāṇam—always filled; acala-pratiṣṭham—steadily situated; samudram—the ocean; āpaḥ—water; praviśanti—enter; yadvat—as; tadvat—so; kāmāḥ—desires; yam—unto one; praviśanti—enter; sarve—all; saḥ—that person; śāntim—peace; āpnoti—achieves; na—not; kāma-kāmī—one who desires to fulfill desires.`,
    wbw_ru: ``,
    tr_en: `A person who is not disturbed by the incessant flow of desires—that enter like rivers into the ocean which is ever being filled but is always still—can alone achieve peace, and not the man who strives to satisfy such desires.`,
    tr_ru: ``,
    pur_en: `Although the vast ocean is always filled with water, it is always, especially during the rainy season, being filled with much more water. But the ocean remains the same—steady; it is not agitated, nor does it cross beyond the limit of its brink. That is also true of a person fixed in Kṛṣṇa consciousness. As long as one has the material body, the demands of the body for sense gratification will continue. The devotee, however, is not disturbed by such desires because of his fullness. A Kṛṣṇa conscious man is not in need of anything because the Lord fulfills all his material necessities. Therefore he is like the ocean—always full in himself. Desires may come to him like the waters of the rivers that flow into the ocean, but he is steady in his activities, and he is not even slightly disturbed by desires for sense gratification. That is the proof of a Kṛṣṇa conscious man—one who has lost all inclinations for material sense gratification, although the desires are present. Because he remains satisfied in the transcendental loving service of the Lord, he can remain steady, like the ocean, and therefore enjoy full peace. Others, however, who fulfill desires even up to the limit of liberation, what to speak of material success, never attain peace. The fruitive workers, the salvationists, and also the yogīs who are after mystic powers, are all unhappy because of unfulfilled desires. But the person in Kṛṣṇa consciousness is happy in the service of the Lord, and he has no desires to be fulfilled. In fact, he does not even desire liberation from the so-called material bondage. The devotees of Kṛṣṇa have no material desires, and therefore they are in perfect peace.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/70',
  },
  {
    n: 71,
    skr: `विहाय कामान्यः सर्वान्पुमांश्चरति निःस्पृहः ।
निर्ममो निरहङ्कारः स शान्तिमधिगच्छति ॥ ७१ ॥`,
    tr: `vihāya kāmān yaḥ sarvān
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pumāṁś carati niḥspṛhaḥ
nirmamo nirahaṅkāraḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sa śāntim adhigacchati`,
    wbw_en: `vihāya—after giving up; kāmān—all material desires for sense gratification; yaḥ—the person; sarvān—all; pumān—a person; carati—lives; nihṣpṛhaḥ —desireless; nirmamaḥ—without a sense of proprietorship; nirahaṅkāraḥ—without false ego; saḥ—all; śāntim—perfect peace; adhigacchati—attains.`,
    wbw_ru: ``,
    tr_en: `A person who has given up all desires for sense gratification, who lives free from desires, who has given up all sense of proprietorship and is devoid of false ego—he alone can attain real peace.`,
    tr_ru: ``,
    pur_en: `To become desireless means not to desire anything for sense gratification. In other words, desire for becoming Kṛṣṇa conscious is actually desirelessness. To understand one's actual position as the eternal servitor of Kṛṣṇa, without falsely claiming this material body to be oneself and without falsely claiming proprietorship over anything in the world, is the perfect stage of Kṛṣṇa consciousness. One who is situated in this perfect stage knows that because Kṛṣṇa is the proprietor of everything, therefore everything must be used for the satisfaction of Kṛṣṇa. Arjuna did not want to fight for his own sense satisfaction, but when he became fully Kṛṣṇa conscious he fought because Kṛṣṇa wanted him to fight. For himself there was no desire to fight, but for Kṛṣṇa the same Arjuna fought to his best ability. Desire for the satisfaction of Kṛṣṇa is really desirelessness; it is not an artificial attempt to abolish desires. The living entity cannot be desireless or senseless, but he does have to change the quality of the desires. A materially desireless person certainly knows that everything belongs to Kṛṣṇa (īśāvāsyam idaṁ sarvam), and therefore he does not falsely claim proprietorship over anything. This transcendental knowledge is based on self-realization—namely, knowing perfectly well that every living entity is the eternal part and parcel of Kṛṣṇa in spiritual identity, and therefore the eternal position of the living entity is never on the level of Kṛṣṇa or greater than Him. This understanding of Kṛṣṇa consciousness is the basic principle of real peace.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/71',
  },
  {
    n: 72,
    skr: `एषा ब्राह्मी स्थितिः पार्थ नैनां प्राप्य विमुह्यति ।
स्थित्वास्यामन्तकालेऽपि ब्रह्मनिर्वाणमृच्छति ॥ ७२ ॥`,
    tr: `eṣā brāhmī sthitiḥ pārtha
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;naināṁ prāpya vimuhyati
sthitvāsyām anta-kāle 'pi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;brahma-nirvāṇam ṛcchati`,
    wbw_en: `eṣā—this; brāhmī—spiritual; sthitiḥ—situation; pārtha—O son of Pṛthā; na—never; enām—this; prāpya—achieving; vimuhyati—bewilders; sthitvā—being so situated; asyām—being so; anta-kāle—at the end of life; api—also; brahma-nirvāṇam—spiritual (kingdom of God); ṛcchati—attains.`,
    wbw_ru: ``,
    tr_en: `That is the way of the spiritual and godly life, after attaining which a man is not bewildered. Being so situated, even at the hour of death, one can enter into the kingdom of God.`,
    tr_ru: ``,
    pur_en: `One can attain Kṛṣṇa consciousness or divine life at once, within a second-or one may not attain such a state of life even after millions of births. It is only a matter of understanding and accepting the fact. Khaṭvāṅga Mahārāja attained this state of life just a few minutes before his death, by surrendering unto Kṛṣṇa. Nirvāṇa means ending the process of materialistic life. According to Buddhist philosophy, there is only void after the completion of this material life, but Bhagavad-gītā teaches differently. Actual life begins after the completion of this material life. For the gross materialist it is sufficient to know that one has to end this materialistic way of life, but for persons who are spiritually advanced, there is another life after this materialistic life. Before ending this life, if one fortunately becomes Kṛṣṇa conscious, he at once attains the stage of Brahma-nirvāṇa. There is no difference between the kingdom of God and the devotional service of the Lord. Since both of them are on the absolute plane, to be engaged in the transcendental loving service of the Lord is to have attained the spiritual kingdom. In the material world there are activities of sense gratification, whereas in the spiritual world there are activities of Kṛṣṇa consciousness. Attainment of Kṛṣṇa consciousness even during this life is immediate attainment of Brahman, and one who is situated in Kṛṣṇa consciousness has certainly already entered into the kingdom of God.
Brahman is just the opposite of matter. Therefore brāhmī sthitiḥ means "not on the platform of material activities." Devotional service of the Lord is accepted in the Bhagavad-gītā as the liberated stage. Therefore, brāhmī-sthitiḥ is liberation from material bondage.
Śrīla Bhaktivinode Ṭhākur has summarized this Second Chapter of the Bhagavad-gītā as being the contents for the whole text. In the Bhagavad-gītā, the subject matters are karma-yoga, jñāna-yoga, and bhakti-yoga. In the Second Chapter karma-yoga and jñāna-yoga have been clearly discussed, and a glimpse of bhakti-yoga has also been given, as the contents for the complete text.
Thus end the Bhaktivedanta Purports to the Second Chapter of the Śrīmad-Bhagavad-gītā in the matter of its Contents.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/72',
  }
  ],
  3: [
  {
    n: 1,
    skr: `अर्जुन उवाच ।
ज्यायसी चेत्कर्मणस्ते मता बुद्धिर्जनार्दन ।
तत्किं कर्मणि घोरे मां नियोजयसि केशव ॥ १ ॥`,
    tr: `arjuna uvāca
jyāyasī cet karmaṇas te
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;matā buddhir janārdana
tat kiṁ karmaṇi ghore māṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;niyojayasi keśava`,
    wbw_en: `arjunaḥ—Arjuna; uvāca—said; jyāyasī—speaking very highly; cet—although; karmaṇaḥ—than fruitive action; te—your; matā—opinion; buddhiḥ—intelligence; janārdana—O Kṛṣṇa; tat—therefore; kim—why; karmaṇi—in action; ghore—ghastly; mām—me; niyojayasi—engaging me; keśava—O Kṛṣṇa.`,
    wbw_ru: ``,
    tr_en: `Arjuna said: O Janārdana, O Keśava, why do You urge me to engage in this ghastly warfare, if You think that intelligence is better than fruitive work?`,
    tr_ru: ``,
    pur_en: `The Supreme Personality of Godhead Śrī Kṛṣṇa has very elaborately described the constitution of the soul in the previous chapter, with a view to deliver His intimate friend Arjuna from the ocean of material grief. And the path of realization has been recommended: buddhi-yoga, or Kṛṣṇa consciousness. Sometimes Kṛṣṇa consciousness is misunderstood to be inertia, and one with such a misunderstanding often withdraws to a secluded place to become fully Kṛṣṇa conscious by chanting the holy name of Lord Kṛṣṇa. But without being trained in the philosophy of Kṛṣṇa consciousness, it is not advisable to chant the holy name of Kṛṣṇa in a secluded place where one may acquire only cheap adoration from the innocent public. Arjuna also thought of Kṛṣṇa consciousness or buddhi-yoga, or intelligence in spiritual advancement of knowledge, as something like retirement from active life and the practice of penance and austerity at a secluded place. In other words, he wanted to skillfully avoid the fighting by using Kṛṣṇa consciousness as an excuse. But as a sincere student, he placed the matter before his master and questioned Kṛṣṇa as to his best course of action. In answer, Lord Kṛṣṇa elaborately explained karma-yoga, or work in Kṛṣṇa consciousness, in this Third Chapter.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/1',
  },
  {
    n: 2,
    skr: `व्यामिश्रेणेव वाक्येन बुद्धिं मोहयसीव मे ।
तदेकं वद निश्चित्य येन श्रेयोऽहमाप्नुयाम् ॥ २ ॥`,
    tr: `vyāmiśreṇeva vākyena
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;buddhiṁ mohayasīva me
tad ekaṁ vada niścitya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yena śreyo 'ham āpnuyām`,
    wbw_en: `vyāmiśreṇa—by equivocal; iva—as; vākyena—words; buddhim—intelligence; mohayasi—bewildering; iva—as; me—my; tat—therefore; ekam—only one; vada—please tell; niścitya—ascertaining; yena—by which; śreyaḥ—real benefit; aham—I; āpnuyām—may have it.`,
    wbw_ru: ``,
    tr_en: `My intelligence is bewildered by Your equivocal instructions. Therefore, please tell me decisively what is most beneficial for me.`,
    tr_ru: ``,
    pur_en: `In the previous chapter, as a prelude to the Bhagavad-gītā, many different paths were explained, such as sāṅkhya-yoga, buddhi-yoga, control of the senses by intelligence, work without fruitive desire, and the position of the neophyte. This was all presented unsystematically. A more organized outline of the path would be necessary for action and understanding. Arjuna, therefore, wanted to clear up these apparently confusing matters so that any common man could accept them without misinterpretation. Although Kṛṣṇa had no intention of confusing Arjuna by any jugglery of words, Arjuna could not follow the process of Kṛṣṇa consciousness—either by inertia or active service. In other words, by his questions he is clearing the path of Kṛṣṇa consciousness for all students who seriously want to understand the mystery of the Bhagavad-gītā.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/2',
  },
  {
    n: 3,
    skr: `श्रीभगवानुवाच ।
लोकेऽस्मिन्द्विविधा निष्ठा पुरा प्रोक्ता मयानघ ।
ज्ञानयोगेन साङ्ख्यानां कर्मयोगेन योगिनाम् ॥ ३ ॥`,
    tr: `śrī-bhagavān uvāca
loke 'smin dvi-vidhā niṣṭhā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;purā proktā mayānagha
jñāna-yogena sāṅkhyānāṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;karma-yogena yoginām
`,
    wbw_en: `śrī bhagavān uvāca—the Supreme Personality of Godhead said; loke—in the world; asmin—this; dvi-vidhā—two kinds of; niṣṭhā—faith; purā—formerly; proktā—was said; mayā—by Me; anagha—O sinless one; jñāna-yogena—by the linking process of knowledge; sāṅkhyānām—of the empiric philosophers; karma-yogena—by the linking process of devotion; yoginām—of the devotees.`,
    wbw_ru: ``,
    tr_en: `The Blessed Lord said: O sinless Arjuna, I have already explained that there are two classes of men who realize the Self. Some are inclined to understand Him by empirical, philosophical speculation, and others are inclined to know Him by devotional work.`,
    tr_ru: ``,
    pur_en: `In the Second Chapter, verse 39, the Lord explained two kinds of procedures—namely sāṅkhya-yoga and karma-yoga, or buddhi-yoga. In this verse, the Lord explains the same more clearly. Sāṅkhya-yoga, or the analytical study of the nature of spirit and matter, is the subject matter for persons who are inclined to speculate and understand things by experimental knowledge and philosophy. The other class of men work in Kṛṣṇa consciousness, as it is explained in the 61st verse of the Second Chapter. The Lord has explained, also in the 39th verse, that by working by the principles of buddhi-yoga, or Kṛṣṇa consciousness, one can be relieved from the bonds of action; and, furthermore, there is no flaw in the process. The same principle is more clearly explained in the 61st verse—that this buddhi-yoga is to depend entirely on the Supreme (or more specifically, on Kṛṣṇa), and in this way all the senses can be brought under control very easily. Therefore, both the yogas are interdependant, as religion and philosophy. Religion without philosophy is sentiment, or sometimes fanaticism, while philosophy without religion is mental speculation. The ultimate goal is Kṛṣṇa, because the philosophers who are also sincerely searching after the Absolute Truth come in the end to Kṛṣṇa consciousness. This is also stated in the Bhagavad-gītā. The whole process is to understand the real position of the self in relation to the Superself. The indirect process is philosophical speculation, by which, gradually, one may come to the point of Kṛṣṇa consciousness; and the other process is directly connecting with everything in Kṛṣṇa consciousness. Of these two, the path of Kṛṣṇa consciousness is better because it does not depend on purifying the senses by a philosophical process. Kṛṣṇa consciousness is itself the purifying process, and by the direct method of devotional service it is simultaneously easy and sublime.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/3',
  },
  {
    n: 4,
    skr: `न कर्मणामनारम्भान्नैष्कर्म्यं पुरुषोऽश्नुते ।
न च सन्न्यसनादेव सिद्धिं समधिगच्छति ॥ ४ ॥`,
    tr: `na karmaṇām anārambhān
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;naiṣkarmyaṁ puruṣo 'śnute
na ca sannyasanād eva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;siddhiṁ samadhigacchati`,
    wbw_en: `na—without; karmaṇām—of the prescribed duties; anārambhāt—non-performance; naiṣkarmyam—freedom from reaction; puruṣah—man; aśnute—achieve; na—nor; ca—also; sannyasanāt—by renunciation; eva—simply; siddhim—success; samadhigacchati—attain.`,
    wbw_ru: ``,
    tr_en: `Not by merely abstaining from work can one achieve freedom from reaction, nor by renunciation alone can one attain perfection.`,
    tr_ru: ``,
    pur_en: `The renounced order of life can be accepted upon being purified by the discharge of the prescribed form of duties which are laid down just to purify the heart of materialistic men. Without purification, one cannot attain success by abruptly adopting the fourth order of life (sannyāsa). According to the empirical philosophers, simply by adopting sannyāsa, or retiring from fruitive activities, one at once becomes as good as Nārāyaṇa. But Lord Kṛṣṇa does not approve this principle. Without purification of heart, sannyāsa is simply a disturbance to the social order. On the other hand, if someone takes to the transcendental service of the Lord, even without discharging his prescribed duties, whatever he may be able to advance in the cause is accepted by the Lord (buddhi-yoga). Svalpam apy asya dharmasya trāyate mahato bhayāt. Even a slight performance of such a principle enables one to overcome great difficulties.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/4',
  },
  {
    n: 5,
    skr: `न हि कश्चित्क्षणमपि जातु तिष्ठत्यकर्मकृत् ।
कार्यते ह्यवशः कर्म सर्वः प्रकृतिजैर्गुणैः ॥ ५ ॥`,
    tr: `na hi kaścit kṣaṇam api
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;jātu tiṣṭhaty akarma-kṛt
kāryate hy avaśaḥ karma
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sarvaḥ prakṛti-jair guṇaiḥ`,
    wbw_en: `na—nor; hi—certainly; kaścit—anyone; kṣaṇam—even a moment; api—also; jātu—even; tiṣṭhati—stands; akarma-kṛt—without doing something; kāryate—is forced to do; hi—certainly; avaśaḥ—helplessly; karma—work; sarvaḥ—everything; prakṛti-jaiḥ—out of the modes of material nature; guṇaiḥ—by the qualities.`,
    wbw_ru: ``,
    tr_en: `All men are forced to act helplessly according to the impulses born of the modes of material nature; therefore no one can refrain from doing something, not even for a moment.`,
    tr_ru: ``,
    pur_en: `It is not a question of embodied life, but it is the nature of the soul to be always active. Without the presence of the spirit soul, the material body cannot move. The body is only a dead vehicle to be worked by the spirit soul, which is always active and cannot stop even for a moment. As such, the spirit soul has to be engaged in the good work of Kṛṣṇa consciousness, otherwise it will be engaged in occupations dictated by illusory energy. In contact with material energy, the spirit soul acquires material modes, and to purify the soul from such affinities it is necessary to engage in the prescribed duties enjoined in the śāstras. But if the soul is engaged in his natural function of Kṛṣṇa consciousness, whatever he is able to do is good for him. The Śrīmad-Bhāgavatam affirms this:
tyaktvā sva-dharmaṁ caraṇāmbujaṁ harer
bhajann apakvo 'tha patet tato yadi
yatra kva vābhadram abhūd amuṣya kiṁ
ko vārtha āpto 'bhajatāṁ sva-dharmataḥ.
"If someone takes to Kṛṣṇa consciousness, even though he may not follow the prescribed duties in the śāstras nor execute the devotional service properly, and even though he may fall down from the standard, there is no loss or evil for him. But if he carries out all the injunctions for purification in the śāstras, what does it avail him if he is not Kṛṣṇa conscious?" (Bhāg. 1.5.17) So the purificatory process is necessary for reaching this point of Kṛṣṇa consciousness. Therefore, sannyāsa, or any purificatory process, is to help reach the ultimate goal of becoming Kṛṣṇa conscious, without which everything is considered a failure.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/5',
  },
  {
    n: 6,
    skr: `कर्मेन्द्रियाणि संयम्य य आस्ते मनसा स्मरन् ।
इन्द्रियार्थान्विमूढात्मा मिथ्याचारः स उच्यते ॥ ६ ॥`,
    tr: `karmendriyāṇi saṁyamya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ya āste manasā smaran
indriyārthān vimūḍhātmā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mithyācāraḥ sa ucyate`,
    wbw_en: `karma-indriyāṇi—the five working sense organs; saṁyamya—controlling; yaḥ—anyone who; āste—remains; manasā—by mind; smaran—thinking; indriya-arthān—sense objects; vimūḍha—foolish; ātmā—soul; mithyā-ācāraḥ—pretender; saḥ—he; ucyate—is called.`,
    wbw_ru: ``,
    tr_en: `One who restrains the senses and organs of action, but whose mind dwells on sense objects, certainly deludes himself and is called a pretender.`,
    tr_ru: ``,
    pur_en: `There are many pretenders who refuse to work in Kṛṣṇa consciousness but make a show of meditation, while actually dwelling within the mind upon sense enjoyment. Such pretenders may also speak on dry philosophy in order to bluff sophisticated followers, but according to this verse these are the greatest cheaters. For sense enjoyment one can act in any capacity of the social order, but if one follows the rules and regulations of his particular status, he can make gradual progress in purifying his existence. But he who makes a show of being a yogī, while actually searching for the objects of sense gratification, must be called the greatest cheater, even though he sometimes speaks of philosophy. His knowledge has no value because the effects of such a sinful man's knowledge are taken away by the illusory energy of the Lord. Such a pretender's mind is always impure, and therefore his show of yogic meditation has no value whatsoever.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/6',
  },
  {
    n: 7,
    skr: `यस्त्विन्द्रियाणि मनसा नियम्यारभतेऽर्जुन ।
कर्मेन्द्रियैः कर्मयोगमसक्तः स विशिष्यते ॥ ७ ॥`,
    tr: `yas tv indriyāṇi manasā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;niyamyārabhate 'rjuna
karmendriyaiḥ karma-yogam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;asaktaḥ sa viśiṣyate`,
    wbw_en: `yaḥ—one who; tu—but; indriyāṇi—senses; manasā—by the mind; niyamya—regulating; ārabhate—begins; arjuna—O Arjuna; karma-indriyaiḥ—by the active sense organs; karma-yogam—devotion; asaktaḥ—without attachment; saḥ—he; viśiṣyate—by far the better.`,
    wbw_ru: ``,
    tr_en: `On the other hand, he who controls the senses by the mind and engages his active organs in works of devotion, without attachment, is by far superior.`,
    tr_ru: ``,
    pur_en: `Instead of becoming a pseudo-transcendentalist for the sake of wanton living and sense enjoyment, it is far better to remain in one's own business and execute the purpose of life, which is to get free from material bondage and enter into the kingdom of God. The prime svārtha-gati, or goal of self-interest, is to reach Viṣṇu. The whole institution of varṇa and āśrama is designed to help us reach this goal of life. A householder can also reach this destination by regulated service in Kṛṣṇa consciousness. For self-realization, one can live a controlled life, as prescribed in the śāstras, and continue carrying out his business without attachment, and in that way make progress. Such a sincere person who follows this method is far better situated than the false pretender who adopts show-bottle spiritualism to cheat the innocent public. A sincere sweeper in the street is far better than the charlatan meditator who meditates only for the sake of making a living.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/7',
  },
  {
    n: 8,
    skr: `नियतं कुरु कर्म त्वं कर्म ज्यायो ह्यकर्मणः ।
शरीरयात्रापि च ते न प्रसिद्ध्येदकर्मणः ॥ ८ ॥`,
    tr: `niyataṁ kuru karma tvaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;karma jyāyo hy akarmaṇaḥ
śarīra-yātrāpi ca te
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na prasiddhyed akarmaṇaḥ`,
    wbw_en: `niyatam—prescribed; kuru—do; karma—duties; tvam—you; karma—work; jyāyaḥ—better; hi—than; akarmaṇaḥ—without work; śarīra—bodily; yātrā—maintenance; api—even; ca—also; te—your; na—never; prasiddhyet—effected; akarmaṇaḥ—without work.`,
    wbw_ru: ``,
    tr_en: `Perform your prescribed duty, for action is better than inaction. A man cannot even maintain his physical body without work.`,
    tr_ru: ``,
    pur_en: `There are many pseudo-meditators who misrepresent themselves as belonging to high parentage, and great professional men who falsely pose that they have sacrificed everything for the sake of advancement in spiritual life. Lord Kṛṣṇa did not want Arjuna to become a pretender, but that he perform his prescribed duties as set forth for kṣatriyas. Arjuna was a householder and a military general, and therefore it was better for him to remain as such and perform his religious duties as prescribed for the householder kṣatriya. Such activities gradually cleanse the heart of a mundane man and free him from material contamination. So-called renunciation for the purpose of maintenance is never approved by the Lord, nor by any religious scripture. After all, one has to maintain one's body and soul together by some work. Work should not be given up capriciously, without purification of materialistic propensities. Anyone who is in the material world is certainly possessed of the impure propensity for lording it over material nature, or, in other words, for sense gratification. Such polluted propensities have to be cleared. Without doing so, through prescribed duties, one should never attempt to become a so-called transcendentalist, renouncing work and living at the cost of others.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/8',
  },
  {
    n: 9,
    skr: `यज्ञार्थात्कर्मणोऽन्यत्र लोकोऽयं कर्मबन्धनः ।
तदर्थं कर्म कौन्तेय मुक्तसङ्गः समाचर ॥ ९ ॥`,
    tr: `yajñārthāt karmaṇo 'nyatra
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;loko 'yaṁ karma-bandhanaḥ
tad-arthaṁ karma kaunteya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mukta-saṅgaḥ samācara`,
    wbw_en: `yajña-arthāt—only for the sake of Yajña, or Viṣṇu; karmaṇaḥ—work done; anyatra—otherwise; lokaḥ—this world; ayam—this; karma-bandhanaḥ—bondage by work; tat—Him; artham—for the sake of; karma—work; kaunteya—O son of Kuntī; mukta-saṅgaḥ—liberated from association; samācara—do it perfectly.`,
    wbw_ru: ``,
    tr_en: `Work done as a sacrifice for Viṣṇu has to be performed, otherwise work binds one to this material world. Therefore, O son of Kuntī, perform your prescribed duties for His satisfaction, and in that way you will always remain unattached and free from bondage.`,
    tr_ru: ``,
    pur_en: `Since one has to work even for the simple maintenance of the body, the prescribed duties for a particular social position and quality are so made that that purpose can be fulfilled. Yajña means Lord Viṣṇu, or sacrificial performances. All sacrificial performances also are meant for the satisfaction of Lord Viṣṇu. The Vedas enjoin: yajño vai viṣṇuḥ. In other words, the same purpose is served whether one performs prescribed yajñas or directly serves Lord Viṣṇu. Kṛṣṇa consciousness is therefore performance of yajña as it is prescribed in this verse. The varṇāśrama institution also aims at this for satisfying Lord Viṣṇu. "Varṇāśramācāra-vatā puruṣeṇa paraḥ pumān/viṣṇur ārādhyate..." (Viṣṇu Purāṇa 3.8.8) Therefore one has to work for the satisfaction of Viṣṇu. Any other work done in this material world will be a cause of bondage, for both good and evil work have their reactions, and any reaction binds the performer. Therefore, one has to work in Kṛṣṇa consciousness to satisfy Kṛṣṇa (or Viṣṇu); and while performing such activities one is in a liberated stage. This is the great art of doing work, and in the beginning this process requires very expert guidance. One should therefore act very diligently, under the expert guidance of a devotee of Lord Kṛṣṇa, or under the direct instruction of Lord Kṛṣṇa Himself (under whom Arjuna had the opportunity to work). Nothing should be performed for sense gratification, but everything should be done for the satisfaction of Kṛṣṇa. This practice will not only save one from the reaction of work, but will also gradually elevate one to transcendental loving service of the Lord, which alone can raise one to the kingdom of God.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/9',
  },
  {
    n: 10,
    skr: `सहयज्ञाः प्रजाः सृष्ट्वा पुरोवाच प्रजापतिः ।
अनेन प्रसविष्यध्वमेष वोऽस्त्विष्टकामधुक् ॥ १० ॥`,
    tr: `saha-yajñāḥ prajāḥ sṛṣṭvā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;purovāca prajāpatiḥ
anena prasaviṣyadhvam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;eṣa vo 'stv iṣṭa-kāma-dhuk`,
    wbw_en: `saha—along with; yajñāḥ—sacrifices; prajāḥ—generations; sṛṣṭvā—by creating; purā—anciently; uvāca—said; prajā-patiḥ—the Lord of creatures; anena—by this; prasaviṣyadhvam—be more and more prosperous; eṣaḥ—certainly; vaḥ—your; astu—let it be; iṣṭa—all desirable; kāma-dhuk—bestower.`,
    wbw_ru: ``,
    tr_en: `In the beginning of creation, the Lord of all creatures sent forth generations of men and demigods, along with sacrifices for Viṣṇu, and blessed them by saying, "Be thou happy by this yajña [sacrifice] because its performance will bestow upon you all desirable things."`,
    tr_ru: ``,
    pur_en: `The material creation by the Lord of creatures (Viṣṇu) is a chance offered to the conditioned souls to come back home—back to Godhead. All living entities within the material creation are conditioned by material nature because of their forgetfulness of their relationship to Kṛṣṇa, the Supreme Personality of Godhead. The Vedic principles are to help us understand this eternal relation as it is stated in the Bhagavad-gītā: vedaiś ca sarvair aham eva vedyaḥ. The Lord says that the purpose of the Vedas is to understand Him. In the Vedic hymns it is said: patiṁ viśvasyātmeśvaram. Therefore, the Lord of the living entities is the Supreme Personality of Godhead, Viṣṇu. In the Śrīmad-Bhāgavatam also Śrīla Śukadeva Gosvāmī describes the Lord as pati in so many ways:
śriyaḥ-patir yajña-patiḥ prajā-patir
dhiyāṁ patir loka-patir dharā-patiḥ
patir gatiś cāndhaka-vṛṣṇi-sātvatāṁ
prasīdatāṁ me bhagavān satāṁ patiḥ
(Bhāg. 2.4.20)
The prajā-pati is Lord Viṣṇu, and He is the Lord of all living creatures, all worlds, and all beauties, and the protector of everyone. The Lord created this material world for the conditioned souls to learn how to perform yajñas (sacrifice) for the satisfaction of Viṣṇu, so that while in the material world they can live very comfortably without anxiety. Then after finishing the present material body, they can enter into the kingdom of God. That is the whole program for the conditioned soul. By performance of yajña, the conditioned souls gradually become Kṛṣṇa conscious and become godly in all respects. In this age of Kali, the saṅkīrtana-yajña (the chanting of the names of God) is recommended by the Vedic scriptures, and this transcendental system was introduced by Lord Caitanya for the deliverance of all men in this age. Saṅkīrtana-yajña and Kṛṣṇa consciousness go well together. Lord Kṛṣṇa in His devotional form (as Lord Caitanya) is mentioned in the Śrīmad-Bhāgavatam as follows, with special reference to the saṅkīrtana-yajña:
kṛṣṇa-varṇaṁ tviṣākṛṣṇāṁ sāṅgopāṅgāstra-pārṣadam
yajñaiḥ saṅkīrtana-prāyair yajanti hi su-medhasaḥ
"In this age of Kali, people who are endowed with sufficient intelligence will worship the Lord, who is accompanied by His associates, by performance of saṅkīrtana-yajña." (Bhāg. 11.5.29) Other yajñas prescribed in the Vedic literatures are not easy to perform in this age of Kali, but the saṅkīrtana-yajña is easy and sublime for all purposes.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/10',
  },
  {
    n: 11,
    skr: `देवान्भावयतानेन ते देवा भावयन्तु वः ।
परस्परं भावयन्तः श्रेयः परमवाप्स्यथ ॥ ११ ॥`,
    tr: `devān bhāvayatānena
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;te devā bhāvayantu vaḥ
parasparaṁ bhāvayantaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śreyaḥ param avāpsyatha`,
    wbw_en: `devān—demigods; bhāvayata—having been pleased; anena—by this sacrifice; te—those; devāḥ—the demigods; bhāvayantu—will please; vaḥ—you; parasparam—mutual; bhāvayantaḥ—pleasing one another; sreyaḥ—benediction; param—the supreme; avāpsyatha—do you achieve.`,
    wbw_ru: ``,
    tr_en: `The demigods, being pleased by sacrifices, will also please you; thus nourishing one another, there will reign general prosperity for all.`,
    tr_ru: ``,
    pur_en: `The demigods are empowered administrators of material affairs. The supply of air, light, water and all other benedictions for maintaining the body and soul of every living entity are entrusted to the demigods, who are innumerable assistants in different parts of the body of the Supreme Personality of Godhead. Their pleasures and displeasures are dependant on the performance of yajñas by the human being. Some of the yajñas are meant to satisfy particular demigods; but even in so doing, Lord Viṣṇu is worshiped in all yajñas as the chief beneficiary. It is stated also in the Bhagavad-gītā that Kṛṣṇa Himself is the beneficiary of all kinds of yajñas: bhoktāraṁ yajña-tapasām. Therefore, ultimate satisfaction of the yajñapati is the chief purpose of all yajñas. When these yajñas are perfectly performed, naturally the demigods in charge of the different departments of supply are pleased, and there is no scarcity in the supply of natural products.
Performance of yajñas has many side benefits, ultimately leading to liberation from the material bondage. By performance of yajñas, all activities become purified, as it is stated in the Vedas:
āhāra-śuddhau sattva-śuddhiḥ sattva-śuddhau
dhruvā smṛtiḥ smṛti-lambhe sarva-granthīnāṁ vipra-mokṣaḥ
As it will be explained in the following verse, by performance of yajña, one's eatables become sanctified, and by eating sanctified foodstuffs, one's very existence becomes purified; by the purification of existence, finer tissues in the memory become sanctified, and when memory is sanctified, one can think of the path of liberation, and all these combined together lead to Kṛṣṇa consciousness, the great necessity of present-day society.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/11',
  },
  {
    n: 12,
    skr: `इष्टान्भोगान्हि वो देवा दास्यन्ते यज्ञभाविताः ।
तैर्दत्तानप्रदायैभ्यो यो भुङ्क्ते स्तेन एव सः ॥ १२ ॥`,
    tr: `iṣṭān bhogān hi vo devā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dāsyante yajña-bhāvitāḥ
tair dattān apradāyaibhyo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yo bhuṅkte stena eva saḥ`,
    wbw_en: `iṣṭān—desired; bhogān—necessities of life; hi—certainly; vaḥ—unto you; devāḥ—the demigods; dāsyante—award; yajña-bhāvitāḥ—being satisfied by the performance of sacrifices; taiḥ—by them; dattān—things given; apradāya—without offering; ebhyaḥ—to the demigods; yaḥ—he who; bhuṅkte—enjoys; stenaḥ—thief; eva—certainly; saḥ—is he.`,
    wbw_ru: ``,
    tr_en: `In charge of the various necessities of life, the demigods, being satisfied by the performance of yajña [sacrifice], supply all necessities to man. But he who enjoys these gifts, without offering them to the demigods in return, is certainly a thief.`,
    tr_ru: ``,
    pur_en: `The demigods are authorized supplying agents on behalf of the Supreme Personality of Godhead, Viṣṇu. Therefore, they must be satisfied by the performance of prescribed yajñas. In the Vedas, there are different kinds of yajñas prescribed for different kinds of demigods, but all are ultimately offered to the Supreme Personality of Godhead. For one who cannot understand what the Personality of Godhead is, sacrifice to the demigods is recommended. According to the different material qualities of the persons concerned, different types of yajñas are recommended in the Vedas. Worship of different demigods is also on the same basis—namely, according to different qualities. For example, the meat-eaters are recommended to worship the goddess Kālī, the ghastly form of material nature, and before the goddess the sacrifice of animals is recommended. But for those who are in the mode of goodness, the transcendental worship of Viṣṇu is recommended. But ultimately, all yajñas are meant for gradual promotion to the transcendental position. For ordinary men, at least five yajñas, known as pañca-mahāyajña, are necessary.
One should know, however, that all the necessities of life that the human society requires are supplied by the demigod agents of the Lord. No one can manufacture anything. Take, for example, all the eatables of human society. These eatables include grains, fruits, vegetables, milk, sugar, etc., for the persons in the mode of goodness, and also eatables for the nonvegetarians, like meats, etc., none of which can be manufactured by men. Then again, take for example heat, light, water, air, etc., which are also necessities of life—none of them can be manufactured by the human society. Without the Supreme Lord, there can be no profuse sunlight, moonlight, rainfall, breeze, etc., without which no one can live. Obviously, our life is dependant on supplies from the Lord. Even for our manufacturing enterprises, we require so many raw materials like metal, sulphur, mercury, manganese, and so many essentials—all of which are supplied by the agents of the Lord, with the purpose that we should make proper use of them to keep ourselves fit and healthy for the purpose of self-realization, leading to the ultimate goal of life, namely, liberation from the material struggle for existence. This aim of life is attained by performance of yajñas. If we forget the purpose of human life and simply take supplies from the agents of the Lord for sense gratification and become more and more entangled in material existence, which is not the purpose of creation, certainly we become thieves, and therefore we are punished by the laws of material nature. A society of thieves can never be happy because they have no aim in life. The gross materialist thieves have no ultimate goal of life. They are simply directed to sense gratification; nor do they have knowledge of how to perform yajñas. Lord Caitanya, however, inaugurated the easiest performance of yajña, namely the saṅkīrtana-yajña, which can be performed by anyone in the world who accepts the principles of Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/12',
  },
  {
    n: 13,
    skr: `यज्ञशिष्टाशिनः सन्तो मुच्यन्ते सर्वकिल्बिषैः ।
भुञ्जते ते त्वघं पापा ये पचन्त्यात्मकारणात् ॥ १३ ॥`,
    tr: `yajña-śiṣṭāśinaḥ santo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mucyante sarva-kilbiṣaiḥ
bhuñjate te tv aghaṁ pāpā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ye pacanty ātma-kāraṇāt`,
    wbw_en: `yajña-śiṣṭa—food taken after performance of yajña; aśinaḥ—eaters; santaḥ—the devotees; mucyante—get relief from; sarva—all kinds of; kilbiṣaiḥ—sins; bhuñjate—enjoy; te—they; tu—but; agham—grievous sins; pāpāḥ—sinners; ye—those; pacanti—prepare food; ātma-kāraṇāt—for sense enjoyment.`,
    wbw_ru: ``,
    tr_en: `The devotees of the Lord are released from all kinds of sins because they eat food which is offered first for sacrifice. Others, who prepare food for personal sense enjoyment, verily eat only sin.`,
    tr_ru: ``,
    pur_en: `The devotees of the Supreme Lord, or the persons who are in Kṛṣṇa consciousness, are called santas, and they are always in love with the Lord as it is described in the Brahma-saṁhitā: premāñjana- cchurita-bhakti-vilocanena santaḥ sadaiva hṛdayeṣu vilokayanti. The santas, being always in a compact of love with the Supreme Personality of Godhead, Govinda (the giver of all pleasures), or Mukunda (the giver of liberation), or Kṛṣṇa (the all-attractive person), cannot accept anything without first offering it to the Supreme Person. Therefore, such devotees always perform yajñas in different modes of devotional service, such as śravaṇam, kīrtanam, smaraṇam, arcanam, etc., and these performances of yajñas keep them always aloof from all kinds of contamination of sinful association in the material world. Others, who prepare food for self or sense gratification, are not only thieves, but are also the eaters of all kinds of sins. How can a person be happy if he is both a thief and sinful? It is not possible. Therefore, in order for people to become happy in all respects, they must be taught to perform the easy process of saṅkīrtana-yajña, in full Kṛṣṇa consciousness. Otherwise, there can be no peace or happiness in the world.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/13',
  },
  {
    n: 14,
    skr: `अन्नाद्भवन्ति भूतानि पर्जन्यादन्नसम्भवः ।
यज्ञाद्भवति पर्जन्यो यज्ञः कर्मसमुद्भवः ॥ १४ ॥`,
    tr: `annād bhavanti bhūtāni
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;parjanyād anna-sambhavaḥ
yajñād bhavati parjanyo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yajñaḥ karma-samudbhavaḥ`,
    wbw_en: `annāt—from grains; bhavanti—grow; bhūtāni—the material bodies; parjanyāt—from rains; anna—food grains; sambhavaḥ—are made possible; yajñāt—from the performance of sacrifice; bhavati—becomes possible; parjanyaḥ—rains; yajñaḥ—performance of yajña; karma—prescribed duties; samudbhavaḥ—born of.`,
    wbw_ru: ``,
    tr_en: `All living bodies subsist on food grains, which are produced from rain. Rains are produced by performance of yajña [sacrifice], and yajña is born of prescribed duties.`,
    tr_ru: ``,
