    pur_en: `Śrīla Baladeva Vidyābhūṣaṇa, a great commentator on the Bhagavad-gītā, writes as follows: ye indrādy-aṅga-tayāvasthitaṁ yajñaṁ sarveśvaraṁ viṣṇum abhyarccya taccheṣam aśnanti tena taddeha-yāntrāṁ sampādayanti te santaḥ sarveśvarasya bhaktāḥ sarva-kilviṣair anādi-kāla-vivṛddhair ātmānubhava- pratibandhakair nikhilaiḥ pāpair vimucyante. The Supreme Lord, who is known as the yajña-puruṣaḥ, or the personal beneficiary of all sacrifices, is the master of all demigods who serve Him as the different limbs of the body serve the whole. Demigods like Indra, Candra, Varuṇa, etc., are appointed officers who manage material affairs, and the Vedas direct sacrifices to satisfy these demigods so that they may be pleased to supply air, light and water sufficiently to produce food grains. When Lord Kṛṣṇa is worshiped, the demigods, who are different limbs of the Lord, are also automatically worshiped; therefore there is no separate need to worship the demigods. For this reason, the devotees of the Lord, who are in Kṛṣṇa consciousness, offer food to Kṛṣṇa and then eat—a process which nourishes the body spiritually. By such action not only are past sinful reactions in the body vanquished, but the body becomes immunized to all contamination of material nature. When there is an epidemic disease, an antiseptic vaccine protects a person from the attack of such an epidemic. Similarly, food offered to Lord Viṣṇu and then taken by us makes us sufficiently resistant to material affection, and one who is accustomed to this practice is called a devotee of the Lord. Therefore, a person in Kṛṣṇa consciousness, who eats only food offered to Kṛṣṇa, can counteract all reactions of past material infections, which are impediments to the progress of self-realization. On the other hand, one who does not do so continues to increase the volume of sinful action, and this prepares the next body to resemble hogs and dogs, to suffer the resultant reactions of all sins. The material world is full of contaminations, and one who is immunized by accepting prasādam of the Lord (food offered to Viṣṇu) is saved from the attack, whereas one who does not do so becomes subjected to contamination.
Food grains or vegetables are factually eatables. The human being eats different kinds of food grains, vegetables, fruits, etc., and the animals eat the refuse of the food grains and vegetables, grass, plants, etc. Human beings who are accustomed to eating meat and flesh must also depend on the production of vegetation in order to eat the animals. Therefore, ultimately, we have to depend on the production of the field and not on the production of big factories. The field production is due to sufficient rain from the sky, and such rains are controlled by demigods like Indra, sun, moon, etc., and they are all servants of the Lord. The Lord can be satisfied by sacrifices; therefore, one who cannot perform them will find himself in scarcity—that is the law of nature. Yajña, specifically the saṅkīrtana-yajña prescribed for this age, must therefore be performed to save us at least from scarcity of food supply.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/14',
  },
  {
    n: 15,
    skr: `कर्म ब्रह्मोद्भवं विद्धि ब्रह्माक्षरसमुद्भवम् ।
तस्मात्सर्वगतं ब्रह्म नित्यं यज्ञे प्रतिष्ठितम् ॥ १५ ॥`,
    tr: `karma brahmodbhavaṁ viddhi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;brahmākṣara-samudbhavam
tasmāt sarva-gataṁ brahma
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nityaṁ yajñe pratiṣṭhitam`,
    wbw_en: `karma—work; brahma-Vedas; udbhavam—produced from; viddhi—one should know; brahma—the Vedas; akṣara—the Supreme Brahman (Personality of Godhead); samudbhavam—directly manifested; tasmāt—therefore; sarva-gatam—all-pervading; brahma—Transcendence; nityam—eternally; yajñe—in sacrifice; pratiṣṭhitam—situated.`,
    wbw_ru: ``,
    tr_en: `Regulated activities are prescribed in the Vedas, and the Vedas are directly manifested from the Supreme Personality of Godhead. Consequently the all-pervading Transcendence is eternally situated in acts of sacrifice.`,
    tr_ru: ``,
    pur_en: `Yajñārtha karma, or the necessity of work for the satisfaction of Kṛṣṇa only, is more expressly stated in this verse. If we have to work for the satisfaction of the yajña-puruṣa, Viṣṇu, then we must find out the direction of work in Brahman, or the transcendental Vedas. The Vedas are therefore codes of working directions. Anything performed without the direction of the Vedas is called vikarma, or unauthorized or sinful work. Therefore, one should always take direction from the Vedas to be saved from the reaction of work. As one has to work in ordinary life by the direction of the state, similarly, one has to work under direction of the supreme state of the Lord. Such directions in the Vedas are directly manifested from the breathing of the Supreme Personality of Godhead. It is said: asya mahato bhūtasya naśvasitam etad yad ṛg-vedo yajur-vedaḥ sāma-vedo 'tharvāṅ girasaḥ. "The four Vedas—namely the Ṛg-veda, Yajur-veda, Sāma-veda and Atharva-veda—are all emanations from the breathing of the great Personality of Godhead." The Lord, being omnipotent, can speak by breathing air, as it is confirmed in the Brahma-saṁhitā, for the Lord has the omnipotence to perform through each of His senses the actions of all other senses. In other words, the Lord can speak through His breathing, and He can impregnate by His eyes. In fact, it is said that He glanced over material nature and thus fathered all living entities. After creating or impregnating the conditioned souls into the womb of material nature, He gave His directions in the Vedic wisdom as to how such conditioned souls can return home, back to Godhead. We should always remember that the conditioned souls in material nature are all eager for material enjoyment. But the Vedic directions are so made that one can satisfy one's perverted desires, then return to Godhead, having finished his so-called enjoyment. It is a chance for the conditioned souls to attain liberation; therefore the conditioned souls must try to follow the process of yajña by becoming Kṛṣṇa conscious. Even those who cannot follow the Vedic injunctions may adopt the principles of Kṛṣṇa consciousness, and that will take the place of performance of Vedic yajñas, or karmas.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/15',
  },
  {
    n: 16,
    skr: `एवं प्रवर्तितं चक्रं नानुवर्तयतीह यः ।
अघायुरिन्द्रियारामो मोघं पार्थ स जीवति ॥ १६ ॥`,
    tr: `evaṁ pravartitaṁ cakraṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nānuvartayatīha yaḥ
aghāyur indriyārāmo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;moghaṁ pārtha sa jīvati`,
    wbw_en: `evam—thus prescribed; pravartitam—established by the Vedas; cakram—cycle; na—does not; anuvartayati—adopt; iha—in this life; yaḥ—one who; aghāyuḥ—life full of sins; indriya-ārāmaḥ—satisfied in sense gratification; mogham—useless; pārtha—O son of Pṛthā (Arjuna); saḥ—one who does so; jīvati—lives.`,
    wbw_ru: ``,
    tr_en: `My dear Arjuna, a man who does not follow this prescribed Vedic system of sacrifice certainly leads a life of sin, for a person delighting only in the senses lives in vain.`,
    tr_ru: ``,
    pur_en: `The mammonist philosophy of work very hard and enjoy sense gratification is condemned herein by the Lord. Therefore, for those who want to enjoy this material world, the above-mentioned cycle of performing yajñas is absolutely necessary. One who does not follow such regulations is living a very risky life, being condemned more and more. By nature's law, this human form of life is specifically meant for self-realization, in either of the three ways—namely karma-yoga, jñāna-yoga, or bhakti-yoga. There is no necessity of rigidly following the performances of the prescribed yajñas for the transcendentalists who are above vice and virtue; but those who are engaged in sense gratification require purification by the above-mentioned cycle of yajña performances. There are different kinds of activities. Those who are not Kṛṣṇa conscious are certainly engaged in sensory consciousness; therefore they need to execute pious work. The yajña system is planned in such a way that sensory conscious persons may satisfy their desires without becoming entangled in the reaction of sense-gratificatory work. The prosperity of the world depends not on our own efforts but on the background arrangement of the Supreme Lord, directly carried out by the demigods. Therefore, the yajñas are directly aimed at the particular demigod mentioned in the Vedas. Indirectly, it is the practice of Kṛṣṇa consciousness, because when one masters the performance of yajñas, one is sure to become Kṛṣṇa conscious. But if by performing yajñas one does not become Kṛṣṇa conscious, such principles are counted as only moral codes. One should not, therefore, limit his progress only to the point of moral codes, but should transcend them, to attain Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/16',
  },
  {
    n: 17,
    skr: `यस्त्वात्मरतिरेव स्यादात्मतृप्तश्च मानवः ।
आत्मन्येव च सन्तुष्टस्तस्य कार्यं न विद्यते ॥ १७ ॥`,
    tr: `yas tv ātma-ratir eva syād
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ātma-tṛptaś ca mānavaḥ
ātmany eva ca santuṣṭas
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tasya kāryaṁ na vidyate`,
    wbw_en: `yaḥ—one who; tu—but; ātma-ratiḥ—takes pleasure; eva—certainly; syāt—remains; ātma-tṛptaḥ—self-illuminated; ca—and; mānavaḥ—a man; ātmani—in himself; eva—only; ca—and; santuṣṭaḥ—perfectly satiated; tasya—his; kāryam—duty; na—does not; vidyate—exist.`,
    wbw_ru: ``,
    tr_en: `One who is, however, taking pleasure in the self, who is illumined in the self, who rejoices in and is satisfied with the self only, fully satiated—for him there is no duty.`,
    tr_ru: ``,
    pur_en: `A person who is fully Kṛṣṇa conscious, and is fully satisfied by his acts in Kṛṣṇa consciousness, no longer has any duty to perform. Due to his being Kṛṣṇa conscious, all impiety within is instantly cleansed, an effect of many, many thousands of yajña performances. By such clearing of consciousness, one becomes fully confident of his eternal position in relationship with the Supreme. His duty thus becomes self-illuminated by the grace of the Lord, and therefore he no longer has any obligations to the Vedic injunctions. Such a Kṛṣṇa conscious person is no longer interested in material activities and no longer takes pleasure in material arrangements like wine, women and similar infatuations.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/17',
  },
  {
    n: 18,
    skr: `नैव तस्य कृतेनार्थो नाकृतेनेह कश्चन ।
न चास्य सर्वभूतेषु कश्चिदर्थव्यपाश्रयः ॥ १८ ॥`,
    tr: `naiva tasya kṛtenārtho
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nākṛteneha kaścana
na cāsya sarva-bhūteṣu
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kaścid artha-vyapāśrayaḥ`,
    wbw_en: `na—never; eva—certainly; tasya—his; kṛtena—by discharge of duty; arthaḥ—purpose; na—nor; akṛtena—without discharge of duty; iha—in this world; kaścana—whatever; na—never; ca—and; asya—of him; sarva-bhūteṣu —in all living beings; kaścit—any; artha—purpose; vyapa-āśrayaḥ—taking shelter of.`,
    wbw_ru: ``,
    tr_en: `A self-realized man has no purpose to fulfill in the discharge of his prescribed duties, nor has he any reason not to perform such work. Nor has he any need to depend on any other living being.`,
    tr_ru: ``,
    pur_en: `A self-realized man is no longer obliged to perform any prescribed duty, save and except activities in Kṛṣṇa consciousness. Kṛṣṇa consciousness is not inactivity either, as will be explained in the following verses. A Kṛṣṇa conscious man does not take shelter of any person—man or demigod. Whatever he does in Kṛṣṇa consciousness is sufficient in the discharge of his obligation.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/18',
  },
  {
    n: 19,
    skr: `तस्मादसक्तः सततं कार्यं कर्म समाचर ।
असक्तो ह्याचरन्कर्म परमाप्नोति पूरुषः ॥ १९ ॥`,
    tr: `tasmād asaktaḥ satataṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kāryaṁ karma samācara
asakto hy ācaran karma
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;param āpnoti pūruṣaḥ`,
    wbw_en: `tasmāt—therefore; asaktaḥ—without attachment; satatam—constantly; kāryam—as duty; karma—work; samācara—perform; asaktaḥ—nonattachment; hi—certainly; ācaran—performing; karma—work; param—the Supreme; āpnoti—achieves; pūruṣaḥ—a man.`,
    wbw_ru: ``,
    tr_en: `Therefore, without being attached to the fruits of activities, one should act as a matter of duty; for by working without attachment, one attains the Supreme.`,
    tr_ru: ``,
    pur_en: `The Supreme is the Personality of Godhead for the devotees, and liberation for the impersonalist. A person, therefore, acting for Kṛṣṇa, or in Kṛṣṇa consciousness, under proper guidance and without attachment to the result of the work, is certainly making progress toward the supreme goal of life. Arjuna is told that he should fight in the Battle of Kurukṣetra for the interest of Kṛṣṇa because Kṛṣṇa wanted him to fight. To be a good man or a nonviolent man is a personal attachment, but to act on behalf of the Supreme is to act without attachment for the result. That is perfect action of the highest degree, recommended by the Supreme Personality of Godhead, Śrī Kṛṣṇa. Vedic rituals, like prescribed sacrifices, are performed for purification of impious activities that were performed in the field of sense gratification. But action in Kṛṣṇa consciousness is transcendental to the reactions of good or evil work. A Kṛṣṇa conscious person has no attachment for the result but acts on behalf of Kṛṣṇa alone. He engages in all kinds of activities, but is completely nonattached.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/19',
  },
  {
    n: 20,
    skr: `कर्मणैव हि संसिद्धिमास्थिता जनकादयः ।
लोकसङ्ग्रहमेवापि सम्पश्यन्कर्तुमर्हसि ॥ २० ॥`,
    tr: `karmaṇaiva hi saṁsiddhim
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;āsthitā janakādayaḥ
loka-saṅgraham evāpi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sampaśyan kartum arhasi`,
    wbw_en: `karmaṇā—by work; eva—even; hi—certainly; saṁsiddhim—perfection; āsthitāḥ—situated; janaka-ādayaḥ—kings like Janaka and others; loka-saṅgraham—educating the people in general; eva—also; api—for the sake of; sampaśyan—by considering; kartum—to act; arhasi—deserve.`,
    wbw_ru: ``,
    tr_en: `Even kings like Janaka and others attained the perfectional stage by performance of prescribed duties. Therefore, just for the sake of educating the people in general, you should perform your work.`,
    tr_ru: ``,
    pur_en: `Kings like Janaka and others were all self-realized souls; consequently they had no obligation to perform the prescribed duties in the Vedas. Nonetheless they performed all prescribed activities just to set examples for the people in general. Janaka was the father of Sītā, and father-in-law of Lord Śrī Rāma. Being a great devotee of the Lord, he was transcendentally situated, but because he was the King of Mithila (a subdivision of Behar province in India), he had to teach his subjects how to fight righteously in battle. He and his subjects fought to teach people in general that violence is also necessary in a situation where good arguments fail. Before the Battle of Kurukṣetra, every effort was made to avoid the war, even by the Supreme Personality of Godhead, but the other party was determined to fight. So for such a right cause, there is a necessity for fighting. Although one who is situated in Kṛṣṇa consciousness may not have any interest in the world, he still works to teach the public how to live and how to act. Experienced persons in Kṛṣṇa consciousness can act in such a way that others will follow, and this is explained in the following verse.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/20',
  },
  {
    n: 21,
    skr: `यद्यदाचरति श्रेष्ठस्तत्तदेवेतरो जनः ।
स यत्प्रमाणं कुरुते लोकस्तदनुवर्तते ॥ २१ ॥`,
    tr: `yad yad ācarati śreṣṭhas
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tat tad evetaro janaḥ
sa yat pramāṇaṁ kurute
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;lokas tad anuvartate`,
    wbw_en: `yat—whatever; yat—and whichever; ācarati—does he act; śreṣṭhaḥ—respectable leader; tat—that; tat—and that alone; eva—certainly; itaraḥ—common; janaḥ—person; saḥ—he; yat—whichever; pramāṇam—evidence; kurute—does perform; lokaḥ—all the world; tat—that; anuvartate—follow in the footsteps.`,
    wbw_ru: ``,
    tr_en: `Whatever action is performed by a great man, common men follow in his footsteps. And whatever standards he sets by exemplary acts, all the world pursues.`,
    tr_ru: ``,
    pur_en: `People in general always require a leader who can teach the public by practical behavior. A leader cannot teach the public to stop smoking if he himself smokes. Lord Caitanya said that a teacher should behave properly even before he begins teaching. One who teaches in that way is called ācārya, or the ideal teacher. Therefore, a teacher must follow the principles of śāśtra (scripture) to reach the common man. The teacher cannot manufacture rules against the principles of revealed scriptures. The revealed scriptures, like Manu-saṁhitā and similar others, are considered the standard books to be followed by human society. Thus the leader's teaching should be based on the principles of the standard rules as they are practiced by the great teachers. The Śrīmad-Bhāgavatam also affirms that one should follow in the footsteps of great devotees, and that is the way of progress on the path of spiritual realization. The king or the executive head of a state, the father and the school teacher are all considered to be natural leaders of the innocent people in general. All such natural leaders have a great responsibility to their dependants; therefore they must be conversant with standard books of moral and spiritual codes.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/21',
  },
  {
    n: 22,
    skr: `न मे पार्थास्ति कर्तव्यं त्रिषु लोकेषु किञ्चन ।
नानवाप्तमवाप्तव्यं वर्त एव च कर्मणि ॥ २२ ॥`,
    tr: `na me pārthāsti kartavyaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;triṣu lokeṣu kiñcana
nānavāptam avāptavyaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;varta eva ca karmaṇi`,
    wbw_en: `na—none; me—Mine; pārtha—O son of Pṛthā; asti—there is; kartavyam—any prescribed duty; triṣu—in the three; lokeṣu—planetary systems; kiñcana—anything; na—no; anavāptam—in want; avāptavyam—to be gained; varte—engaged; eva—certainly; ca—also; karmaṇi—in one's prescribed duty.`,
    wbw_ru: ``,
    tr_en: `O son of Pṛthā, there is no work prescribed for Me within all the three planetary systems. Nor am I in want of anything, nor have I need to obtain anything—and yet I am engaged in work.`,
    tr_ru: ``,
    pur_en: `The Supreme Personality of Godhead is described in the Vedic literatures as follows:
tam īśvarāṇāṁ paramaṁ maheśvaraṁ
taṁ devatānāṁ paramaṁ ca daivatam
patiṁ patīnāṁ paramaṁ parastād
vidāma devaṁ bhuvaneśam īḍyam
na tasya kāryaṁ karaṇaṁ ca vidyate
na tat-samaś cābhyadhikaś ca dṛśyate
parāsya śaktir vividhaiva śrūyate
svā-bhāvikī jñāna-bala-kriyā ca.
"The Supreme Lord is the controller of all other controllers, and He is the greatest of all the diverse planetary leaders. Everyone is under His control. All entities are delegated with particular power only by the Supreme Lord; they are not supreme themselves. He is also worshipable by all demigods and is the supreme director of all directors. Therefore, He is transcendental to all kinds of material leaders and controllers and is worshipable by all. There is no one greater than Him, and He is the supreme cause of all causes.
"He does not possess bodily form like that of an ordinary living entity. There is no difference between His body and His soul. He is absolute. All His senses are transcendental. Any one of His senses can perform the action of any other sense. Therefore, no one is greater than Him or equal to Him. His potencies are multifarious, and thus His deeds are automatically performed as a natural sequence." (Śvetāśvatara Upaniṣad 6.7-8)
Since everything is in full opulence in the Personality of Godhead and is existing in full truth, there is no duty for the Supreme Personality of Godhead to perform. One who must receive the results of work has some designated duty, but one who has nothing to achieve within the three planetary systems certainly has no duty. And yet Lord Kṛṣṇa is engaged on the Battlefield of Kurukṣetra as the leader of the kṣatriyas because the kṣatriyas are duty-bound to give protection to the distressed. Although He is above all the regulations of the revealed scriptures, He does not do anything that violates the revealed scriptures.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/22',
  },
  {
    n: 23,
    skr: `यदि ह्यहं न वर्तेयं जातु कर्मण्यतन्द्रितः ।
मम वर्त्मानुवर्तन्ते मनुष्याः पार्थ सर्वशः ॥ २३ ॥`,
    tr: `yadi hy ahaṁ na varteyaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;jātu karmaṇy atandritaḥ
mama vartmānuvartante
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;manuṣyāḥ pārtha sarvaśaḥ`,
    wbw_en: `yadi—if; hi—certainly; aham—I; na—do not; varteyam—thus engage; jātu—ever; karmaṇi—in the performance of prescribed duties; atandritaḥ—with great care; mama—My; vartma—path; anuvartante—would follow; manuṣyāḥ—all men; pārtha—O son of Pṛthā; sarvaśaḥ—in all respects.`,
    wbw_ru: ``,
    tr_en: `For, if I did not engage in work, O Pārtha, certainly all men would follow My path.`,
    tr_ru: ``,
    pur_en: `In order to keep the balance of social tranquility for progress in spiritual life, there are traditional family usages meant for every civilized man. Although such rules and regulations are for the conditioned souls and not Lord Kṛṣṇa, because He descended to establish the principles of religion, He followed the prescribed rules. Otherwise, common men would follow in His footsteps because He is the greatest authority. From the Śrīmad-Bhāgavatam it is understood that Lord Kṛṣṇa was performing all the religious duties at home and out of home, as required of a householder.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/23',
  },
  {
    n: 24,
    skr: `उत्सीदेयुरिमे लोका न कुर्यां कर्म चेदहम् ।
सङ्करस्य च कर्ता स्यामुपहन्यामिमाः प्रजाः ॥ २४ ॥`,
    tr: `utsīdeyur ime lokā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na kuryāṁ karma ced aham
saṅkarasya ca kartā syām
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;upahanyām imāḥ prajāḥ`,
    wbw_en: `utsīdeyuḥ—put into ruin; ime—all these; lokāḥ—worlds; na—do not; kuryām—perform; karma—prescribed duties; cet—if; aham—I; saṅkarasya—of unwanted population; ca—and; kartā—creator; syām—shall be; upahanyām—destroy; imāḥ—all these; prajāḥ—living entities.`,
    wbw_ru: ``,
    tr_en: `If I should cease to work, then all these worlds would be put to ruination. I would also be the cause of creating unwanted population, and I would thereby destroy the peace of all sentient beings.`,
    tr_ru: ``,
    pur_en: `Varṇa-saṅkara is unwanted population which disturbs the peace of the general society. In order to check this social disturbance, there are prescribed rules and regulations by which the population can automatically become peaceful and organized for spiritual progress in life. When Lord Kṛṣṇa descends, naturally He deals with such rules and regulations in order to maintain the prestige and necessity of such important performances. The Lord is the father of all living entities, and if the living entities are misguided, indirectly the responsibility goes to the Lord. Therefore, whenever there is general disregard of regulative principles, the Lord Himself descends and corrects the society. We should, however, note carefully that although we have to follow in the footsteps of the Lord, we still have to remember that we cannot imitate Him. Following and imitating are not on the same level. We cannot imitate the Lord by lifting Govardhana Hill, as the Lord did in His childhood. It is impossible for any human being. We have to follow His instructions, but we may not imitate Him at any time. The Śrīmad-Bhāgavatam affirms:
naitat samācarej jātu manasāpi hy anīśvaraḥ
vinaśyaty ācaran mauḍhyād yathā 'rudro 'bdhijaṁ viṣam
īśvarāṇāṁ vacaḥ satyaṁ tathaivācaritaṁ kvacit
teṣāṁ yat sva-vaco yuktaṁ buddhimāṁs tat samācaret
"One should simply follow the instructions of the Lord and His empowered servants. Their instructions are all good for us, and any intelligent person will perform them as instructed. However, one should guard against trying to imitate their actions. One should not try to drink the ocean of poison in imitation of Lord Śiva." (Bhāg. 10.33.30)
We should always consider the position of the īśvaras, or those who can actually control the movements of the sun and moon, as superior. Without such power, one cannot imitate the īśvaras, who are superpowerful. Lord Śiva drank poison to the extent of swallowing an ocean, but if any common man tries to drink even a fragment of such poison, he will be killed. There are many psuedo-devotees of Lord Śiva who want to indulge in smoking gāñjā (marijuana) and similar intoxicating drugs, forgetting that by so imitating the acts of Lord Śiva they are calling death very near. Similarly, there are some psuedo-devotees of Lord Kṛṣṇa who prefer to imitate the Lord in His rāsa-līlā, or dance of love, forgetting their inability to lift Govardhana Hill. It is best, therefore, that one not try to imitate the powerful, but simply follow their instructions; nor should one try to occupy their posts without qualification. There are so many "incarnations" of God without the power of the Supreme Godhead.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/24',
  },
  {
    n: 25,
    skr: `सक्ताः कर्मण्यविद्वांसो यथा कुर्वन्ति भारत ।
कुर्याद्विद्वांस्तथासक्तश्चिकीर्षुर्लोकसङ्ग्रहम् ॥ २५ ॥`,
    tr: `saktāḥ karmaṇy avidvāṁso
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yathā kurvanti bhārata
kuryād vidvāṁs tathāsaktaś
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;cikīrṣur loka-saṅgraham`,
    wbw_en: `saktāḥ—being attached; karmaṇi—prescribed duties; avidvāṁsaḥ—the ignorant; yathā—as much as; kurvanti—do it; bhārata—O descendant of Bharata; kuryāt—must do; vidvān—the learned; tathā—thus; asaktaḥ—without attachment; cikīrṣuḥ—desiring to; loka-saṅgraham—leading the people in general.`,
    wbw_ru: ``,
    tr_en: `As the ignorant perform their duties with attachment to results, similarly the learned may also act, but without attachment, for the sake of leading people on the right path.`,
    tr_ru: ``,
    pur_en: `A person in Kṛṣṇa consciousness and a person not in Kṛṣṇa consciousness are differentiated by different desires. A Kṛṣṇa conscious person does not do anything which is not conducive to development of Kṛṣṇa consciousness. He may even act exactly like the ignorant person, who is too much attached to material activities, but one is engaged in such activities for the satisfaction of his sense gratification, whereas the other is engaged for the satisfaction of Kṛṣṇa. Therefore, the Kṛṣṇa conscious person is required to show the people how to act and how to engage the results of action for the purpose of Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/25',
  },
  {
    n: 26,
    skr: `न बुद्धिभेदं जनयेदज्ञानां कर्मसङ्गिनाम् ।
जोषयेत्सर्वकर्माणि विद्वान्युक्तः समाचरन् ॥ २६ ॥`,
    tr: `na buddhi-bhedaṁ janayed
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ajñānāṁ karma-saṅginām
joṣayet sarva-karmāṇi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;vidvān yuktaḥ samācaran`,
    wbw_en: `na—do not; buddhi-bhedam—disrupt the intelligence; janayet—do; ajñānām—of the foolish; karma-saṅginām—attached to fruitive work; joṣayet—dovetailed; sarva—all; karmāṇi—work; vidvān—learned; yuktaḥ—all engaged; samācaran—practicing.`,
    wbw_ru: ``,
    tr_en: `Let not the wise disrupt the minds of the ignorant who are attached to fruitive action. They should not be encouraged to refrain from work, but to engage in work in the spirit of devotion.`,
    tr_ru: ``,
    pur_en: `Vedaiś ca sarvair aham eva vedyaḥ: that is the end of all Vedic rituals. All rituals, all performances of sacrifices, and everything that is put into the Vedas, including all directions for material activities, are meant for understanding Kṛṣṇa, who is the ultimate goal of life. But because the conditioned souls do not know anything beyond sense gratification, they study the Vedas to that end. Through sense regulations, however, one is gradually elevated to Kṛṣṇa consciousness. Therefore a realized soul in Kṛṣṇa consciousness should not disturb others in their activities or understanding, but he should act by showing how the results of all work can be dedicated to the service of Kṛṣṇa. The learned Kṛṣṇa conscious person may act in such a way that the ignorant person working for sense gratification may learn how to act and how to behave. Although the ignorant man is not to be disturbed in his activities, still, a slightly developed Kṛṣṇa conscious person may directly be engaged in the service of the Lord without waiting for other Vedic formulas. For this fortunate man there is no need to follow the Vedic rituals, because in direct Kṛṣṇa consciousness one can have all the results simply by following the prescribed duties of a particular person.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/26',
  },
  {
    n: 27,
    skr: `प्रकृतेः क्रियमाणानि गुणैः कर्माणि सर्वशः ।
अहङ्कारविमूढात्मा कर्ताहमिति मन्यते ॥ २७ ॥`,
    tr: `prakṛteḥ kriyamāṇāni
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;guṇaiḥ karmāṇi sarvaśaḥ
ahaṅkāra-vimūḍhātmā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kartāham iti manyate`,
    wbw_en: `prakṛteḥ—of material nature; kriyamāṇāni—all being done; guṇaiḥ—by the modes; karmāṇi—activities; sarvaśaḥ—all kinds of; ahaṅkāra-vimūḍha—bewildered by false ego; ātmā—the spirit soul; kartā—doer; aham—I; iti—thus; manyate—thinks.`,
    wbw_ru: ``,
    tr_en: `The bewildered spirit soul, under the influence of the three modes of material nature, thinks himself to be the doer of activities, which are in actuality carried out by nature.`,
    tr_ru: ``,
    pur_en: `Two persons, one in Kṛṣṇa consciousness and the other in material consciousness, working on the same level, may appear to be working on the same platform, but there is a wide gulf of difference in their respective positions. The person in material consciousness is convinced by false ego that he is the doer of everything. He does not know that the mechanism of the body is produced by material nature, which works under the supervision of the Supreme Lord. The materialistic person has no knowledge that ultimately he is under the control of Kṛṣṇa. The person in false ego takes all credit for doing everything independantly, and that is the symptom of his nescience. He does not know that this gross and subtle body is the creation of material nature, under the order of the Supreme Personality of Godhead, and as such his bodily and mental activities should be engaged in the service of Kṛṣṇa, in Kṛṣṇa consciousness. The ignorant man forgets that the Supreme Personality of Godhead is known as Hṛṣīkeśa, or the master of the senses of the material body, for due to his long misuse of the senses in sense gratification, he is factually bewildered by the false ego, which makes him forget his eternal relationship with Kṛṣṇa.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/27',
  },
  {
    n: 28,
    skr: `तत्त्ववित्तु महाबाहो गुणकर्मविभागयोः ।
गुणा गुणेषु वर्तन्त इति मत्वा न सज्जते ॥ २८ ॥`,
    tr: `tattva-vit tu mahā-bāho
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;guṇa-karma-vibhāgayoḥ
guṇā guṇeṣu vartanta
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;iti matvā na sajjate`,
    wbw_en: `tattvavit—the knower of the Absolute Truth; tu—but; mahā-bāho—O mighty-armed one; guṇa-karma—works under material influence; vibhāgayoḥ—differences; guṇāḥ—senses; guṇeṣu—in sense gratification; vartante—being engaged; iti—thus; matvā—thinking; na—never; sajjate—becomes attached.`,
    wbw_ru: ``,
    tr_en: `One who is in knowledge of the Absolute Truth, O mighty-armed, does not engage himself in the senses and sense gratification, knowing well the differences between work in devotion and work for fruitive results.`,
    tr_ru: ``,
    pur_en: `The knower of the Absolute Truth is convinced of his awkward position in material association. He knows that he is part and parcel of the Supreme Personality of Godhead, Kṛṣṇa, and that his position should not be in the material creation. He knows his real identity as part and parcel of the Supreme, who is eternal bliss and knowledge, and he realizes that somehow or other he is entrapped in the material conception of life. In his pure state of existence he is meant to dovetail his activities in devotional service to the Supreme Personality of Godhead, Kṛṣṇa. He therefore engages himself in the activities of Kṛṣṇa consciousness and becomes naturally unattached to the activities of the material senses, which are all circumstantial and temporary. He knows that his material condition of life is under the supreme control of the Lord; consequently he is not disturbed by all kinds of material reactions, which he considers to be the mercy of the Lord. According to Śrīmad-Bhāgavatam, one who knows the Absolute Truth in three different features—namely Brahman, Paramātmā, and the Supreme Personality of Godhead—is called tattvavit, for he knows also his own factual position in relationship with the Supreme.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/28',
  },
  {
    n: 29,
    skr: `प्रकृतेर्गुणसम्मूढाः सज्जन्ते गुणकर्मसु ।
तानकृत्स्नविदो मन्दान्कृत्स्नविन्न विचालयेत् ॥ २९ ॥`,
    tr: `prakṛter guṇa-sammūḍhāḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sajjante guṇa-karmasu
tān akṛtsna-vido mandān
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kṛtsna-vin na vicālayet`,
    wbw_en: `prakṛteḥ—impelled by the material modes; guṇa-saṁmūḍhāḥ—befooled by material identification; sajjante—become engaged; guṇa-karmasu—in material activities; tān—all those; akṛtsna-vidaḥ—persons with a poor fund of knowledge; mandān—lazy to understand self-realization; kṛtsna-vit—one who is in factual knowledge; na—may not; vicālayet—try to agitate.`,
    wbw_ru: ``,
    tr_en: `Bewildered by the modes of material nature, the ignorant fully engage themselves in material activities and become attached. But the wise should not unsettle them, although these duties are inferior due to the performers' lack of knowledge.`,
    tr_ru: ``,
    pur_en: `Persons who are unknowledgeable falsely identify with gross material consciousness and are full of material designations. This body is a gift of the material nature, and one who is too much attached to the bodily consciousness is called mandān, or a lazy person without understanding of spirit soul. Ignorant men think of the body as the self; bodily connections with others are accepted as kinsmanship; the land in which the body is obtained is the object of worship; and the formalities of religious rituals are considered ends in themselves. Social work, nationalism, and altruism are some of the activities for such materially designated persons. Under the spell of such designations, they are always busy in the material field; for them spiritual realization is a myth, and so they are not interested. Such bewildered persons may even be engaged in such primary moral principles of life as nonviolence and similar materially benevolent work. Those who are, however, enlightened in spiritual life, should not try to agitate such materially engrossed persons. Better to prosecute one's own spiritual activities silently.
Men who are ignorant cannot appreciate activities in Kṛṣṇa consciousness, and therefore Lord Kṛṣṇa advises us not to disturb them and simply waste valuable time. But the devotees of the Lord are more kind than the Lord because they understand the purpose of the Lord. Consequently they undertake all kinds of risks, even to the point of approaching ignorant men to try to engage them in the acts of Kṛṣṇa consciousness, which are absolutely necessary for the human being.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/29',
  },
  {
    n: 30,
    skr: `मयि सर्वाणि कर्माणि संन्यस्याध्यात्मचेतसा ।
निराशीर्निर्ममो भूत्वा युध्यस्व विगतज्वरः ॥ ३० ॥`,
    tr: `mayi sarvāṇi karmāṇi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sannyasyādhyātma-cetasā
nirāśīr nirmamo bhūtvā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yudhyasva vigata-jvaraḥ`,
    wbw_en: `mayi—unto Me; sarvāṇi—all sorts of; karmāṇi—activities; sannyasya—giving up completely; adhyātma—with full knowledge of the self; cetasā—consciousness; nirāśīḥ—without desire for profit; nirmamaḥ—without ownership; bhūtvā—so being; yudhyasva—fight; vigata-jvaraḥ—without being lethargic.`,
    wbw_ru: ``,
    tr_en: `Therefore, O Arjuna, surrendering all your works unto Me, with mind intent on Me, and without desire for gain and free from egoism and lethargy, fight.`,
    tr_ru: ``,
    pur_en: `This verse clearly indicates the purpose of the Bhagavad-gītā. The Lord instructs that one has to become fully Kṛṣṇa conscious to discharge duties, as if in military discipline. Such an injunction may make things a little difficult; nevertheless duties must be carried out, with dependence on Kṛṣṇa, because that is the constitutional position of the living entity. The living entity cannot be happy independant of the cooperation of the Supreme Lord because the eternal constitutional position of the living entity is to become subordinate to the desires of the Lord. Arjuna was, therefore, ordered by Śrī Kṛṣṇa to fight as if the Lord were his military commander. One has to sacrifice everything for the good will of the Supreme Lord, and at the same time discharge prescribed duties without claiming proprietorship. Arjuna did not have to consider the order of the Lord; he had only to execute His order. The Supreme Lord is the Soul of all souls; therefore, one who depends solely and wholly on the Supreme Soul without personal consideration, or in other words, one who is fully Kṛṣṇa conscious, is called adhyātma-cetasā. Nirāśīḥ means that one has to act on the order of the master. Nor should one ever expect fruitive results. The cashier may count millions of dollars for his employer, but he does not claim a cent for himself. Similarly, one has to realize that nothing in the world belongs to any individual person, but that everything belongs to the Supreme Lord. That is the real purport of mayi, or unto Me. And when one acts in such Kṛṣṇa consciousness, certainly he does not claim proprietorship over anything. This consciousness is called nirmama, or nothing is mine. And, if there is any reluctance to execute such a stern order which is without consideration of so-called kinsmen in the bodily relationship, that reluctance should be thrown off; in this way one may become vigata-jvara, or without feverish mentality or lethargy. Everyone, according to his quality and position, has a particular type of work to discharge, and all such duties may be discharged in Kṛṣṇa consciousness, as described above. That will lead one to the path of liberation.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/30',
  },
  {
    n: 31,
    skr: `ये मे मतमिदं नित्यमनुतिष्ठन्ति मानवाः ।
श्रद्धावन्तोऽनसूयन्तो मुच्यन्ते तेऽपि कर्मभिः ॥ ३१ ॥`,
    tr: `ye me matam idaṁ nityam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;anutiṣṭhanti mānavāḥ
śraddhāvanto 'nasūyanto
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mucyante te 'pi karmabhiḥ`,
    wbw_en: `ye—those; me—My; matam—injunctions; idam—this; nityam—eternal function; anutiṣṭhanti—execute regularly; mānavāḥ—humankind; śraddhāvantaḥ—with faith and devotion; anasūyantaḥ—without envy; mucyante—become free; te—all of them; api—even; karmabhiḥ—from the bondage of the law of fruitive action.`,
    wbw_ru: ``,
    tr_en: `One who executes his duties according to My injunctions and who follows this teaching faithfully, without envy, becomes free from the bondage of fruitive actions.`,
    tr_ru: ``,
    pur_en: `The injunction of the Supreme Personality of Godhead, Kṛṣṇa, is the essence of all Vedic wisdom, and therefore is eternally true without exception. As the Vedas are eternal, so this truth of Kṛṣṇa consciousness is also eternal. One should have firm faith in this injunction, without envying the Lord. There are many philosophers who write comments on the Bhagavad-gītā but have no faith in Kṛṣṇa. They will never be liberated from the bondage of fruitive action. But an ordinary man with firm faith in the eternal injunctions of the Lord, even though unable to execute such orders, becomes liberated from the bondage of the law of karma. In the beginning of Kṛṣṇa consciousness, one may not fully discharge the injunctions of the Lord, but because one is not resentful of this principle and works sincerely without consideration of defeat and hopelessness, he will surely be promoted to the stage of pure Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/31',
  },
  {
    n: 32,
    skr: `ये त्वेतदभ्यसूयन्तो नानुतिष्ठन्ति मे मतम् ।
सर्वज्ञानविमूढांस्तान्विद्धि नष्टानचेतसः ॥ ३२ ॥`,
    tr: `ye tv etad abhyasūyanto
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nānutiṣṭhanti me matam
sarva-jñāna-vimūḍhāṁs tān
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;viddhi naṣṭān acetasaḥ`,
    wbw_en: `ye—those; tu—however; etat—this; abhyasūyantaḥ—out of envy; na—do not; anutiṣṭhanti—regularly perform; me—My; matam—injunction; sarva-jñāna—all sorts of knowledge; vimūḍhān—perfectly befooled; tān—they are; viddhi—know it well; naṣṭān—all ruined; acetasaḥ—without Kṛṣṇa consciousness.`,
    wbw_ru: ``,
    tr_en: `But those who, out of envy, disregard these teachings and do not practice them regularly, are to be considered bereft of all knowledge, befooled, and doomed to ignorance and bondage.`,
    tr_ru: ``,
    pur_en: `The flaw of not being Kṛṣṇa conscious is clearly stated herein. As there is punishment for disobedience to the order of the supreme executive head, so there is certainly punishment for the disobedience of the order of the Supreme Personality of Godhead. A disobedient person, however great he may be, is ignorant of his own self, of the Supreme Brahman, and Paramātmā and the Personality of Godhead, due to a vacant heart. Therefore there is no hope of perfection of life for him.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/32',
  },
  {
    n: 33,
    skr: `सदृशं चेष्टते स्वस्याः प्रकृतेर्ज्ञानवानपि ।
प्रकृतिं यान्ति भूतानि निग्रहः किं करिष्यति ॥ ३३ ॥`,
    tr: `sadṛśaṁ ceṣṭate svasyāḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;prakṛter jñānavān api
prakṛtiṁ yānti bhūtāni
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nigrahaḥ kiṁ kariṣyati`,
    wbw_en: `sadṛśam—accordingly; ceṣṭate—tries; svasyāḥ—in one's own nature; prakṛteḥ—modes; jñānavān—the learned; api—although; prakṛtim—nature; yānti—undergo; bhūtāni—all living entities; nigrahaḥ—suppression; kim—what; kariṣyati—can do.`,
    wbw_ru: ``,
    tr_en: `Even a man of knowledge acts according to his own nature, for everyone follows his nature. What can repression accomplish?`,
    tr_ru: ``,
    pur_en: `Unless one is situated on the transcendental platform of Kṛṣṇa consciousness, he cannot get free from the influence of the modes of material nature, as it is confirmed by the Lord in the Seventh Chapter (7.14). Therefore, even for the most highly educated person on the mundane plane, it is impossible to get out of the entanglement of māyā simply by theoretical knowledge, or by separating the soul from the body. There are many so-called spiritualists who outwardly pose to be advanced in the science, but inwardly or privately are completely under the particular modes of nature which they are unable to surpass. Academically, one may be very learned, but because of his long association with material nature, he is in bondage. Kṛṣṇa consciousness helps one to get out of the material entanglement, even though one may be engaged in his prescribed duties. Therefore, without being fully in Kṛṣṇa consciousness, no one should suddenly give up his prescribed duties and become a so-called yogī or transcendentalist artificially. It is better to be situated in one's position and to try to attain Kṛṣṇa consciousness under superior training. Thus one may be freed from the clutches of māyā.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/33',
  },
  {
    n: 34,
    skr: `इन्द्रियस्येन्द्रियस्यार्थे रागद्वेषौ व्यवस्थितौ ।
तयोर्न वशमागच्छेत्तौ ह्यस्य परिपन्थिनौ ॥ ३४ ॥`,
    tr: `indriyasyendriyasyārthe
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;rāga-dveṣau vyavasthitau
tayor na vaśam āgacchet
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tau hy asya paripanthinau`,
    wbw_en: `indriyasya—of the senses; indriyasya arthe—in the sense objects; rāga—attachment; dveṣau—also in detachment; vyavasthitau—put under regulations; tayoḥ—of them; na—never; vaśam—control; āgacchet—one should come; tau—those; hi—certainly are; asya—his; paripanthinau—stumbling blocks.`,
    wbw_ru: ``,
    tr_en: `Attraction and repulsion for sense objects are felt by embodied beings, but one should not fall under the control of senses and sense objects because they are stumbling blocks on the path of self-realization.`,
    tr_ru: ``,
    pur_en: `Those who are in Kṛṣṇa consciousness are naturally reluctant to engage in material sense gratifications. But those who are not in such consciousness should follow the rules and regulations of the revealed scriptures. Unrestricted sense enjoyment is the cause of material encagement, but one who follows the rules and regulations of the revealed scriptures does not become entangled by the sense objects. For example, sex enjoyment is a necessity for the conditioned soul, and sex enjoyment is allowed under the license of marriage ties. For example, according to scriptural injunctions, one is forbidden to engage in sex relationships with any women other than one's wife. All other women are to be considered as one's mother. But, in spite of such injunctions, a man is still inclined to have sex relationships with other women. These propensities are to be curbed; otherwise they will be stumbling blocks on the path of self-realization. As long as the material body is there, the necessities of the material body are allowed, but under rules and regulations. And yet, we should not rely upon the control of such allowances. One has to follow those rules and regulations, unattached to them, because practice of sense gratifications under regulations may also lead one to go astray-as much as there is always the chance of an accident, even on the royal roads. Although they may be very carefully maintained, no one can guarantee that there will be no danger even on the safest road. The sense enjoyment spirit has been current a very long, long time, owing to material association. Therefore, in spite of regulated sense enjoyment, there is every chance of falling down; therefore any attachment for regulated sense enjoyment must also be avoided by all means. But action in the loving service of Kṛṣṇa detaches one from all kinds of sensory activities. Therefore, no one should try to be detached from Kṛṣṇa consciousness at any stage of life. The whole purpose of detachment from all kinds of sense attachment is ultimately to become situated on the platform of Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/34',
  },
  {
    n: 35,
    skr: `श्रेयान्स्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात् ।
स्वधर्मे निधनं श्रेयः परधर्मो भयावहः ॥ ३५ ॥`,
    tr: `śreyān sva-dharmo viguṇaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;para-dharmāt sv-anuṣṭhitāt
sva-dharme nidhanaṁ śreyaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;para-dharmo bhayāvahaḥ`,
    wbw_en: `śreyān—far better; sva-dharmaḥ—one's prescribed duties; viguṇaḥ—even faulty; para-dharmāt—from duties mentioned for others; svanuṣthitāt—than perfectly done; sva-dharme—in one's prescribed duties; nidhanam—destruction; śreyaḥ—better; para-dharmaḥ—duties prescribed for others; bhaya-āvahaḥ—dangerous.`,
    wbw_ru: ``,
    tr_en: `It is far better to discharge one's prescribed duties, even though they may be faulty, than another's duties. Destruction in the course of performing one's own duty is better than engaging in another's duties, for to follow another's path is dangerous.`,
    tr_ru: ``,
    pur_en: `One should therefore discharge his prescribed duties in full Kṛṣṇa consciousness rather than those prescribed for others. Prescribed duties complement one's psychophysical condition, under the spell of the modes of material nature. Spiritual duties are as ordered by the spiritual master, for the transcendental service of Kṛṣṇa. But both materially or spiritually, one should stick to his prescribed duties even up to death, rather than imitate another's prescribed duties. Duties on the spiritual platform and duties on the material platform may be different, but the principle of following the authorized direction is always good for the performer. When one is under the spell of the modes of material nature, one should follow the prescribed rules for particular situations and should not imitate others. For example, a brāhmaṇa, who is in the mode of goodness, is nonviolent, whereas a kṣatriya, who is in the mode of passion, is allowed to be violent. As such, for a kṣatriya it is better to be vanquished following the rules of violence than to imitate a brāhmaṇa who follows the principles of nonviolence. Everyone has to cleanse his heart by a gradual process, not abruptly. However, when one transcends the modes of material nature and is fully situated in Kṛṣṇa consciousness, he can perform anything and everything under the direction of the bona fide spiritual master. In that complete stage of Kṛṣṇa consciousness, the kṣatriya may act as a brāhmaṇa, or a brāhmaṇa may act as a kṣatriya. In the transcendental stage, the distinctions of the material world do not apply. For example, Viśvāmitra was originally a kṣatriya, but later on he acted as a brāhmaṇa, whereas Paraśurāma was a brāhmaṇa, but later on he acted as a kṣatriya. Being transcendentally situated, they could do so; but as long as one is on the material platform, he must perform his duties according to the modes of material nature. At the same time, he must have a full sense of Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/35',
  },
  {
    n: 36,
    skr: `अर्जुन उवाच ।
अथ केन प्रयुक्तोऽयं पापं चरति पूरुषः ।
अनिच्छन्नपि वार्ष्णेय बलादिव नियोजितः ॥ ३६ ॥`,
    tr: `arjuna uvāca
atha kena prayukto 'yaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pāpaṁ carati pūruṣaḥ
anicchann api vārṣṇeya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;balād iva niyojitaḥ`,
    wbw_en: `arjunaḥ uvāca—Arjuna said; atha—hereafter; kena—by what; prayuktaḥ—impelled; ayam—one; pāpam—sins; carati—acts; pūruṣaḥ—a man; anicchan—without desiring; api—although; vārṣṇeya—O descendant of Vṛṣṇi; balāt—by force; iva—as if; niyojitaḥ—engaged.`,
    wbw_ru: ``,
    tr_en: `Arjuna said: O descendant of Vṛṣṇi, by what is one impelled to sinful acts, even unwillingly, as if engaged by force?`,
    tr_ru: ``,
    pur_en: `A living entity, as part and parcel of the Supreme, is originally spiritual, pure, and free from all material contaminations. Therefore, by nature he is not subjected to the sins of the material world. But when he is in contact with the material nature, he acts in many sinful ways without hesitation, and sometimes even against his will. As such, Arjuna's question to Kṛṣṇa is very sanguine, as to the perverted nature of the living entities. Although the living entity sometimes does not want to act in sin, he is still forced to act. Sinful actions are not, however, impelled by the Supersoul within, but are due to another cause, as the Lord explains in the next verse.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/36',
  },
  {
    n: 37,
    skr: `श्रीभगवानुवाच ।
काम एष क्रोध एष रजोगुणसमुद्भवः ।
महाशनो महापाप्मा विद्ध्येनमिह वैरिणम् ॥ ३७ ॥`,
    tr: `śrī-bhagavān uvāca
kāma eṣa krodha eṣa
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;rajo-guṇa-samudbhavaḥ
mahāśano mahā-pāpmā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;viddhy enam iha vairiṇam`,
    wbw_en: `śrī bhagavān uvāca—the Personality of Godhead said; kāmaḥ—lust; eṣaḥ—all these; krodhaḥ—wrath; eṣaḥ—all these; rajo-guṇa—the mode of passion; samudbhavaḥ—born of; mahā-śanaḥ—all-devouring; mahā-pāpmā—greatly sinful; viddhi—know; enam—this; iha—in the material world; vairiṇam—greatest enemy.`,
    wbw_ru: ``,
    tr_en: `The Blessed Lord said: It is lust only, Arjuna, which is born of contact with the material modes of passion and later transformed into wrath, and which is the all-devouring, sinful enemy of this world.`,
    tr_ru: ``,
    pur_en: `When a living entity comes in contact with the material creation, his eternal love for Kṛṣṇa is transformed into lust, in association with the mode of passion. Or, in other words, the sense of love of God becomes transformed into lust, as milk in contact with sour tamarind is transformed into yogurt. Then again, when lust is unsatisfied, it turns into wrath; wrath is transformed into illusion, and illusion continues the material existence. Therefore, lust is the greatest enemy of the living entity, and it is lust only which induces the pure living entity to remain entangled in the material world. Wrath is the manifestation of the mode of ignorance; these modes exhibit themselves as wrath and other corollaries. If, therefore, the modes of passion, instead of being degraded into the modes of ignorance, are elevated to the modes of goodness by the prescribed method of living and acting, then one can be saved from the degradation of wrath by spiritual attachment.
The Supreme Personality of Godhead expanded Himself into many for His ever-increasing spiritual bliss, and the living entities are parts and parcels of this spiritual bliss. They also have partial independence, but by misuse of their independence, when the service attitude is transformed into the propensity for sense enjoyment, they come under the sway of lust. This material creation is created by the Lord to give a facility to the conditioned souls to fulfill these lustful propensities, and when they are completely baffled by prolonged lustful activities, the living entities begin to inquire about their real position.
This inquiry is the beginning of the Vedānta-sūtras, wherein it is said, athāto brahma-jijñāsā: one should inquire into the Supreme. And the Supreme is defined in Śrīmad-Bhāgavatam as janmādyasya yato 'nvayād itarataś ca, or, "The origin of everything is the Supreme Brahman." Therefore, the origin of lust is also in the Supreme. If, therefore, lust is transformed into love for the Supreme, or transformed into Kṛṣṇa consciousness—or, in other words, desiring everything for Kṛṣṇa—then both lust and wrath can be spiritualized. Hanumān, the great servitor of Lord Rama, engaged his wrath upon his enemies for the satisfaction of the Lord. Therefore, lust and wrath, when they are employed in Kṛṣṇa consciousness, become our friends instead of our enemies.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/37',
  },
  {
    n: 38,
    skr: `धूमेनाव्रियते वह्निर्यथादर्शो मलेन च ।
यथोल्बेनावृतो गर्भस्तथा तेनेदमावृतम् ॥ ३८ ॥`,
    tr: `dhūmenāvriyate vahnir
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yathādarśo malena ca
yatholbenāvṛto garbhas
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tathā tenedam āvṛtam`,
    wbw_en: `dhūmena—by smoke; āvriyate—covered; vahniḥ—fire; yathā—just as; ādarśaḥ—mirror; malena—by dust; ca—also; yathā—just as; ulbena—by the womb; āvṛtaḥ—is covered; garbhaḥ—embryo; tathā-so; tena—by that lust; idam—this; āvṛtam—is covered.`,
    wbw_ru: ``,
    tr_en: `As fire is covered by smoke, as a mirror is covered by dust, or as the embryo is covered by the womb, similarly, the living entity is covered by different degrees of this lust.`,
    tr_ru: ``,
    pur_en: `There are three degrees of covering of the living entity by which his pure consciousness is obscured. This covering is but lust under different manifestations like smoke in the fire, dust on the mirror, and the womb about the embryo. When lust is compared to smoke, it is understood that the fire of the living spark can be a little perceived. In other words, when the living entity exhibits his Kṛṣṇa consciousness slightly, he may be likened to the fire covered by smoke. Although fire is necessary where there is smoke, there is no overt manifestation of fire in the early stage. This stage is like the beginning of Kṛṣṇa consciousness. The dust on the mirror refers to a cleansing process of the mirror of the mind by so many spiritual methods. The best process is to chant the holy names of the Lord. The embryo covered by the womb is an analogy illustrating a helpless position, for the child in the womb is so helpless that he cannot even move. This stage of living condition can be compared to that of the trees. The trees are also living entities, but they have been put in such a condition of life by such a great exhibition of lust that they are almost void of all consciousness. The covered mirror is compared to the birds and beasts, and the smoke covered fire is compared to the human being. In the form of a human being, the living entity may revive a little Kṛṣṇa consciousness, and, if he makes further development, the fire of spiritual life can be kindled in the human form of life. By careful handling of the smoke in the fire, the fire can be made to blaze. Therefore the human form of life is a chance for the living entity to escape the entanglement of material existence. In the human form of life, one can conquer the enemy, lust, by cultivation of Kṛṣṇa consciousness under able guidance.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/38',
  },
  {
    n: 39,
    skr: `आवृतं ज्ञानमेतेन ज्ञानिनो नित्यवैरिणा ।
कामरूपेण कौन्तेय दुष्पूरेणानलेन च ॥ ३९ ॥`,
    tr: `āvṛtaṁ jñānam etena
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;jñānino nitya-vairiṇā
kāma-rūpeṇa kaunteya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;duṣpūreṇānalena ca`,
    wbw_en: `āvṛtam—covered; jñānam—pure consciousness; etena—by this; jñāninaḥ—of the knower; nitya-vairiṇā—eternal enemy; kāma-rūpeṇa—in the form of lust; kaunteya—O son of Kuntī; duṣpūreṇa—never to be satisfied; analena—by the fire; ca—also.`,
    wbw_ru: ``,
    tr_en: `Thus, a man's pure consciousness is covered by his eternal enemy in the form of lust, which is never satisfied and which burns like fire.`,
    tr_ru: ``,
    pur_en: `It is said in the Manu-smṛti that lust cannot be satisfied by any amount of sense enjoyment, just as fire is never extinguished by a constant supply of fuel. In the material world, the center of all activities is sex, and thus this material world is called maithuṇya-āgāra, or the shackles of sex life. In the ordinary prison house, criminals are kept within bars; similarly, the criminals who are disobedient to the laws of the Lord are shackled by sex life. Advancement of material civilization on the basis of sense gratification means increasing the duration of the material existence of a living entity. Therefore, this lust is the symbol of ignorance by which the living entity is kept within the material world. While one enjoys sense gratification, it may be that there is some feeling of happiness, but actually that so-called feeling of happiness is the ultimate enemy of the sense enjoyer.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/39',
  },
  {
    n: 40,
    skr: `इन्द्रियाणि मनो बुद्धिरस्याधिष्ठानमुच्यते ।
एतैर्विमोहयत्येष ज्ञानमावृत्य देहिनम् ॥ ४० ॥`,
    tr: `indriyāṇi mano buddhir
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;asyādhiṣṭhānam ucyate
etair vimohayaty eṣa
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;jñānam āvṛtya dehinam`,
    wbw_en: `indriyāṇi—the senses; manaḥ—the mind; buddhiḥ—the intelligence; asya—of the lust; adhiṣṭhānam—sitting place; ucyate—called; etaiḥ—by all these; vimohayati—bewilders; eṣaḥ—of this; jñānam—knowledge; āvṛtya—covering; dehinam—the embodied.`,
    wbw_ru: ``,
    tr_en: `The senses, the mind and the intelligence are the sitting places of this lust, which veils the real knowledge of the living entity and bewilders him.`,
    tr_ru: ``,
    pur_en: `The enemy has captured different strategic positions in the body of the conditioned soul, and therefore Lord Kṛṣṇa is giving hints of those places, so that one who wants to conquer the enemy may know where he can be found. Mind is the center of all the activities of the senses, and thus the mind is the reservoir of all ideas of sense gratification; and, as a result, the mind and the senses become the repositories of lust. Next, the intelligence department becomes the capital of such lustful propensities. Intelligence is the immediate next-door neighbor of the spirit soul. Lusty intelligence influences the spirit soul to acquire the false ego and identify itself with matter, and thus with the mind and senses. The spirit soul becomes addicted to enjoying the material senses and mistakes this as true happiness. This false identification of the spirit soul is very nicely explained in the Śrīmad-Bhāgavatam:
yasyātma-buddhiḥ kuṇāpe tri-dhātuke
sva-dhīḥ kalatrādiṣu bhauma idyadhīḥ
yat-tīrtha-buddhiḥ salite na karhicij
janeṣv abhijñeṣu sa eva gokharaḥ.
"A human being who identifies this body made of three elements with his self, who considers the by-products of the body to be his kinsmen, who considers the land of birth as worshipable, and who goes to the place of pilgrimage simply to take a bath rather than meet men of transcendental knowledge there, is to be considered as an ass or a cow."`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/40',
  },
  {
    n: 41,
    skr: `तस्मात्त्वमिन्द्रियाण्यादौ नियम्य भरतर्षभ ।
पाप्मानं प्रजहि ह्येनं ज्ञानविज्ञाननाशनम् ॥ ४१ ॥`,
    tr: `tasmāt tvam indriyāṇy ādau
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;niyamya bharatarṣabha
pāpmānaṁ prajahi hy enaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;jñāna-vijñāna-nāśanam`,
    wbw_en: `tasmāt—therefore; tvam-you; indriyāṇi—senses; ādau—in the beginning; niyamya—by regulating; bharatarṣabha—O chief amongst the descendants of Bharata; pāpmānam—the great symbol of sin; prajahi—curb; hi—certainly; enam—this; jñāna—knowledge; vijñāna—scientific knowledge of the pure soul; nāśanam—destroyer.`,
    wbw_ru: ``,
    tr_en: `Therefore, O Arjuna, best of the Bhāratas, in the very beginning curb this great symbol of sin [lust] by regulating the senses, and slay this destroyer of knowledge and self-realization.`,
    tr_ru: ``,
    pur_en: `The Lord advised Arjuna to regulate the senses from the very beginning so that he could curb the greatest sinful enemy, lust, which destroys the urge for self-realization, and specifically, knowledge of the self. Jñānam refers to knowledge of self as distinguished from non-self, or, in other words, knowledge that the spirit soul is not the body. Vijñānam refers to specific knowledge of the spirit soul and knowledge of one's constitutional position and his relationship to the Supreme Soul. It is explained thus in the Śrīmad-Bhāgavatam: jñānaṁ parama-guhyaṁ me yad-vijñāna-samanvitam / sarahasyaṁ tad-aṅgaṁ ca gṛhāna gaditaṁ mayā: "The knowledge of the self and the Supreme Self is very confidential and mysterious, being veiled by māyā, but such knowledge and specific realization can be understood if it is explained by the Lord Himself." Bhagavad-gītā gives us that knowledge, specifically knowledge of the self. The living entities are parts and parcels of the Lord, and therefore they are simply meant to serve the Lord. This consciousness is called Kṛṣṇa consciousness. So, from the very beginning of life one has to learn this Kṛṣṇa consciousness, and thereby one may become fully Kṛṣṇa conscious and act accordingly.
Lust is only the perverted reflection of the love of God which is natural for every living entity. But if one is educated in Kṛṣṇa consciousness from the very beginning, that natural love of God cannot deteriorate into lust. When love of God deteriorates into lust, it is very difficult to return to the normal condition. Nonetheless, Kṛṣṇa consciousness is so powerful that even a late beginner can become a lover of God by following the regulative principles of devotional service. So, from any stage of life, or from the time of understanding its urgency, one can begin regulating the senses in Kṛṣṇa consciousness, devotional service of the Lord, and turn the lust into love of Godhead—the highest perfectional stage of human life.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/41',
  },
  {
    n: 42,
    skr: `इन्द्रियाणि पराण्याहुरिन्द्रियेभ्यः परं मनः ।
मनसस्तु परा बुद्धिर्यो बुद्धेः परतस्तु सः ॥ ४२ ॥`,
    tr: `indriyāṇi parāṇy āhur
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;indriyebhyaḥ paraṁ manaḥ
manasas tu parā buddhir
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yo buddheḥ paratas tu saḥ`,
    wbw_en: `indriyāṇī—senses; parāṇi—superior; āhuḥ—is said; indriyebhyaḥ—more than the senses; param—superior; manaḥ—the mind; manasaḥ—more than the mind; tu—also; parā—superior; buddhiḥ—intelligence; yaḥ—one which; buddheḥ—more than the intelligence; parataḥ—superior; tu—but; saḥ—he.`,
    wbw_ru: ``,
    tr_en: `The working senses are superior to dull matter; mind is higher than the senses; intelligence is still higher than the mind; and he [the soul] is even higher than the intelligence.`,
    tr_ru: ``,
    pur_en: `The senses are different outlets for the activities of lust. Lust is reserved within the body, but it is given vent through the senses. Therefore, the senses are superior to the body as a whole. These outlets are not in use when there is superior consciousness, or Kṛṣṇa consciousness. In Kṛṣṇa consciousness the soul makes direct connection with the Supreme Personality of Godhead; therefore the bodily functions, as described here, ultimately end in the Supreme Soul. Bodily action means the functions of the senses, and stopping the senses means stopping all bodily actions. But since the mind is active, then, even though the body may be silent and at rest, the mind will act—as it does during dreaming. But, above the mind there is the determination of the intelligence, and above the intelligence is the soul proper. If, therefore, the soul is directly engaged with the Supreme, naturally all other subordinates, namely, the intelligence, mind and the senses, will be automatically engaged. In the Kaṭha Upaniṣad there is a passage in which it is said that the objects of sense gratification are superior to the senses, and mind is superior to the sense objects. If, therefore, the mind is directly engaged in the service of the Lord constantly, then there is no chance of the senses becoming engaged in other ways. This mental attitude has already been explained. If the mind is engaged in the transcendental service of the Lord, there is no chance of its being engaged in the lower propensities. In the Kaṭha Upaniṣad the soul has been described as mahān, the great. Therefore the soul is above all—namely, the sense objects, the senses, the mind and the intelligence. Therefore, directly understanding the constitutional position of the soul is the solution of the whole problem.
With intelligence one has to seek out the constitutional position of the soul and then engage the mind always in Kṛṣṇa consciousness. That solves the whole problem. A neophyte spiritualist is generally advised to keep aloof from the objects of senses. One has to strengthen the mind by use of intelligence. If by intelligence one engages one's mind in Kṛṣṇa consciousness, by complete surrender unto the Supreme Personality of Godhead, then, automatically, the mind becomes stronger, and even though the senses are very strong, like serpents, they will be no more effective than serpents with broken fangs. But even though the soul is the master of intelligence and mind, and the senses also, still, unless it is strengthened by association with Kṛṣṇa in Kṛṣṇa consciousness, there is every chance of falling down due to the agitated mind.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/42',
  },
  {
    n: 43,
    skr: `एवं बुद्धेः परं बुद्ध्वा संस्तभ्यात्मानमात्मना ।
जहि शत्रुं महाबाहो कामरूपं दुरासदम् ॥ ४३ ॥`,
    tr: `evaṁ buddheḥ paraṁ buddhvā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;saṁstabhyātmānam ātmanā
jahi śatruṁ mahā-bāho
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kāma-rūpaṁ durāsadam`,
    wbw_en: `evam—thus; buddheḥ—of intelligence; param—superior; buddhvā—so knowing; saṁstabhya—by steadying; ātmānam—the mind; ātmanā—by deliberate intelligence; jahi—conquer; śatrum—the enemy; mahā-bāho—O mighty-armed one; kāma-rūpam—the form of lust; durāsadam—formidable.`,
    wbw_ru: ``,
    tr_en: `Thus knowing oneself to be transcendental to material senses, mind and intelligence, one should control the lower self by the higher self and thus—by spiritual strength—conquer this insatiable enemy known as lust.`,
    tr_ru: ``,
    pur_en: `This Third Chapter of the Bhagavad-gītā is conclusively directive to Kṛṣṇa consciousness by knowing oneself as the eternal servitor of the Supreme Personality of Godhead, without considering impersonal voidness as the ultimate end. In the material existence of life, one is certainly influenced by propensities for lust and desire for dominating the resources of material nature. Desire for overlording and sense gratification are the greatest enemies of the conditioned soul; but by the strength of Kṛṣṇa consciousness, one can control the material senses, the mind and the intelligence. One may not give up work and prescribed duties all of a sudden; but by gradually developing Kṛṣṇa consciousness, one can be situated in a transcendental position without being influenced by the material senses and the mind—by steady intelligence directed toward one's pure identity. This is the sum total of this chapter. In the immature stage of material existence, philosophical speculations and artificial attempts to control the senses by the so-called practice of yogic postures can never help a man toward spiritual life. He must be trained in Kṛṣṇa consciousness by higher intelligence.
Thus end the Bhaktivedanta Purports to the Third Chapter of the Śrīmad-Bhagavad-gītā in the matter of Karma-yoga, or the Discharge of One's Prescribed Duty in Kṛṣṇa Consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/3/43',
  }
  ],

  7: [
    {
      n: 1,
      skr: 'श्रीभगवानुवाच ।\nमय्यासक्तमनाः पार्थ योगं युञ्जन्मदाश्रयः ।\nअसंशयं समग्रं मां यथा ज्ञास्यसि तच्छृणु ॥ १ ॥',
      tr: 'śrī-bhagavān uvāca\nmayy āsakta-manāḥ pārtha\nyogaṁ yuñjan mad-āśrayaḥ\nasaṁśayaṁ samagraṁ māṁ\nyathā jñāsyasi tac chṛṇu',
      wbw_ru: 'śrī-bhagavān uvāca — Верховная Личность Бога сказал; mayi — ко Мне; āsakta-manāḥ — умом привязанный; pārtha — О сын Притхи; yogam — йога; yuñjan — практикуя; mat-āśrayaḥ — в сознании Меня; asaṁśayam — без сомнения; samagram — полностью; mām — Меня; yathā — как; jñāsyasi — познаешь; tat — то; śṛṇu — услышь.',
      wbw_en: 'śrī-bhagavān uvāca—the Supreme Lord said; mayi—unto Me; āsakta-manāḥ—mind attached; pārtha—O son of Pṛthā; yogam—self-realization; yuñjan—so practicing; mat-āśrayaḥ—in consciousness of Me; asaṁśayam—without doubt; samagram—completely; mām—unto Me; yathā—as much as; jñāsyasi—you can know; tat—that; śṛṇu—try to hear.',
      tr_ru: 'Теперь услышь, О сын Пр̣тхи [Арджуна], как, практикуя йогу в полном сознании Меня, с умом, привязанным ко Мне, ты можешь познать Меня в полноте, свободно от сомнения.',
      tr_en: 'Now hear, O son of Pṛthā [Arjuna], how by practicing yoga in full consciousness of Me, with mind attached to Me, you can know Me in full, free from doubt.',
      pur_ru: 'Вскоре будет добавлено...',
      pur_en: 'In this Seventh Chapter of Bhagavad-gītā, the nature of Kṛṣṇa consciousness is fully described. Kṛṣṇa is full in all opulences, and how He manifests such opulences is described herein. Also, four kinds of fortunate people who become attached to Kṛṣṇa, and four kinds of unfortunate people who never take to Kṛṣṇa are described in this chapter.\nIn the first six chapters of Bhagavad-gītā, the living entity has been described as nonmaterial spirit soul which is capable of elevating himself to self-realization by different types of yogas. At the end of the Sixth Chapter, it has been clearly stated that the steady concentration of the mind upon Kṛṣṇa, or in other words Kṛṣṇa consciousness, is the highest form of all yoga. By concentrating one\'s mind upon Kṛṣṇa, one is able to know the Absolute Truth completely, but not otherwise. Impersonal brahmajyoti or localized Paramātmā realization is not perfect knowledge of the Absolute Truth because it is partial. Full and scientific knowledge is Kṛṣṇa, and everything is revealed to the person in Kṛṣṇa consciousness. In complete Kṛṣṇa consciousness one knows that Kṛṣṇa is ultimate knowledge beyond any doubts. Different types of yoga are only steppingstones on the path of Kṛṣṇa consciousness. One who takes directly to Kṛṣṇa consciousness automatically knows about brahmajyoti and Paramātmā in full. By practice of Kṛṣṇa consciousness yoga, one can know everything in full—namely the Absolute Truth, the living entities, the material nature, and their manifestations with paraphernalia.\nOne should therefore begin yoga practice as directed in the last verse of the Sixth Chapter. Concentration of the mind upon Kṛṣṇa the Supreme is made possible by prescribed devotional service in nine different forms, of which śravaṇam is the first and most important. The Lord therefore says to Arjuna, "tat śṛṇu," or "Hear from Me." No one can be a greater authority than Kṛṣṇa, and therefore by hearing from Him one receives the greatest opportunity for progress in Kṛṣṇa consciousness. One has therefore to learn from Kṛṣṇa directly or from a pure devotee of Kṛṣṇa—and not from a nondevotee upstart, puffed up with academic education.\nIn the Śrīmad-Bhāgavatam this process of understanding Kṛṣṇa, the Supreme Personality of Godhead, the Absolute Truth, is described in the Second Chapter of the First Canto as follows:\nśṛṇvatāṁ sva-kathāṁ kṛṣṇaḥ puṇya-śravaṇa-kīrtanaḥ\nhṛdyantaḥstho hy abhadrāṇi vidbunoti suhṛt satām.\nnaṣṭa-prāyeṣv abhadreṣu nityaṁ bhāgavata-sevayā\nbhagavaty uttama-śloke bhaktir bhavati naiṣṭhikī.\ntadā rajas-tamo-bhāvāḥ kāma-lobhadayaś ca ye\nceta etair anāviddhaṁ sthitaṁ sattve prasīdati.\nevam prasanna-manaso bhagavad-bhakti-yogataḥ\nbhagavat-tattva-vijñānaṁ mukta-saṅgasya jāyate.\nbhidyate hṛdaya-granthiś chidyante sarva-saṁśayāḥ\nkṣīyante cāsya karmāṇi dṛṣṭa evātmanīśvare.\n"To hear about Kṛṣṇa from Vedic literatures, or to hear from Him directly through the Bhagavad-gītā, is itself righteous activity. And for one who hears about Kṛṣṇa, Lord Kṛṣṇa, who is dwelling in everyone\'\s heart, acts as a best-wishing friend and purifies the devotee who constantly engages in hearing of Him. In this way, a devotee naturally develops his dormant transcendental knowledge. As he hears more about Kṛṣṇa from the Bhāgavatam and from the devotees, he becomes fixed in the devotional service of the Lord. By development of devotional service one becomes freed from the modes of passion and ignorance, and thus material lusts and avarice are diminished. When these impurities are wiped away, the candidate remains steady in his position of pure goodness, becomes enlivened by devotional service and understands the science of God perfectly. Thus bhakti-yoga severs the hard knot of material affection and enables one to come at once to the stage of \'\asaṁśayaṁ samagram,\'\ understanding of the Supreme Absolute Truth Personality of Godhead." (Bhāg. 1.2.17-21)\nTherefore only by hearing from Kṛṣṇa or from His devotee in Kṛṣṇa consciousness can one understand the science of Kṛṣṇa.',
      audio: 'https://prabhupadabooks.com/bg/7/1'

      tr: `jñānaṁ te 'haṁ sa-vijñānam\nidaṁ vakṣyāmy aśeṣataḥ\nyaj jñātvā neha bhūyo 'nyaj\njñātavyam avaśiṣyate`,

      tr_ru: 'Из многих тысяч среди людей, один может усердствовать для совершенства, и из тех, кто достигли совершенства, с трудом один знает Меня в истине.',

      pur_ru: 'Вскоре будет добавлено...',
      pur_en: 'There are various grades of men, and out of many thousands one may be sufficiently interested in transcendental realization to try to know what is the self, what is the body, and what is the Absolute Truth. Generally mankind is simply engaged in the animal propensities, namely eating, sleeping, defending and mating, and hardly anyone is interested in transcendental knowledge. The first six chapters of the Gītā are meant for those who are interested in transcendental knowledge, in understanding the self, the Superself and the process of realization by jñāna-yoga, dhyāna-yoga, and discrimination of the self from matter. However, Kṛṣṇa can only be known by persons who are in Kṛṣṇa consciousness. Other transcendentalists may achieve impersonal Brahman realization, for this is easier than understanding Kṛṣṇa. Kṛṣṇa is the Supreme Person, but at the same time He is beyond the knowledge of Brahman and Paramātmā. The yogīs and jñānīs are confused in their attempts to understand Kṛṣṇa, although the greatest of the impersonalists, Śrīpāda Śaṅkarācārya, has admitted in his Gītā commentary that Kṛṣṇa is the Supreme Personality of Godhead. But his followers do not accept Kṛṣṇa as such, for it is very difficult to know Kṛṣṇa, even though one has transcendental realization of impersonal Brahman.\nKṛṣṇa is the Supreme Personality of Godhead, the cause of all causes, the primeval Lord Govinda. Īśvaraḥ paramaḥ kṛṣṇaḥ sac-cid-ānanda-vigrahaḥ anādir ādir govindaḥ sarva-kāraṇa-kāraṇam. It is very difficult for the nondevotees to know Him. Although nondevotees declare that the path of bhakti or devotional service is very easy, they cannot practice it. If the path of bhakti is so easy, as the nondevotee class of men proclaim, then why do they take up the difficult path? Actually the path of bhakti is not easy. The so-called path of bhakti practiced by unauthorized persons without knowledge of bhakti may be easy, but when it is practiced factually according to the rules and regulations, the speculative scholars and philosophers fall away from the path. Śrīla Rūpa Gosvāmī writes in his Bhakti-rasāmṛta-sindhu:\nśruti-smṛti-purāṇādi-pañcarātra-vidhiṁ vinā\naikāntikī harer bhaktir utpātāyaiva kalpate.\n"Devotional service of the Lord that ignores the authorized Vedic literatures like the Upaniṣads, Purāṇas, Nārada-pañcarātra, etc., is simply an unnecessary disturbance in society."\nIt is not possible for the Brahman realized impersonalist or the Paramātmā realized yogī to understand Kṛṣṇa, the Supreme Personality of Godhead as the son of mother Yaśodā or the charioteer of Arjuna. Even the great demigods are sometimes confused about Kṛṣṇa: "muhyanti yat sūrayaḥ," "māṁ tu veda na kaścana." "No one knows Me as I am," the Lord says. And if one does know Him, then "sa mahātmā sudurlabhaḥ." "Such a great soul is very rare." Therefore unless one practices devotional service to the Lord, he cannot know Kṛṣṇa as He is (tattvataḥ), even though one is a great scholar or philosopher. Only the pure devotees can know something of the inconceivable transcendental qualities in Kṛṣṇa, in the cause of all causes, in His omnipotence and opulence, and in His wealth, fame, strength, beauty, knowledge and renunciation, because Kṛṣṇa is benevolently inclined to His devotees. He is the last word in Brahman realization, and the devotees alone can realize Him as He is. Therefore it is said:\nataḥ śrī-kṛṣṇa-nāmādi na bhaved grāhyam indriyāiḥ\nsevonmukhe hi jihvādau svayam eva sphuraty adaḥ\n"No one can understand Kṛṣṇa as He is by the blunt material senses. But He reveals Himself to the devotees, being pleased with them for their transcendental loving service unto Him." (Padma Purāṇa)',
