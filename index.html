kṣudraṁ hṛdaya-daurbalyaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tyaktvottiṣṭha parantapa`,
    wbw_en: `klaibyam—impotence; mā—do not; sma—take it; gamaḥ—go in; pārtha—O son of Pṛthā; na—never; etat—like this; tvayi—unto you; upapadyate—is befitting; kṣudram—very little; hṛdaya—heart; daurbalyam—weakness; tyaktvā—giving up; uttiṣṭha—get up; parantapa—O chastiser of the enemies.`,
    wbw_ru: ``,
    tr_en: `O son of Pṛthā, do not yield to this degrading impotence. It does not become you. Give up such petty weakness of heart and arise, O chastiser of the enemy.`,
    tr_ru: ``,
    pur_en: `Arjuna was addressed as the "son of Pṛthā," who happened to be the sister of Kṛṣṇa's father Vasudeva. Therefore Arjuna had a blood relationship with Kṛṣṇa. If the son of a ksatriya declines to fight, he is a kṣatriya in name only, and if the son of a brāhmaṇa acts impiously, he is a brāhmaṇa in name only. Such kṣatriyas and brāhmaṇas are unworthy sons of their fathers; therefore, Kṛṣṇa did not want Arjuna to become an unworthy son of a kṣatriya. Arjuna was the most intimate friend of Kṛṣṇa, and Kṛṣṇa was directly guiding him on the chariot; but in spite of all these credits, if Arjuna abandoned the battle, he would be committing an infamous act; therefore Kṛṣṇa said that such an attitude in Arjuna did not fit his personality. Arjuna might argue that he would give up the battle on the grounds of his magnanimous attitude for the most respectable Bhīṣma and his relatives, but Kṛṣṇa considered that sort of magnanimity not approved by authority. Therefore, such magnanimity or so-called nonviolence should be given up by persons like Arjuna under the direct guidance of Kṛṣṇa.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/3',
  },
  {
    n: 4,
    skr: `अर्जुन उवाच ।
कथं भीष्ममहं सङ्ख्ये द्रोणं च मधुसूदन ।
इषुभिः प्रतियोत्स्यामि पूजार्हावरिसूदन ॥ ४ ॥`,
    tr: `arjuna uvāca
kathaṁ bhīṣmam ahaṁ saṅkhye
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;droṇaṁ ca madhusūdana
iṣubhiḥ pratiyotsyāmi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pūjārhāv ari-sūdana`,
    wbw_en: `arjunaḥ uvāca—Arjuna said; katham—how; bhīṣmam—unto Bhīṣma; aham—I; saṅkhye—in the fight; droṇam—unto Droṇa; ca—also, madhusūdana—O killer of Madhu; iṣubhiḥ—with arrows; pratiyotsyāmi—shall counterattack; pūjā-arhau—those who are worshipable; arisūdana—O killer of the enemies.`,
    wbw_ru: ``,
    tr_en: `Arjuna said: O killer of Madhu [Kṛṣṇa], how can I counterattack with arrows in battle men like Bhīṣma and Droṇa, who are worthy of my worship?`,
    tr_ru: ``,
    pur_en: `Respectable superiors like Bhīṣma the grandfather and Droṇācārya the teacher are always worshipable. Even if they attack, they should not be counterattacked. It is general etiquette that superiors are not to be offered even a verbal fight. Even if they are sometimes harsh in behavior, they should not be harshly treated. Then, how is it possible for Arjuna to counterattack them? Would Kṛṣṇa ever attack His own grandfather, Ugrasena, or His teacher, Sāndīpani Muni? These were some of the arguments by Arjuna to Kṛṣṇa.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/4',
  },
  {
    n: 5,
    skr: `गुरूनहत्वा हि महानुभावान् श्रेयो भोक्तुं भैक्ष्यमपीह लोके ।
हत्वार्थकामांस्तु गुरूनिहैव भुञ्जीय भोगान् रुधिरप्रदिग्धान् ॥ ५ ॥`,
    tr: `gurūn ahatvā hi mahānubhāvān
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śreyo bhoktuṁ bhaikṣyam apīha loke
hatvārtha-kāmāṁs tu gurūn ihaiva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;bhuñjīya bhogān rudhira-pradigdhān`,
    wbw_en: `gurūn—the superiors; ahatvā—by killing; hi—certainly; mahā-anubhāvān—great souls; śreyaḥ—it is better; bhoktum—to enjoy life; bhaikṣyam—begging; api—even; iha—in this life; loke—in this world; hatvā—killing; artha—gain; kāmān—so desiring; tu—but; gurūn—superiors; iha—in this world; eva—certainly; bhuñjīya—has to enjoy; bhogān—enjoyable things; rudhira—blood; pradigdhān—tainted with.`,
    wbw_ru: ``,
    tr_en: `It is better to live in this world by begging than to live at the cost of the lives of great souls who are my teachers. Even though they are avaricious, they are nonetheless superiors. If they are killed, our spoils will be tainted with blood.`,
    tr_ru: ``,
    pur_en: `According to scriptural codes, a teacher who engages in an abominable action and has lost his sense of discrimination is fit to be abandoned. Bhīṣma and Droṇa were obliged to take the side of Duryodhana because of his financial assistance, although they should not have accepted such a position simply on financial considerations. Under the circumstances, they have lost the respectability of teachers. But Arjuna thinks that nevertheless they remain his superiors, and therefore to enjoy material profits after killing them would mean to enjoy spoils tainted with blood.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/5',
  },
  {
    n: 6,
    skr: `न चैतद्विद्मः कतरन्नो गरीयो यद्वा जयेम यदि वा नो जयेयुः ।
यानेव हत्वा न जिजीविषाम- स्तेऽवस्थिताः प्रमुखे धार्तराष्ट्राः ॥ ६ ॥`,
    tr: `na caitad vidmaḥ kataran no garīyo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yad vā jayema yadi vā no jayeyuḥ
yān eva hatvā na jijīviṣāmas
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;te 'vasthitāḥ pramukhe dhārtarāṣṭrāḥ`,
    wbw_en: `na—nor; ca—also; etat—this; vidmaḥ—do know; katarat—which; naḥ—us; garīyaḥ—better; yat—what; vā—either; jayema—conquer us; yadi—if; vā—or; naḥ—us; jayeyuḥ—conquer; yān—those; eva—certainly; hatvā—by killing; na—never; jijīviṣāmaḥ—want to live; te—all of them; avasthitāḥ—are situated; pramukhe—in the front; dhārtarāṣṭrāḥ—the sons of Dhṛtarāṣṭra.`,
    wbw_ru: ``,
    tr_en: `Nor do we know which is better—conquering them or being conquered by them. The sons of Dhṛtarāṣṭra, whom if we killed we should not care to live, are now standing before us on this battlefield.`,
    tr_ru: ``,
    pur_en: `Arjuna did not know whether he should fight and risk unnecessary violence, although fighting is the duty of the kṣatriyas, or whether he should refrain and live by begging. If he did not conquer the enemy, begging would be his only means of subsistence. Nor was there certainty of victory, because either side might emerge victorious. Even if victory awaited them (and their cause was justified), still, if the sons of Dhṛtarāṣṭra died in battle, it would be very difficult to live in their absence. Under the circumstances, that would be another kind of defeat for them. All these considerations by Arjuna definitely prove that he was not only a great devotee of the Lord but that he was also highly enlightened and had complete control over his mind and senses. His desire to live by begging, although he was born in the royal household, is another sign of detachment. He was truly virtuous, as these qualities, combined with his faith in the words of instruction of Śrī Kṛṣṇa (his spiritual master), indicate. It is concluded that Arjuna was quite fit for liberation. Unless the senses are controlled, there is no chance of elevation to the platform of knowledge, and without knowledge and devotion there is no chance of liberation. Arjuna was competent in all these attributes, over and above his enormous attributes in his material relationships.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/6',
  },
  {
    n: 7,
    skr: `कार्पण्यदोषोपहतस्वभावः पृच्छामि त्वां धर्मसम्मूढचेताः ।
यच्छ्रेयः स्यान्निश्चितं ब्रूहि तन्मे शिष्यस्तेऽहं शाधि मां त्वां प्रपन्नम् ॥ ७ ॥`,
    tr: `kārpaṇya-doṣopahata-svabhāvaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pṛcchāmi tvāṁ dharma-sammūḍha-cetāḥ
yac chreyaḥ syān niścitaṁ brūhi tan me
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śiṣyas te 'haṁ śādhi māṁ tvāṁ prapannam`,
    wbw_en: `kārpaṇya—miserly; doṣa—weakness; upahata—being inflicted by; svabhāvaḥ—characteristics; pṛcchāmi—I am asking; tvām—unto You; dharma—religion; saṁmūḍha—bewildered; cetāḥ—in heart; yat—what; śreyaḥ—all-good; syāt—may be; niścitam—confidently; brūhi—tell; tat—that; me—unto me; śiṣyaḥ—disciple; te—Your; aham—I am; śādhi—just instruct; mām—me; tvām—unto You; prapannam—surrendered.`,
    wbw_ru: ``,
    tr_en: `Now I am confused about my duty and have lost all composure because of weakness. In this condition I am asking You to tell me clearly what is best for me. Now I am Your disciple, and a soul surrendered unto You. Please instruct me.`,
    tr_ru: ``,
    pur_en: `By nature's own way the complete system of material activities is a source of perplexity for everyone. In every step there is perplexity, and therefore it behooves one to approach a bona fide spiritual master who can give one proper guidance for executing the purpose of life. All Vedic literatures advise us to approach a bona fide spiritual master to get free from the perplexities of life which happen without our desire. They are like a forest fire that somehow blazes without being set by anyone. Similarly, the world situation is such that perplexities of life automatically appear, without our wanting such confusion. No one wants fire, and yet it takes place, and we become perplexed. The Vedic wisdom therefore advises that in order to solve the perplexities of life and to understand the science of the solution, one must approach a spiritual master who is in the disciplic succession. A person with a bona fide spiritual master is supposed to know everything. One should not, therefore, remain in material perplexities but should approach a spiritual master. This is the purport of this verse.
Who is the man in material perplexities? It is he who does not understand the problems of life. In the Garga Upaniṣad the perplexed man is described as follows:
yo vā etad akṣaraṁ gārgy aviditvāsmāl lokāt praiti sa kṛpaṇaḥ
"He is a miserly man who does not solve the problems of life as a human and who thus quits this world like the cats and dogs, without understanding the science of self-realization." This human form of life is a most valuable asset for the living entity who can ultilize it for solving the problems of life; therefore, one who does not utilize this opportunity properly is a miser. On the other hand, there is the brāhmaṇa, or he who is intelligent enough to utilize this body to solve all the problems of life.
The kṛpaṇas, or miserly persons, waste their time in being overly affectionate for family, society, country, etc., in the material conception of life. One is often attached to family life, namely to wife, children and other members, on the basis of "skin disease." The kṛpaṇa thinks that he is able to protect his family members from death; or the kṛpaṇa thinks that his family or society can save him from the verge of death. Such family attachment can be found even in the lower animals who take care of children also. Being intelligent, Arjuna could understand that his affection for family members and his wish to protect them from death were the causes ot his perplexities. Although he could understand that his duty to fight was awaiting him, still, on account of miserly weakness, he could not discharge the duties. He is therefore asking Lord Kṛṣṇa, the supreme spiritual master, to make a definite solution. He offers himself to Kṛṣṇa as a disciple. He wants to stop friendly talks. Talks between the master and the disciple are serious, and now Arjuna wants to talk very seriously before the recognized spiritual master. Kṛṣṇa is therefore the original spiritual master of the science of Bhagavad-gītā, and Arjuna is the first disciple for understanding the Gītā. How Arjuna understands the Bhagavad-gītā is stated in the Gītā itself. And yet foolish mundane scholars explain that one need not submit to Kṛṣṇa as a person, but to "the unborn within Kṛṣṇa." There is no difference between Kṛṣṇa's within and without. And one who has no sense of this understanding is the greatest fool in trying to understand Bhagavad-gītā.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/7',
  },
  {
    n: 8,
    skr: `न हि प्रपश्यामि ममापनुद्याद् यच्छोकमुच्छोषणमिन्द्रियाणाम् ।
अवाप्य भूमावसपत्नमृद्धं राज्यं सुराणामपि चाधिपत्यम् ॥ ८ ॥`,
    tr: `na hi prapaśyāmi mamāpanudyād
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yac chokam ucchoṣaṇam indriyāṇām
avāpya bhūmāv asapatnam ṛddhaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;rājyaṁ surāṇām api cādhipatyam`,
    wbw_en: `na—do not; hi—certainly; prapaśyāmi—I see; mama—my; apanudyāt—they can drive away; yat—that; śokam—lamentation; ucchoṣaṇam—drying up; indriyāṇām—of the senses; avāpya—achieving; bhūmau—on the earth; asapatnam—without rival; ṛddham—prosperous; rājyam—kingdom; surāṇām—of the demigods; api—even; ca—also; ādhipatyam—supremacy.`,
    wbw_ru: ``,
    tr_en: `I can find no means to drive away this grief which is drying up my senses. I will not be able to destroy it even if I win an unrivalled kingdom on the earth with sovereignty like that of the demigods in heaven.`,
    tr_ru: ``,
    pur_en: `Although Arjuna was putting forward so many arguments based on knowledge of the principles of religion and moral codes, it appears that he was unable to solve his real problem without the help of the spiritual master, Lord Śrī Kṛṣṇa. He could understand that his so-called knowledge was useless in driving away his problems, which were drying up his whole existence; and it was impossible for him to solve such perplexities without the help of a spiritual master like Lord Kṛṣṇa. Academic knowledge, scholarship, high position, etc., are all useless in solving the problems of life; help can only be given by a spiritual master like Kṛṣṇa. Therefore, the conclusion is that a spiritual master who is one hundred percent Kṛṣṇa conscious is the bona fide spiritual master, for he can solve the problems of life. Lord Caitanya said that one who is master in the science of Kṛṣṇa consciousness, regardless of his social position, is the real spiritual master.
kibāvipra, kibā nyāsī, śūdra kene naya
yei kṛṣṇa-tattva-vettā, sei 'guru' haya.
(Caitanya-caritāmṛta, Madhya 8.127)
"It does not matter whether a person is a vipra [learned scholar in Vedic wisdom] or is born in a lower family, or is in the renounced order of life—if he is master in the science of Kṛṣṇa, he is the perfect and bona fide spiritual master." So without being a master in the science of Kṛṣṇa consciousness, no one is a bona fide spiritual master. It is also said in Vedic literatures:
ṣaṭ-karma-nipuṇo vipro mantra-tantra-viśāradaḥ
avaiṣṇavo gurur na syād vaiṣṇavaḥ śvapaco guruḥ
"A scholarly brāhmaṇa, expert in all subjects of Vedic knowledge, is unfit to become a spiritual master without being a Vaiṣṇava, or expert in the science of Kṛṣṇa consciousness. But a person born in a family of a lower caste can become a spiritual master if he is a Vaiṣṇava, or Kṛṣṇa conscious."
The problems of material existence—birth, old age, disease and death—cannot be counteracted by accumulation of wealth and economic development. In many parts of the world there are states which are replete with all facilities of life, which are full of wealth, and economically developed, yet the problems of material existence are still present. They are seeking peace in different ways, but they can achieve real happiness only if they consult Kṛṣṇa, or the Bhagavad-gītā and Śrīmad-Bhāgavatam—which constitute the science of Kṛṣṇa—or the bona fide representative of Kṛṣṇa, the man in Kṛṣṇa consciousness.
If economic development and material comforts could drive away one's lamentations for family, social, national or international inebrieties, then Arjuna would not have said that even an unrivalled kingdom on earth or supremacy like that of the demigods in the heavenly planets would not be able to drive away his lamentations. He sought, therefore, refuge in Kṛṣṇa consciousness, and that is the right path for peace and harmony. Economic development or supremacy over the world can be finished at any moment by the cataclysms of material nature. Even elevation into a higher planetary situation, as men are now seeking a place on the moon planet, can also be finished at one stroke. The Bhagavad-gītā confirms this: kṣīṇe puṇye martyalokaṁ viśanti "When the results of pious activities are finished, one falls down again from the peak of happiness to the lowest status of life." Many politicians of the world have fallen down in that way. Such downfalls only constitute more causes for lamentation.
Therefore, if we want to curb lamentation for good, then we have to take shelter of Kṛṣṇa, as Arjuna is seeking to do. So Arjuna asked Kṛṣṇa to solve his problem definitely, and that is the way of Kṛṣṇa consciousness.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/8',
  },
  {
    n: 9,
    skr: `सञ्जय उवाच ।
एवमुक्त्वा हृषीकेशं गुडाकेशः परन्तपः ।
न योत्स्य इति गोविन्दमुक्त्वा तूष्णीं बभूव ह ॥ ९ ॥`,
    tr: `sañjaya uvāca
evam uktvā hṛṣīkeśaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;guḍākeśaḥ parantapaḥ
na yotsya iti govindam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;uktvā tūṣṇīṁ babhūva ha`,
    wbw_en: `sañjayaḥ uvāca—Sañjaya said; evam—thus; uktvā—speaking; hṛṣīkeśam—unto Kṛṣṇa, the master of the senses; guḍākeśaḥ—Arjuna, the master at curbing ignorance; parantapaḥ—the chastiser of the enemies; na yotsye—I shall not fight; iti—thus; govindam—unto Kṛṣṇa, the giver of pleasure; uktvā—saying; tūṣṇīm—silent; babhūva—became; ha—certainly.`,
    wbw_ru: ``,
    tr_en: `Sañjaya said: Having spoken thus, Arjuna, chastiser of enemies, told Kṛṣṇa, "Govinda, I shall not fight," and fell silent.`,
    tr_ru: ``,
    pur_en: `Dhṛtarāṣṭra must have been very glad to understand that Arjuna was not going to fight and was instead leaving the battlefield for the begging profession. But Sañjaya disappointed him again in relating that Arjuna was competent to kill his enemies (parantapaḥ). Although Arjuna was for the time being overwhelmed with false grief due to family affection, he surrendered unto Kṛṣṇa, the supreme spiritual master, as a disciple. This indicated that he would soon be free from the false lamentation resulting from family affection and would be enlightened with perfect knowledge of self-realization, or Kṛṣṇa consciousness, and would then surely fight. Thus Dhṛtarāṣṭra's joy would be frustrated, since Arjuna would be enlightened by Kṛṣṇa and would fight to the end.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/9',
  },
  {
    n: 10,
    skr: `तमुवाच हृषीकेशः प्रहसन्निव भारत ।
सेनयोरुभयोर्मध्ये विषीदन्तमिदं वचः ॥ १० ॥`,
    tr: `tam uvāca hṛṣīkeśaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;prahasann iva bhārata
senayor ubhayor madhye
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;viṣīdantam idaṁ vacaḥ`,
    wbw_en: `tam—unto him; uvāca—said; hṛṣīkeśaḥ—the master of the senses, Kṛṣṇa; prahasan—smiling; iva—like that; bhārata—O Dhṛtarāṣṭra, descendant of Bharata; senayoḥ—of the armies; ubhayoḥ—of both parties; madhye—between; viṣīdantam—unto the lamenting one; idam—the following; vacaḥ—words.`,
    wbw_ru: ``,
    tr_en: `O descendant of Bharata, at that time Kṛṣṇa, smiling, in the midst of both the armies, spoke the following words to the grief-stricken Arjuna.`,
    tr_ru: ``,
    pur_en: `The talk was going on between intimate friends, namely the Hṛṣīkeśa and the Guḍākeśa. As friends, both of them were on the same level, but one of them voluntarily became a student of the other. Kṛṣṇa was smiling because a friend had chosen to become a disciple. As Lord of all, He is always in the superior position as the master of everyone, and yet the Lord accepts one who wishes to be a friend, a son, a lover or a devotee, or who wants Him in such a role. But when He was accepted as the master, He at once assumed the role and talked with the disciple like the master—with gravity, as it is required. It appears that the talk between the master and the disciple was openly exchanged in the presence of both armies so that all were benefitted. So the talks of Bhagavad-gītā are not for any particular person, society, or community, but they are for all, and friends or enemies are equally entitled to hear them.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/10',
  },
  {
    n: 11,
    skr: `श्रीभगवानुवाच ।
अशोच्यानन्वशोचस्त्वं प्रज्ञावादांश्च भाषसे ।
गतासूनगतासूंश्च नानुशोचन्ति पण्डिताः ॥ ११ ॥`,
    tr: `śrī-bhagavān uvāca
aśocyān anvaśocas tvaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;prajñā-vādāṁś ca bhāṣase
gatāsūn agatāsūṁś ca
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nānuśocanti paṇḍitāḥ`,
    wbw_en: `śrī bhagavān uvāca—the Supreme Personality of Godhead said; aśocyān—that which is not worthy of lamentation; anvaśocaḥ—you are lamenting; tvam—you; prajñā-vādāḥ—learned talks; ca—also; bhāṣase—speaking; gata—lost; asūn—life; agata—not past; asūn—life; ca—also; na—never; anuśocanti—lament; paṇḍitāḥ—the learned.`,
    wbw_ru: ``,
    tr_en: `The Blessed Lord said: While speaking learned words, you are mourning for what is not worthy of grief. Those who are wise lament neither for the living nor the dead.`,
    tr_ru: ``,
    pur_en: `The Lord at once took the position of the teacher and chastised the student, calling him, indirectly, a fool. The Lord said, you are talking like a learned man, but you do not know that one who is learned—one who knows what is body and what is soul—does not lament for any stage of the body, neither in the living nor in the dead condition. As it will be explained in later chapters, it will be clear that knowledge means to know matter and spirit and the controller of both. Arjuna argued that religious principles should be given more importance than politics or sociology, but he did not know that knowledge of matter, soul and the Supreme is even more important than religious formularies. And, because he was lacking in that knowledge, he should not have posed himself as a very learned man. As he did not happen to be a very learned man, he was consequently lamenting for something which was unworthy of lamentation. The body is born and is destined to be vanquished today or tomorrow; therefore the body is not as important as the soul. One who knows this is actually learned, and for him there is no cause for lamentation, regardless of the condition of the material body.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/11',
  },
  {
    n: 12,
    skr: `न त्वेवाहं जातु नासं न त्वं नेमे जनाधिपाः ।
न चैव न भविष्यामः सर्वे वयमतः परम् ॥ १२ ॥`,
    tr: `na tv evāhaṁ jātu nāsaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na tvaṁ neme janādhipāḥ
na caiva na bhaviṣyāmaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sarve vayam ataḥ param`,
    wbw_en: `na—never; tu—but; eva—certainly; aham—I; jātu—become; na—never; āsam—existed; na—it is not so; tvam—yourself; na—not; ime—all these; janādhipāḥ—kings; na—never; ca—also; eva—certainly; na—not like that; bhaviṣyāmaḥ—shall exist; sarve—all of us; vayam—we; ataḥ param—hereafter.`,
    wbw_ru: ``,
    tr_en: `Never was there a time when I did not exist, nor you, nor all these kings; nor in the future shall any of us cease to be.`,
    tr_ru: ``,
    pur_en: `In the Vedas, in the Kaṭha Upaniṣad as well as in the Śvetāśvatara Upaniṣad, it is said that the Supreme Personality of Godhead is the maintainer of innumerable living entities, in terms of their different situations according to individual work and reaction of work. That Supreme Personality of Godhead is also, by His plenary portions, alive in the heart of every living entity. Only saintly persons who can see, within and without, the same Supreme Lord, can actually attain to perfect and eternal peace.
nityo nityānāṁ cetanaś cetanānām
eko bahūnāṁ yo vidadhāti kāmān
tam ātmasthaṁ ye 'nupaśyanti dhīrās
teṣāṁ śāntiḥ śāśvatī netareṣām.
(Kaṭha 2.2.13)
The same Vedic truth given to Arjuna is given to all persons in the world who pose themselves as very learned but factually have but a poor fund of knowledge. The Lord says clearly that He Himself, Arjuna, and all the kings who are assembled on the battlefield, are eternally individual beings and that the Lord is eternally the maintainer of the individual living entities both in their conditioned as well as in their liberated situations. The Supreme Personality of Godhead is the supreme individual person, and Arjuna, the Lord's eternal associate, and all the kings assembled there are individual, eternal persons. It is not that they did not exist as individuals in the past, and it is not that they will not remain eternal persons. Their individuality existed in the past, and their individuality will continue in the future without interruption. Therefore, there is no cause for lamentation for anyone.
The Māyāvādī theory that after liberation the individual soul, separated by the covering of māyā or illusion, will merge into the impersonal Brahman and lose its individual existence is not supported herein by Lord Kṛṣṇa, the supreme authority. Nor is the theory that we only think of individuality in the conditioned state supported herein. Kṛṣṇa clearly says herein that in the future also the individuality of the Lord and others, as it is confirmed in the Upaniṣads, will continue eternally. This statement of Kṛṣṇa is authoritative because Kṛṣṇa cannot be subject to illusion. If individuality is not a fact, then Kṛṣṇa would not have stressed it so much—even for the future. The Māyāvādī may argue that the individuality spoken of by Kṛṣṇa is not spiritual, but material. Even accepting the argument that the individuality is material, then how can one distinguish Kṛṣṇa's individuality? Kṛṣṇa affirms His individuality in the past and confirms His individuality in the future also. He has confirmed His individuality in many ways, and impersonal Brahman has been declared to be subordinate to Him. Kṛṣṇa has maintained spiritual individuality all along; if He is accepted as an ordinary conditioned soul in individual consciousness, then His Bhagavad-gītā has no value as authoritative scripture. A common man with all the four defects of human frailty is unable to teach that which is worth hearing. The Gītā is above such literature. No mundane book compares with the Bhagavad-gītā. When one accepts Kṛṣṇa as an ordinary man, the Gītā loses all importance. The Māyāvādī argues that the plurality mentioned in this verse is conventional and that it refers to the body. But previous to this verse such a bodily conception is already condemned. After condemning the bodily conception of the living entities, how was it possible for Kṛṣṇa to place a conventional proposition on the body again? Therefore, individuality is maintained on spiritual grounds and is thus confirmed by great ācāryas like Śrī Rāmānuja and others. It is clearly mentioned in many places in the Gītā that this spiritual individuality is understood by those who are devotees of the Lord. Those who are envious of Kṛṣṇa as the Supreme Personality of Godhead have no bona fide access to the great literature. The nondevotee's approach to the teachings of the Gīta is something like bees licking on a bottle of honey. One cannot have a taste of honey unless one opens the bottle. Similarly, the mysticism of the Bhagavad-gītā can be understood only by devotees, and no one else can taste it, as it is stated in the Fourth Chapter of the book. Nor can the Gītā be touched by persons who envy the very existence of the Lord. Therefore, the Māyāvādī explanation of the Gītā is a most misleading presentation of the whole truth. Lord Caitanya has forbidden us to read commentations made by the Māyāvādīs and warns that one who takes to such an understanding of the Māyāvādī philosophy loses all power to understand the real mystery of the Gītā. If individuality refers to the empirical universe, then there is no need of teaching by the Lord. The plurality of the individual soul and of the Lord is an eternal fact, and it is confirmed by the Vedas as above mentioned.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/12',
  },
  {
    n: 13,
    skr: `देहिनोऽस्मिन्यथा देहे कौमारं यौवनं जरा ।
तथा देहान्तरप्राप्तिर्धीरस्तत्र न मुह्यति ॥ १३ ॥`,
    tr: `dehino 'smin yathā dehe
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kaumāraṁ yauvanaṁ jarā
tathā dehāntara-prāptir
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dhīras tatra na muhyati`,
    wbw_en: `dehinaḥ—of the embodied; asmin—in this; yathā—as; dehe—in the body; kaumāram—boyhood; yauvanam—youth; jarā—old age; tathā—similarly; dehāntara—transference of the body; prāptiḥ—achievement; dhīraḥ—the sober; tatra—thereupon; na—never; muhyati—deluded.`,
    wbw_ru: ``,
    tr_en: `As the embodied soul continually passes, in this body, from boyhood to youth to old age, the soul similarly passes into another body at death. The self-realized soul is not bewildered by such a change.`,
    tr_ru: ``,
    pur_en: `Since every living entity is an individual soul, each is changing his body every moment, manifesting sometimes as a child, sometimes as a youth, and sometimes as an old man. Yet the same spirit soul is there and does not undergo any change. This individual soul finally changes the body at death and transmigrates to another body; and since it is sure to have another body in the next birth—either material or spiritual—there was no cause for lamentation by Arjuna on account of death, neither for Bhīṣma nor for Droṇa, for whom he was so much concerned. Rather, he should rejoice for their changing bodies from old to new ones, thereby rejuvenating their energy. Such changes of body account for varieties of enjoyment or suffering, according to one's work in life. So Bhīṣma and Droṇa, being noble souls, were surely going to have either spiritual bodies in the next life, or at least life in heavenly bodies for superior enjoyment of material existence. So, in either case, there was no cause of lamentation.
Any man who has perfect knowledge of the constitution of the individual soul, the Supersoul, and nature—both material and spiritual—is called a dhīra or a most sober man. Such a man is never deluded by the change of bodies. The Māyāvādī theory of oneness of the spirit soul cannot be entertained on the ground that spirit soul cannot be cut into pieces as a fragmental portion. Such cutting into different individual souls would make the Supreme cleavable or changeable, against the principle of the Supreme Soul being unchangeable.
As confirmed in the Gītā, the fragmental portions of the Supreme exist eternally (sanātana) and are called kṣara; that is, they have a tendency to fall down into material nature. These fragmental portions are eternally so, and even after liberation, the individual soul remains the same—fragmental. But once liberated, he lives an eternal life in bliss and knowledge with the Personality of Godhead. The theory of reflection can be applied to the Supersoul who is present in each and every individual body and is known as the Paramātmā, who is different from the individual living entity. When the sky is reflected in water, the reflections represent both the sun and the moon and the stars also. The stars can be compared to the living entities and the sun or the moon to the Supreme Lord. The individual fragmental spirit soul is represented by Arjuna, and the Supreme Soul is the Personality of Godhead Śrī Kṛṣṇa. They are not on the same level, as it will be apparent in the beginning of the Fourth Chapter. If Arjuna is on the same level with Kṛṣṇa, and Kṛṣṇa is not superior to Arjuna, then their relationship of instructor and instructed becomes meaningless. If both of them are deluded by the illusory energy (māyā), then there is no need of one being the instructor and the other the instructed. Such instruction would be useless because, in the clutches of māyā, no one can be an authoritative instructor. Under the circumstances, it is admitted that Lord Kṛṣṇa is the Supreme Lord, superior in position to the living entity, Arjuna, who is a forgotten soul deluded by māyā.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/13',
  },

    skr: `मात्रास्पर्शास्तु कौन्तेय शीतोष्णसुखदुःखदाः ।
आगमापायिनोऽनित्यास्तांस्तितिक्षस्व भारत ॥ १४ ॥`,
    tr: `mātrā-sparśās tu kaunteya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śītoṣṇa-sukha-duḥkha-dāḥ
āgamāpāyino 'nityās
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tāṁs titikṣasva bhārata`,
    wbw_en: `mātrā—sensuous; sparśāḥ—perception; tu—only; kaunteya—O son of Kuntī; śīta—winter; uṣṇa—summer; sukha—happiness; duḥkha-daḥ—giving pain; āgama—appearing; apāyinaḥ—disappearing; anityāḥ—nonpermanent; tān—all of them; titikṣasva—just try to tolerate; bhārata—O descendant of the Bhārata dynasty.`,

    tr_en: `O son of Kuntī, the nonpermanent appearance of happiness and distress, and their disappearance in due course, are like the appearance and disappearance of winter and summer seasons. They arise from sense perception, O scion of Bharata, and one must learn to tolerate them without being disturbed.`,
    tr_ru: ``,
    pur_en: `In the proper discharge of duty, one has to learn to tolerate nonpermanent appearances and disappearances of happiness and distress. According to Vedic injunction, one has to take his bath early in the morning even during the month of Māgha (January-February). It is very cold at that time, but in spite of that a man who abides by the religious principles does not hesitate to take his bath. Similarly, a woman does not hesitate to cook in the kitchen in the months of May and June, the hottest part of the summer season. One has to execute his duty in spite of climatic inconveniences. Similarly, to fight is the religious principle of the kṣatriyas, and although one has to fight with some friend or relative, one should not deviate from his prescribed duty. One has to follow the prescribed rules and regulations of religious principles in order to rise up to the platform of knowledge because by knowledge and devotion only can one liberate himself from the clutches of māyā (illusion).
The two different names of address given to Arjuna are also significant. To address him as Kaunteya signifies his great blood relations from his mother's side; and to address him as Bhārata signifies his greatness from his father's side. From both sides he is supposed to have a great heritage. A great heritage brings responsibility in the matter of proper discharge of duties; therefore, he cannot avoid fighting.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/14',

    n: 15,
    skr: `यं हि न व्यथयन्त्येते पुरुषं पुरुषर्षभ ।
समदुःखसुखं धीरं सोऽमृतत्वाय कल्पते ॥ १५ ॥`,
    tr: `yaṁ hi na vyathayanty ete
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;puruṣaṁ puruṣarṣabha
sama-duḥkha-sukhaṁ dhīraṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;so 'mṛtatvāya kalpate`,
    wbw_en: `yam—one who; hi—certainly; na—never; vyathayanti—are distressing; ete—all these; puruṣam—to a person; puruṣarṣabha—is best among men; sama—unaltered; duḥkha—distress; sukham—happiness; dhīram—patient; saḥ—he; amṛtatvāya—for liberation; kalpate—is considered eligible.`,
    wbw_ru: ``,
    tr_en: `O best among men [Arjuna], the person who is not disturbed by happiness and distress and is steady in both is certainly eligible for liberation.`,
    tr_ru: ``,
    pur_en: `Anyone who is steady in his determination for the advanced stage of spiritual realization and can equally tolerate the onslaughts of distress and happiness is certainly a person eligible for liberation. In the varṇāśrama institution, the fourth stage of life, namely the renounced order (sannyāsa) is a painstaking situation. But one who is serious about making his life perfect surely adopts the sannyāsa order of life in spite of all difficulties. The difficulties usually arise from having to sever family relationships, to give up the connection of wife and children. But if anyone is able to tolerate such difficulties, surely his path to spiritual realization is complete. Similarly, in Arjuna's discharge of duties as a kṣatriya, he is advised to persevere, even if it is difficult to fight with his family members or similarly beloved persons. Lord Caitanya took sannyāsa at the age of twenty-four, and His dependants, young wife as well as old mother, had no one else to look after them. Yet for a higher cause He took sannyāsa and was steady in the discharge of higher duties. That is the way of achieving liberation from material bondage.`,

    n: 16,
    skr: `नासतो विद्यते भावो नाभावो विद्यते सतः ।
उभयोरपि दृष्टोऽन्तस्त्वनयोस्तत्त्वदर्शिभिः ॥ १६ ॥`,
    tr: `nāsato vidyate bhāvo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nābhāvo vidyate sataḥ
ubhayor api dṛṣṭo 'ntas
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tv anayos tattva-darśibhiḥ`,
    wbw_en: `na—never; asataḥ—of the nonexistent; vidyate—there is; bhāvaḥ—endurance; na—never; abhāvaḥ—changing quality; vidyate—there is; sataḥ—of the eternal; ubhayoḥ—of the two; api—verily; dṛṣṭaḥ—observed; antaḥ—conclusion; tu—but; anayoḥ—of them; tattva—truth; darśibhiḥ—by the seers.`,
    wbw_ru: ``,
    tr_en: `Those who are seers of the truth have concluded that of the nonexistent there is no endurance, and of the existent there is no cessation. This seers have concluded by studying the nature of both.`,
    tr_ru: ``,
    pur_en: `There is no endurance of the changing body. That the body is changing every moment by the actions and reactions of the different cells is admitted by modern medical science; and thus growth and old age are taking place in the body. But the spirit soul exists permanently, remaining the same despite all changes of the body and the mind. That is the difference between matter and spirit. By nature, the body is ever changing, and the soul is eternal. This conclusion is established by all classes of seers of the truth, both impersonalist and personalist. In the Viṣṇu Purāṇa it is stated that Viṣṇu and His abodes all have self-illuminated spiritual existence. "Jyotīṁṣi viṣṇur bhavanāni viṣṇuḥ." The words existent and nonexistent refer only to spirit and matter. That is the version of all seers of truth.
This is the beginning of the instruction by the Lord to the living entities who are bewildered by the influence of ignorance. Removal of ignorance involves the reestablishment of the eternal relationship between the worshiper and the worshipable and the consequent understanding of the difference between the part and parcel living entities and the Supreme Personality of Godhead. One can understand the nature of the Supreme by thorough study of oneself, the difference between oneself and the Supreme being understood as the relationship between the part and the whole. In the Vedānta-sūtras, as well as in the Śrīmad-Bhāgavatam, the Supreme has been accepted as the origin of all emanations. Such emanations are experienced by superior and inferior natural sequences. The living entities belong to the superior nature, as it will be revealed in the Seventh Chapter. Although there is no difference between the energy and the energetic, the energetic is accepted as the Supreme, and energy or nature is accepted as the subordinate. The living entities, therefore, are always subordinate to the Supreme Lord, as in the case of the master and the servant, or the teacher and the taught. Such clear knowledge is impossible to understand under the spell of ignorance, and to drive away such ignorance the Lord teaches the Bhagavad-gītā for the enlightenment of all living entities for all time.`,

    n: 17,
    skr: `अविनाशि तु तद्विद्धि येन सर्वमिदं ततम् ।
विनाशमव्ययस्यास्य न कश्चित्कर्तुमर्हति ॥ १७ ॥`,
    tr: `avināśi tu tad viddhi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yena sarvam idaṁ tatam
vināśam avyayasyāsya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na kaścit kartum arhati`,
    wbw_en: `avināśi—imperishable; tu—but; tat—that; viddhi—know it; yena—by whom; sarvam—all of the body; idam—this; tatam—widespread; vināśam—destruction; avyayasya—of the imperishable; asya—of it; na kaścit—no one; kartum—to do; arhati—able.`,
    wbw_ru: ``,
    tr_en: `Know that which pervades the entire body is indestructible. No one is able to destroy the imperishable soul.`,
    tr_ru: ``,
    pur_en: `This verse more clearly explains the real nature of the soul, which is spread all over the body. Anyone can understand what is spread all over the body: it is consciousness. Everyone is conscious of the pains and pleasures of the body in part or as a whole. This spreading of consciousness is limited within one's own body. The pains and pleasures of one body are unknown to another. Therefore, each and every body is the embodiment of an individual soul, and the symptom of the soul's presence is perceived as individual consciousness. This soul is described as one ten-thousandth part of the upper portion of the hair point in size. The Śvetāśvatara Upaniṣad confirms this:
bālāgra-śata-bhāgasya śatadhā kalpitasya ca
bhāgo jīvaḥ sa vijñeyaḥ sa cānantyāya kalpate.
"When the upper point of a hair is divided into one hundred parts and again each of such parts is further divided into one hundred parts, each such part is the measurement of the dimension of the spirit soul." (Svet. 5.9) Similarly, in the Bhāgavatam the same version is stated:
keśāgra-śata-bhāgasya śatāṁśaḥ sādṛśātmakaḥ
jīvaḥ sūkṣma-svarupo 'yaṁ saṅkhyātīto hi cit-kaṇaḥ
"There are innumerable particles of spiritual atoms, which are measured as one ten-thousandth of the upper portion of the hair."
Therefore, the individual particle of spirit soul is a spiritual atom smaller than the material atoms, and such atoms are innumerable. This very small spiritual spark is the basic principle of the material body, and the influence of such a spiritual spark is spread all over the body as the influence of the active principle of some medicine spreads throughout the body. This current of the spirit soul is felt all over the body as consciousness, and that is the proof of the presence of the soul. Any layman can understand that the material body minus consciousness is a dead body, and this consciousness cannot be revived in the body by any means of material administration. Therefore, consciousness is not due to any amount of material combination, but to the spirit soul. In the Muṇḍaka Upaniṣad the measurement of the atomic spirit soul is further explained:
eṣo 'ṇurātmā cetasā veditavyo
yasmin prāṇaḥ pañcadhā saṁviveśa
prāṇaiś cittaṁ sarvam otam prajānāṁ
yasmin viśuddhe vibhavaty eṣa ātmā.
"The soul is atomic in size and can be perceived by perfect intelligence. This atomic soul is floating in the five kinds of air [prāṇa, apāna, vyāna, samāna and udāna], is situated within the heart, and spreads its influence all over the body of the embodied living entities. When the soul is purified from the contamination of the five kinds of material air, its spiritual influence is exhibited." (Muṇḍ. 3.1.9)
The haṭha-yoga system is meant for controlling the five kinds of air encircling the pure soul by different kinds of sitting postures—not for any material profit, but for liberation of the minute soul from the entanglement of the material atmosphere.
So the constitution of the atomic soul is admitted in all Vedic literatures, and it is also actually felt in the practical experience of any sane man. Only the insane man can think of this atomic soul as all-pervading Viṣṇu-tattva.
The influence of the atomic soul can be spread all over a particular body. According to the Muṇḍaka Upaniṣad, this atomic soul is situated in the heart of every living entity, and because the measurement of the atomic soul is beyond the power of appreciation of the material scientists, some of them assert foolishly that there is no soul. The individual atomic soul is definitely there in the heart along with the Supersoul, and thus all the energies of bodily movement are emanating from this part of the body. The corpuscles which carry the oxygen from the lungs gather energy from the soul. When the soul passes away from this position, activity of the blood, generating fusion, ceases. Medical science accepts the importance of the red corpuscles, but it cannot ascertain that the source of the energy is the soul. Medical science, however, does admit that the heart is the seat of all energies of the body.
Such atomic particles of the spirit whole are compared to the sunshine molecules. In the sunshine there are innumerable radiant molecules. Similarly, the fragmental parts of the Supreme Lord are atomic sparks of the rays of the Supreme Lord, called by the name prabhā or superior energy. Neither Vedic knowledge nor modern science denies the existence of the spirit soul in the body, and the science of the soul is explicitly described in the Bhagavad-gītā by the Personality of Godhead Himself.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/17',
  },

    n: 18,
    skr: `अन्तवन्त इमे देहा नित्यस्योक्ताः शरीरिणः ।
अनाशिनोऽप्रमेयस्य तस्माद्युध्यस्व भारत ॥ १८ ॥`,
    tr: `antavanta ime dehā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nityasyoktāḥ śarīriṇaḥ
anāśino 'prameyasya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tasmād yudhyasva bhārata`,
    wbw_en: `antavantaḥ—perishable; ime—all these; dehāḥ—material bodies; nityasya—eternal in existence; uktāḥ—it is so said; sarīriṇaḥ—the embodied souls; anāśinaḥ—never to be destroyed; aprameyasya—immeasurable; tasmāt—therefore; yudhyasva—fight; bhārata—O descendant of Bharata.`,

    n: 19,
    skr: `य एनं वेत्ति हन्तारं यश्चैनं मन्यते हतम् ।
उभौ तौ न विजानीतो नायं हन्ति न हन्यते ॥ १९ ॥`,
    tr: `ya enaṁ vetti hantāraṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yaś cainaṁ manyate hatam
ubhau tau na vijānīto
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;nāyaṁ hanti na hanyate`,
    wbw_en: `yaḥ—anyone; enam—this; vetti—knows; hantāram—the killer; yaḥ—anyone; ca—also; enam—this; manyate—thinks; hatam—killed; ubhau—both of them; tau—they; na—never; vijānītaḥ—in knowledge; na—never; ayam—this; hanti—kills; na—nor; hanyate—be killed.`,
    wbw_ru: ``,
    tr_en: `He who thinks that the living entity is the slayer or that he is slain, does not understand. One who is in knowledge knows that the self slays not nor is slain.`,
    tr_ru: ``,
    pur_en: `When an embodied living entity is hurt by fatal weapons, it is to be known that the living entity within the body is not killed. The spirit soul is so small that it is impossible to kill him by any material weapon, as is evident from the previous verses. Nor is the living entity killable because of his spiritual constitution. What is killed, or is supposed to be killed, is the body only. This, however, does not at all encourage killing of the body. The Vedic injunction is, "māhiṁsyāt sarva-bhūtāni" never commit violence to anyone. Nor does understanding that the living entity is not killed encourage animal slaughter. Killing the body of anyone without authority is abominable and is punishable by the law of the state as well as by the law of the Lord. Arjuna, however, is being engaged in killing for the principle of religion, and not whimsically.`,
