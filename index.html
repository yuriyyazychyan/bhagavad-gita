*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --paper:   #ffffff;
  --paper2:  #f7f5ee;
  --paper3:  #eeeae2;
  --ink:     #000000;
  --ink2:    #000000;
  --ink3:    #000000;
  --rule:    rgba(90,65,30,0.22);
  --serif:   'IM Fell English', 'Times New Roman', Georgia, serif;
  --devan:   'Noto Serif Devanagari', serif;
  --sidebar: 270px;
  --trans:   0.2s ease;
}
[data-theme="dark"] {
  --paper:  #180c01;
  --paper2: #1b0e01;
  --paper3: #201103;
  --ink:    #ffffff;
  --ink2:   #f7f5ee;
  --ink3:   #eeeae2;
  --rule:   rgba(200,170,100,0.18);
}


/* ── BASE ── */
html { scroll-behavior: smooth; }
body {
  font-family: var(--serif);
  background: var(--paper);
  color: var(--ink);
  font-size: 18px;
  line-height: 1.8;
  transition: background var(--trans), color var(--trans);
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 48px;
  background: var(--paper2);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px;
}
.topbar-title {
  font-family: 'Windsor', serif;
  font-style: normal;
  font-size: 15px;
  color: var(--ink2);
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tb-btn {
  background: none;
  border: 1px solid var(--rule);
  color: var(--ink2);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 13px;
  font-family: var(--serif);
  cursor: pointer;
  transition: all var(--trans);
  white-space: nowrap;
}
#themeBtn {
  font-size: 18px;
  background: none;
  border: none;
  cursor: pointer;
  filter: drop-shadow(0 0 4px rgba(255,200,50,0.8));
}
.tb-btn:hover { background: var(--paper3); color: var(--ink); }
.lang-wrap { display: flex; border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; }
.lang-wrap button {
  background: none; border: none;
  padding: 4px 10px; font-size: 13px;
  font-family: var(--serif); cursor: pointer;
  color: var(--ink2); transition: all var(--trans);
}
.lang-wrap button.on { background: var(--ink2); color: var(--paper); }

/* ── PROGRESS ── */
.prog { position: fixed; top: 48px; left: 0; right: 0; height: 2px; background: var(--paper3); z-index: 99; }
.prog-fill { height: 100%; background: var(--ink3); width: 0; transition: width 0.1s; }

/* ── LAYOUT ── */
.wrap { display: flex; padding-top: 50px; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar);
  background: var(--paper2);
  border-right: 1px solid var(--rule);
  position: fixed; top: 50px; left: 0; bottom: 0;
  overflow-y: auto;
  transition: transform var(--trans);
  z-index: 50;
}
.sidebar.hidden { transform: translateX(calc(-1 * var(--sidebar))); }
.sb-head {
  padding: 16px 16px 8px;
  font-family: 'IM Fell English', Georgia, serif;
  font-weight: 700;
  font-size: 13px;
  text-transform: none;
  letter-spacing: 0em;
  word-spacing: normal;
  transform: none;
  display: block;
  color: var(--ink3);
  border-bottom: 1px solid var(--rule);
}
.ch-row {
  display: flex; align-items: baseline; gap: 8px;
  padding: 8px 16px; cursor: pointer;
  font-size: 14px; color: var(--ink2);
  border-left: 2px solid transparent;
  transition: all var(--trans); line-height: 1.4;
}
.ch-row:hover { background: var(--paper3); color: var(--ink); }
.ch-row.on { background: var(--paper3); color: var(--ink); border-left-color: var(--ink3); }
.ch-n { 
  font-family: 'Spectral SC', serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink3);
  min-width: 18px;
  display: inline-block;
  transform: scaleY(1.15);
}
.ch-vcount { 
  font-family: 'Spectral SC', serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink3);
  display: inline-block;
  transform: scaleY(1.15);
}
.ch-label { flex: 1; }

/* ── MAIN ── */
.main { margin-left: var(--sidebar); flex: 1; transition: margin-left var(--trans); }
.main.full { margin-left: 0; }

/* ── BOOK PAGE ── */
.page {
  max-width: 880px;
  margin: 0 auto;
  padding: 48px 48px 100px;
}
@media (max-width: 700px) {
  .page { padding: 28px 22px 80px; }
  :root { --sidebar: 82vw; }
}

/* ── CHAPTER OPENING ── */
/* ── CHAPTER OPENING ── */
.ch-opening { text-align: center; margin-bottom: 0; padding-top: 32px; }
.ch-word {
  font-family: 'Barmeno', sans-serif;
  font-size: 21px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: -0.04em;
  word-spacing: 0.6em;
  color: var(--ink);
  margin-bottom: 12px;
  text-align: center;
  display: inline-block;
  transform: scaleX(1.12);
}
.ch-eng-title {
  font-family: 'Windsor', serif;
  font-size: 30px;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 34px;
  color: var(--ink);
  margin: 24px auto 0;
  text-align: center;
  max-width: 500px;
}
.ch-rule { display: none; }
.ch-intro { display: none; }

/* ── TEXT NUMBER ── */
.text-label {
  font-family: 'Spectral SC', serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--ink);
  text-align: center;
  margin: 20px 0 0px;
  cursor: default;
  display: block;
}

/* ── VERSE BLOCK ── */
.verse {
  margin-bottom: 52px;
  scroll-margin-top: 70px;
}
.verse-top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
}
.verse-ref {
  font-size: 11px; letter-spacing: 0.1em;
  color: var(--ink3); white-space: nowrap;
}
.verse-line { flex: 1; height: 1px; background: var(--rule); }
.verse-acts { display: flex; gap: 6px; }
.vbtn {
  background:none;
  border:none;
  padding:0;
  font-size:12px;
  cursor:pointer;
  color:var(--ink3);
  font-family:var(--serif);
  transition:all var(--trans);
  display:inline-flex;
  align-items:center;
}
.vbtn:hover { color: var(--ink); border-color: var(--ink3); }
.vbtn.bm { color: var(--ink); border-color: var(--ink); }

/* ── SANSKRIT ── */
.v-sanskrit {
  font-family: var(--devan);
  font-size: 20px;
  font-weight: 600;
  line-height: 1.4;
  text-align: center;
  color: var(--ink);
  margin-top: -8px;
  margin-bottom: 16px;
}
.v-sanskrit-inner {
  display: inline-block;
  text-align: left;
}

/* ── TRANSLITERATION ── */
.v-translit {
  font-family: 'Times New Roman', Times, serif;
  font-style: italic;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0em;
  line-height: 26px;
  text-align: left;
  display: flex;
  justify-content: center;
  color: var(--ink);
  margin-bottom: 24px;
}
.w {
  cursor: pointer;
  border-bottom: 1px dotted var(--rule);
  transition: color var(--trans), border-color var(--trans);
}
.w:hover { color: var(--ink); border-color: var(--ink3); }

/* ── WORD-BY-WORD ── 
   ── ПОСЛОВНЫЙ ПЕРЕВОД ── */
.v-wbw {
  font-family: 'Momentum', serif;
  font-size: 18px;
  font-weight: 500;
  font-style: normal;
  color: var(--ink);
  line-height: 1.4;
  word-spacing: 0.3em;
  margin-bottom: 16px;
  padding: 0;
  border-left: none;
  text-indent: 1.5em;
}
.v-wbw.open { display: block; }

.v-translation {
  font-family: 'IM Fell English', Georgia, serif;
  font-style: normal;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  line-height: 24px;
  word-spacing: normal;
  margin-bottom: 16px;
  text-indent: 2em;
  text-align: left;
}

/* ── PURPORT ── */
.purport-tog {
  color: var(--ink);
  cursor: pointer;
  user-select: none;
  display: block;
  text-align: center;
  margin: 0;
}
.purport-tog::after {
  content: ' ↑';
  font-size: 11px;
  display: inline-block;
  transition: transform 0.25s ease;
}
.purport-tog.closed::after {
  transform: rotate(180deg);
}
.purport-tog::before { content: ''; }
.purport-tog.open::before { content: ''; }
.purport-body {
  display: block;
  margin-top: 0;
  padding-top: 0;
  border-top: none;
  overflow: hidden;
  max-height: 9999px;
  transition: max-height 0.35s ease;
}
.purport-body.closed {
  max-height: 0;
}
.purport-lbl {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
}
.purport-body p {
  font-size: 18px;
  font-weight: 500;
  color: var(--ink2);
  line-height: 24px;
  margin-bottom: 0px;
  text-indent: 1.5em;
  white-space: pre-line; /* Превращает \n в новые строки */
  text-indent: 2em;     /* Красная строка */
  text-align: justify;   /* Ровные края текста по бокам */
  font-family: 'IM Fell English', Georgia, serif;
}

/* ── AUDIO LINK ── */
.audio-lnk {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; color: var(--ink3);
  border: 1px solid var(--rule); border-radius: 3px;
  padding: 3px 9px; cursor: pointer; text-decoration: none;
  transition: all var(--trans); margin-top: 8px;
  font-family: var(--serif);
}
.audio-lnk:hover { color: var(--ink); border-color: var(--ink3); }

/* ── ORNAMENT ── */
.orn { text-align: center; color: var(--rule); font-size: 20px; margin: 36px 0; user-select: none; }

/* ── WORD TOOLTIP ── */
.tip {
  position: fixed; z-index: 300;
  background: var(--paper2);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 10px 14px; max-width: 260px;
  font-size: 14px; line-height: 1.5;
  display: none; pointer-events: none;
}
.tip.on { display: block; }
.tip-skr { font-family: var(--devan); font-size: 17px; color: var(--ink); display: block; margin-bottom: 3px; }
.tip-tr  { font-style: italic; color: var(--ink2); display: block; margin-bottom: 3px; }
.tip-def { color: var(--ink); }

/* ── BOOKMARKS PANEL ── */
.bmpanel {
  position: fixed; right: 0; top: 50px; bottom: 0;
  width: 280px; background: var(--paper2);
  border-left: 1px solid var(--rule);
  z-index: 80; transform: translateX(100%);
  transition: transform var(--trans);
  overflow-y: auto; padding: 16px;
}
.bmpanel.on { transform: translateX(0); }
.bm-head { font-style: italic; color: var(--ink2); margin-bottom: 14px; font-size: 15px; border-bottom: 1px solid var(--rule); padding-bottom: 10px; }
.bm-item {
  padding: 9px 10px; border: 1px solid var(--rule);
  border-radius: 4px; margin-bottom: 8px; cursor: pointer;
  font-size: 13px; background: var(--paper); transition: all var(--trans);
}
.bm-item:hover { border-color: var(--ink3); }
.bm-ref { 
  font-family: 'Spectral SC', serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink3);
  margin-bottom: 3px;
  display: inline-block;
  transform: scaleY(1.15);
}
.bm-txt { 
  font-family: 'IM Fell English', Georgia, serif;
  font-size: 13px;
  color: var(--ink2); 
  line-height: 1.4; 
}
.bm-empty { font-style: italic; font-size: 14px; color: var(--ink3); }

/* ── OVERLAY ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 45; display: none; }
.overlay.on { display: block; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 80px 0; color: var(--ink3); font-style: italic; font-size: 16px; }
</style>

    tr_ru: `-`,
    pur_en: `Bhagavad-gītā is the widely read theistic science summarized in the Gītā-māhātmya (Glorification of the Gītā). There it says that one should read Bhagavad-gītā very scrutinizingly with the help of a person who is a devotee of Śrī Kṛṣṇa and try to understand it without personally motivated interpretations. The example of clear understanding is there in the Bhagavad-gītā itself, in the way the teaching is understood by Arjuna, who heard the Gītā directly from the Lord. If someone is fortunate enough to understand Bhagavad-gītā in that line of disciplic succession, without motivated interpretation, then he surpasses all studies of Vedic wisdom, and all scriptures of the world. One will find in the Bhagavad-gītā all that is contained in other scriptures, but the reader will also find things which are not to be found elsewhere. That is the specific standard of the Gītā. It is the perfect theistic science because it is directly spoken by the Supreme Personality of Godhead, Lord Śrī Kṛṣṇa.
The topics discussed by Dhṛtarāṣṭra and Sañjaya, as described in the Mahābhārata, form the basic principle for this great philosophy. It is understood that this philosophy evolved on the Battlefield of Kurukṣetra, which is a sacred place of pilgrimage from the immemorial time of the Vedic age. It was spoken by the Lord when He was present personally on this planet for the guidance of mankind.
The word dharma-kṣetra (a place where religious rituals are performed) is significant because, on the Battlefield of Kurukṣetra, the Supreme Personality of Godhead was present on the side of Arjuna. Dhṛtarāṣṭra, the father of the Kurus, was highly doubtful about the possibility of his sons' ultimate victory. In his doubt, he inquired from his secretary Sañjaya, "What did my sons and the sons of Pāṇḍu do?" He was confident that both his sons and the sons of his younger brother Pāṇḍu were assembled in that Field of Kurukṣetra for a determined engagement of the war. Still, his inquiry is significant. He did not want a compromise between the cousins and brothers, and he wanted to be sure of the fate of his sons on the battlefield. Because the battle was arranged to be fought at Kurukṣetra, which is mentioned elsewhere in the Vedas as a place of worship—even for the denizens of heaven—Dhṛtarāṣṭra became very fearful about the influence of the holy place on the outcome of the battle. He knew very well that this would influence Arjuna and the sons of Pāṇḍu favorably, because by nature they were all virtuous. Sañjaya was a student of Vyāsa, and therefore, by the mercy of Vyāsa, Sañjaya was able to envision the Battlefield of Kurukṣetra even while he was in the room of Dhṛtarāṣṭra. And so, Dhṛtarāṣṭra asked him about the situation on the battlefield.
Both the Pāṇḍavas and the sons of Dhṛtarāṣṭra belong to the same family, but Dhṛtarāṣṭra's mind is disclosed herein. He deliberately claimed only his sons as Kurus, and he separated the sons of Pāṇḍu from the family heritage. One can thus understand the specific position of Dhṛtarāṣṭra in his relationship with his nephews, the sons of Pāṇḍu. As in the paddy field the unnecessary plants are taken out, so it is expected from the very beginning of these topics that in the religious field of Kurukṣetra where the father of religion, Śrī Kṛṣṇa, was present, the unwanted plants like Dhṛtarāṣṭra's son Duryodhana and others would be wiped out and the thoroughly religious persons, headed by Yudhiṣṭhira, would be established by the Lord. This is the significance of the words dharma-kṣetre and kuru-kṣetre, apart from their historical and Vedic importance.`,
    pur_ru: `-`,
    audio: 'https://prabhupadavani.org/transcriptions/730707bglon/',
  },

    skr: `सञ्जय उवाच ।

आचार्यमुपसङ्गम्य राजा वचनमब्रवीत् ॥ २ ॥`,

&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;rājā vacanam abravīt`,
    wbw_en: `sañjayaḥ—Sañjaya; uvāca—said; dṛṣṭvā—after seeing; tu—but; pāṇḍava-anīkam—the soldiers of the Pāṇḍavas; vyūḍham—arranged in military phalanx; duryodhanaḥ—King Duryodhana; tadā—at that time; ācāryam—the teacher; upasaṅgamya—approaching nearby; rājā—the king; vacanam—words; abravīt—spoke.`,
    wbw_ru: `-`,
    tr_en: `Sañjaya said: O King, after looking over the army gathered by the sons of Pāṇḍu, King Duryodhana went to his teacher and began to speak the following words:`,
    tr_ru: `-`,
    pur_en: `Dhṛtarāṣṭra was blind from birth. Unfortunately, he was also bereft of spiritual vision. He knew very well that his sons were equally blind in the matter of religion, and he was sure that they could never reach an understanding with the Pāṇḍavas, who were all pious since birth. Still he was doubtful about the influence of the place of pilgrimage, and Sañjaya could understand his motive in asking about the situation on the battlefield. He wanted, therefore, to encourage the despondent King, and thus he warned him that his sons were not going to make any sort of compromise under the influence of the holy place. Sañjaya therefore informed the King that his son, Duryodhana, after seeing the military force of the Pāṇḍavas, at once went to the commander-in-chief, Droṇācārya, to inform him of the real position. Although Duryodhana is mentioned as the king, he still had to go to the commander on account of the seriousness of the situation. He was therefore quite fit to be a politician. But Duryodhana's diplomatic veneer could not disguise the fear he felt when he saw the military arrangement of the Pāṇḍavas.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/2',
  },

  {
    n: 14,
    skr: `ततः श्वेतैर्हयैर्युक्ते महति स्यन्दने स्थितौ ।
माधवः पाण्डवश्चैव दिव्यौ शङ्खौ प्रदध्मतुः ॥ १४ ॥`,
    tr: `tataḥ śvetair hayair yukte
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mahati syandane sthitau
mādhavaḥ pāṇḍavaś caiva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;divyau śaṅkhau pradadhmatuḥ`,
    wbw_en: `tataḥ—thereafter; śvetaiḥ—by white; hayaiḥ—horses; yukte—being yoked with; mahati—in the great; syandane—chariot; sthitau—so situated; mādhavaḥ—Kṛṣṇa (the husband of the goddess of fortune); pāṇḍavaḥ—Arjuna (the son of Pāṇḍu); ca—also; eva—certainly; divyau—transcendental; śaṅkhau—conchshells; pradadhmatuḥ—sounded.`,
    wbw_ru: `-`,
    tr_en: `On the other side, both Lord Kṛṣṇa and Arjuna, stationed on a great chariot drawn by white horses, sounded their transcendental conchshells.`,
    tr_ru: `-`,
    pur_en: `In contrast with the conchshell blown by Bhīṣmadeva, the conchshells in the hands of Kṛṣṇa and Arjuna are described as transcendental. The sounding of the transcendental conchshells indicated that there was no hope of victory for the other side because Kṛṣṇa was on the side of the Pāṇḍavas. Jayas tu pāṇḍu-putrāṇāṁ yeṣāṁ pakṣe janārdanaḥ. Victory is always with persons like the sons of Pāṇḍu because Lord Kṛṣṇa is associated with them. And whenever and wherever the Lord is present, the goddess of fortune is also there because the goddess of fortune never lives alone without her husband. Therefore, victory and fortune were awaiting Arjuna, as indicated by the transcendental sound produced by the conchshell of Viṣṇu, or Lord Kṛṣṇa. Besides that, the chariot on which both the friends were seated was donated by Agni (the fire-god) to Arjuna, and this indicated that this chariot was capable of conquering all sides, wherever it was drawn over the three worlds.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/14',
  },
  {
    n: 15,
    skr: `पाञ्चजन्यं हृषीकेशो देवदत्तं धनञ्जयः ।
पौण्ड्रं दध्मौ महाशङ्खं भीमकर्मा वृकोदरः ॥ १५ ॥`,
    tr: `pāñcajanyaṁ hṛṣīkeśo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;devadattaṁ dhanañjayaḥ
pauṇḍraṁ dadhmau mahā-śaṅkhaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;bhīma-karmā vṛkodaraḥ`,
    wbw_en: `pāñcajanyam—the conchshell named Pāñcajanya; hṛṣīkeśaḥ—Hṛṣīkeśa (Kṛṣṇa, the Lord who directs the senses of the devotees); devadattam—the conchshell named Devadatta; dhanañjayaḥ—Dhanañjaya (Arjuna, the winner of wealth); pauṇḍram—the conch named Pauṇḍram; dadhmau—blew; mahā-śaṅkham—the terrific conchshell; bhīma-karmā—one who performs Herculean tasks; vṛkodaraḥ—the voracious eater (Bhīma).`,
    wbw_ru: `-`,
    tr_en: `Then, Lord Kṛṣṇa blew His conchshell, called Pāñcajanya; Arjuna blew his, the Devadatta; and Bhīma, the voracious eater and performer of Herculean tasks, blew his terrific conchshell called Pauṇḍram.`,
    tr_ru: `-`,
    pur_en: `Lord Kṛṣṇa is referred to as Hṛṣīkeśa in this verse because He is the owner of all senses. The living entities are part and parcel of Him, and, therefore, the senses of the living entities are also part and parcel of His senses. The impersonalists cannot account for the senses of the living entities, and therefore they are always anxious to describe all living entities as sense-less, or impersonal. The Lord, situated in the hearts of all living entities, directs their senses. But, He directs in terms of the surrender of the living entity, and in the case of a pure devotee He directly controls the senses. Here on the Battlefield of Kurukṣetra the Lord directly controls the transcendental senses of Arjuna, and thus His particular name of Hṛṣīkeśa. The Lord has different names according to His different activities. For example, His name is Madhusūdana because He killed the demon of the name Madhu; His name is Govinda because He gives pleasure to the cows and to the senses; His name is Vāsudeva because He appeared as the son of Vasudeva; His name is Devakī-nandana because He accepted Devakī as His mother; His name is Yaśodā-nandana because He awarded His childhood pastimes to Yaśodā at Vṛndāvana; His name is Pārtha-sārathi because He worked as charioteer of His friend Arjuna. Similarly, His name is Hṛṣīkeśa because He gave direction to Arjuna on the Battlefield of Kurukṣetra.
Arjuna is referred to as Dhanañjaya in this verse because he helped his elder brother in fetching wealth when it was required by the King to make expenditures for different sacrifices. Similarly, Bhīma is known as Vṛkodara because he could eat as voraciously as he could perform Herculean tasks, such as killing the demon Hiḍimba. So, the particular types of conchshell blown by the different personalities on the side of the Pāṇḍavas, beginning with the Lord's, were all very encouraging to the fighting soldiers. On the other side there were no such credits, nor the presence of Lord Kṛṣṇa, the supreme director, nor that of the goddess of fortune. So, they were predestined to lose the battle—and that was the message announced by the sounds of the conchshells.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/15',
  },
  {
    n: 16,
    nLabel: '16–18',
    skr: `अनन्तविजयं राजा कुन्तीपुत्रो युधिष्ठिरः ।
नकुलः सहदेवश्च सुघोषमणिपुष्पकौ ॥ १६ ॥
काश्यश्च परमेष्वासः शिखण्डी च महारथः ।
धृष्टद्युम्नो विराटश्च सात्यकिश्चापराजितः ॥ १७ ॥
द्रुपदो द्रौपदेयाश्च सर्वशः पृथिवीपते ।
सौभद्रश्च महाबाहुः शङ्खान्दध्मुः पृथक्पृथक् ॥ १८ ॥`,
    tr: `anantavijayaṁ rājā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kuntī-putro yudhiṣṭhiraḥ
nakulaḥ sahadevaś ca
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sughoṣa-maṇipuṣpakau
kāśyaś ca parameṣv-āsaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śikhaṇḍī ca mahā-rathaḥ
dhṛṣṭadyumno virāṭaś ca
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sātyakiś cāparājitaḥ
drupado draupadeyāś ca
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sarvaśaḥ pṛthivī-pate
saubhadraś ca mahā-bāhuḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śaṅkhān dadhmuḥ pṛthak pṛthak`,
    wbw_en: `ananta-vijayam—the conch named Ananta-vijaya; rājā—the king; kuntī-putraḥ—the son of Kuntī; yudhiṣṭhiraḥ—Yudhiṣṭhira; nakulaḥ—Nakula; sahadevaḥ—Sahadeva; ca—and; sughoṣa-maṇipuṣpakau—the conches named Sughoṣa and Maṇipuṣpaka; kāśyaḥ—the King of Kāśī (Vārāṇasī); ca—and; parama-iṣu-āsaḥ—the great archer; śikhaṇḍī—Śikhaṇḍī; ca—also; mahā-rathaḥ—one who can fight alone against thousands; dhṛṣṭadyumnaḥ—Dhṛṣṭadyumna (the son of King Drupada); virāṭaḥ—Virāṭa (the prince who gave shelter to the Pāṇḍavas while they were in disguise); ca—also; sātyakiḥ—Sātyaki (the same as Yuyudhāna, the charioteer of Lord Kṛṣṇa); ca—and; aparājitaḥ—who had never been vanquished; drupadaḥ—Drupada, the King of Pāñcāla; draupadeyāḥ—the sons of Draupadī; ca—also; sarvaśaḥ—all; pṛthivī-pate—O King; saubhadraḥ—Abhimanyu, the son of Subhadrā; ca—also; mahā-bāhuḥ—mighty-armed; śaṅkhān—conchshells; dadhmuḥ—blew; pṛthak pṛthak—each separately.`,
    wbw_ru: `-`,
    tr_en: `King Yudhiṣṭhira, the son of Kuntī, blew his conchshell, the Anantavijaya, and Nakula and Sahadeva blew the Sughoṣa and Maṇipuṣpaka. That great archer the King of Kāśī, the great fighter Śikhaṇḍī, Dhṛṣṭadyumna, Virāṭa and the unconquerable Sātyaki, Drupada, the sons of Draupadī, and the others, O King, such as the son of Subhadrā, greatly armed, all blew their respective conchshells.`,
    tr_ru: `-`,
    pur_en: `Sañjaya informed King Dhṛtarāṣṭra very tactfully that his unwise policy of deceiving the sons of Pāṇḍu and endeavoring to enthrone his own sons on the seat of the kingdom was not very laudable. The signs already clearly indicated that the whole Kuru dynasty would be killed in that great battle. Beginning with the grandsire, Bhīṣma, down to the grandsons like Abhimanyu and others—including kings from many states of the world—all were present there, and all were doomed. The whole catastrophe was due to King Dhṛtarāṣṭra, because he encouraged the policy followed by his sons.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/16-18',
  },
  {
    n: 19,
    skr: `स घोषो धार्तराष्ट्राणां हृदयानि व्यदारयत् ।
नभश्च पृथिवीं चैव तुमुलोऽभ्यनुनादयन् ॥ १९ ॥`,
    tr: `sa ghoṣo dhārtarāṣṭrāṇāṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;hṛdayāni vyadārayat
nabhaś ca pṛthivīṁ caiva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tumulo 'bhyanunādayan`,
    wbw_en: `saḥ—that; ghoṣaḥ—vibration; dhārtarāṣṭrāṇām—of the sons of Dhṛtarāṣṭra; hṛdayāni—hearts; vyadārayat—shattered; nabhaḥ—the sky; ca—also; pṛthivīm—the surface of the earth; ca—also; eva—certainly; tumulaḥ—uproarious; abhyanunādayan—by resounding.`,
    wbw_ru: `-`,
    tr_en: `The blowing of these different conchshells became uproarious, and thus, vibrating both in the sky and on the earth, it shattered the hearts of the sons of Dhṛtarāṣṭra.`,
    tr_ru: `-`,
    pur_en: `When Bhīṣma and the others on the side of Duryodhana blew their respective conchshells, there was no heart-breaking on the part of the Pāṇḍavas. Such occurrences are not mentioned, but in this particular verse it is mentioned that the hearts of the sons of Dhṛtarāṣṭra were shattered by the sounds vibrated by the Pāṇḍavas' party. This is due to the Pāṇḍavas and their confidence in Lord Kṛṣṇa. One who takes shelter of the Supreme Lord has nothing to fear, even in the midst of the greatest calamity.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/19',
  },
  {
    n: 20,
    skr: `अथ व्यवस्थितान्दृष्ट्वा धार्तराष्ट्रान्कपिध्वजः ।
प्रवृत्ते शस्त्रसम्पाते धनुरुद्यम्य पाण्डवः ॥ २० ॥
हृषीकेशं तदा वाक्यमिदमाह महीपते ।`,
    tr: `atha vyavasthitān dṛṣṭvā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dhārtarāṣṭrān kapi-dhvajaḥ
pravṛtte śastra-sampāte
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dhanur udyamya pāṇḍavaḥ
hṛṣīkeśaṁ tadā vākyam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;idam āha mahī-pate`,
    wbw_en: `atha—thereupon; vyavasthitān—situated; dṛṣṭvā—looking on; dhārtarāṣṭrān—the sons of Dhṛtarāṣṭra; kapi-dhvajaḥ—one whose flag is marked with Hanumān; pravṛtte—while about to be engaged; śastra-sampāte—the arrows released; dhanuḥ—bow; udyamya—after taking up; pāṇḍavaḥ—the son of Pāṇḍu (Arjuna); hṛṣīkeśam—unto Lord Kṛṣṇa; tadā—at that time; vākyam—words; idam—these; āha—said; mahī-pate—O King.`,
    wbw_ru: `-`,
    tr_en: `O King, at that time Arjuna, the son of Pāṇḍu, who was seated in his chariot, his flag marked with Hanumān, took up his bow and prepared to shoot his arrows, looking at the sons of Dhṛtarāṣṭra. O King, Arjuna then spoke to Hṛṣīkeśa [Kṛṣṇa] these words:`,
    tr_ru: `-`,
    pur_en: `The battle was just about to begin. It is understood from the above statement that the sons of Dhṛtarāṣṭra were more or less disheartened by the unexpected arrangement of military force by the Pāṇḍavas, who were guided by the direct instructions of Lord Kṛṣṇa on the battlefield. The emblem of Hanumān on the flag of Arjuna is another sign of victory because Hanumān cooperated with Lord Rāma in the battle between Rāma and Rāvaṇa, and Lord Rāma emerged victorious. Now both Rāma and Hanumān were present on the chariot of Arjuna to help him. Lord Kṛṣṇa is Rāma Himself, and wherever Lord Rāma is, His eternal servitor Hanumān and His eternal consort Sītā, the goddess of fortune, are present. Therefore, Arjuna had no cause to fear any enemies whatsoever. And above all, the Lord of the senses, Lord Kṛṣṇa, was personally present to give him direction. Thus, all good counsel was available to Arjuna in the matter of executing the battle. In such auspicious conditions, arranged by the Lord for His eternal devotee, lay the signs of assured victory.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/20',
  },
  {
    n: 21,
    nLabel: '21–22',
    skr: `अर्जुन उवाच ।
सेनयोरुभयोर्मध्ये रथं स्थापय मेऽच्युत ॥ २१ ॥
यावदेतान्निरीक्षेऽहं योद्धुकामानवस्थितान् ।
कैर्मया सह योद्धव्यमस्मिन्रणसमुद्यमे ॥ २२ ॥`,
    tr: `arjuna uvāca
senayor ubhayor madhye
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;rathaṁ sthāpaya me 'cyuta
yāvad etān nirīkṣe 'haṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yoddhu-kāmān avasthitān
kair mayā saha yoddhavyam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;asmin raṇa-samudyame`,
    wbw_en: `arjunaḥ—Arjuna; uvāca—said; senayoḥ—of the armies; ubhayoḥ—of both the parties; madhye—in between them; ratham—the chariot; sthāpaya—please keep; me—my; acyuta—O infallible one; yāvat—as long as; etān—all these; nirīkṣe—may look; aham—I; yoddhu-kāmān—desiring to fight; avasthitān—arrayed on the battlefield; kaiḥ—with whom; mayā—by me; saha—with; yoddhavyam—to fight with; asmin—in this; raṇa—strife; samudyame—in the attempt.`,
    wbw_ru: `-`,
    tr_en: `Arjuna said: O infallible one, please draw my chariot between the two armies so that I may see who is present here, who is desirous of fighting, and with whom I must contend in this great battle attempt.`,
    tr_ru: `-`,
    pur_en: `Although Lord Kṛṣṇa is the Supreme Personality of Godhead, out of His causeless mercy He was engaged in the service of His friend. He never fails in His affection for His devotees, and thus He is addressed herein as infallible. As charioteer, He had to carry out the orders of Arjuna, and since He did not hesitate to do so, He is addressed as infallible. Although He had accepted the position of a charioteer for His devotee, His supreme position was not challenged. In all circumstances, He is the Supreme Personality of Godhead, Hṛṣīkeśa, the Lord of the total senses. The relationship between the Lord and His servitor is very sweet and transcendental. The servitor is always ready to render a service to the Lord, and, similarly, the Lord is always seeking an opportunity to render some service to the devotee. He takes greater pleasure in His pure devotee's assuming the advantageous postion of ordering Him than He does in being the giver of orders. As master, everyone is under His orders, and no one is above Him to order Him. But when he finds that a pure devotee is ordering Him, He obtains transcendental pleasure, although He is the infallible master of all circumstances.
As a pure devotee of the Lord, Arjuna had no desire to fight with his cousins and brothers, but he was forced to come onto the battlefield by the obstinacy of Duryodhana, who was never agreeable to any peaceful negotiation. Therefore, he was very anxious to see who the leading persons present on the battlefield were. Although there was no question of a peacemaking endeavor on the battlefield, he wanted to see them again, and to see how much they were bent upon demanding an unwanted war.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/21-22',
  },
  {
    n: 23,
    skr: `योत्स्यमानानवेक्षेऽहं य एतेऽत्र समागताः ।
धार्तराष्ट्रस्य दुर्बुद्धेर्युद्धे प्रियचिकीर्षवः ॥ २३ ॥`,
    tr: `yotsyamānān avekṣe 'haṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ya ete 'tra samāgatāḥ
dhārtarāṣṭrasya durbuddher
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yuddhe priya-cikīrṣavaḥ`,
    wbw_en: `yotsyamānān—those who will be fighting; avekṣe—let me see; aham—I; ye—who; ete—those; atra—here; samāgatāḥ—assembled; dhārtarāṣṭrasya—the son of Dhṛtarāṣṭra; durbuddheḥ—evil-minded; yuddhe—in the fight; priya—well; cikīrṣavaḥ—wishing.`,

    tr_en: `Let me see those who have come here to fight, wishing to please the evil-minded son of Dhṛtarāṣṭra.`,
    tr_ru: `-`,
    pur_en: `It was an open secret that Duryodhana wanted to usurp the kingdom of the Pāṇḍavas by evil plans, in collaboration with his father, Dhṛtarāṣṭra. Therefore, all persons who had joined the side of Duryodhana must have been birds of the same feather. Arjuna wanted to see them in the battlefield before the fight was begun, just to learn who they were, but he had no intention of proposing peace negotiations with them. It was also a fact that he wanted to see them to make an estimate of the strength which he had to face, although he was quite confident of victory because Kṛṣṇa was sitting by his side.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/23',
  },
  {
    n: 24,
    skr: `सञ्जय उवाच ।
एवमुक्तो हृषीकेशो गुडाकेशेन भारत ।
सेनयोरुभयोर्मध्ये स्थापयित्वा रथोत्तमम् ॥ २४ ॥`,
    tr: `sañjaya uvāca
evam ukto hṛṣīkeśo
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;guḍākeśena bhārata
senayor ubhayor madhye
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sthāpayitvā rathottamam`,
    wbw_en: `sañjayaḥ—Sañjaya; uvāca—said; evam—thus; uktaḥ—addressed; hṛṣīkeśaḥ—Lord Kṛṣṇa; guḍākeśena—by Arjuna; bhārata—O descendant of Bharata; senayoḥ—of armies; ubhayoḥ—of both; madhye—in the midst of; sthāpayitvā—by placing; rathottamam—the finest chariot.`,
    wbw_ru: `-`,
    tr_en: `Sañjaya said: O descendant of Bharata, being thus addressed by Arjuna, Lord Kṛṣṇa drew up the fine chariot in the midst of the armies of both parties.`,
    tr_ru: `-`,
    pur_en: `In this verse Arjuna is referred to as Guḍākeśa. Guḍāka means sleep, and one who conquers sleep is called guḍākeśa. Sleep also means ignorance. So Arjuna conquered both sleep and ignorance because of his friendship with Kṛṣṇa. As a great devotee of Kṛṣṇa, he could not forget Kṛṣṇa even for a moment, because that is the nature of a devotee. Either in waking or in sleep, a devotee of the Lord can never be free from thinking of Kṛṣṇa's name, form, quality and pastimes. Thus a devotee of Kṛṣṇa can conquer both sleep and ignorance simply by thinking of Kṛṣṇa constantly. This is called Kṛṣṇa consciousness, or samādhi. As Hṛṣīkeśa, or the director of the senses and mind of every living entity, Kṛṣṇa could understand Arjuna's purpose in placing the chariot in the midst of the armies. Thus He did so, and spoke as follows.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/24',
  },
  {
    n: 25,
    skr: `भीष्मद्रोणप्रमुखतः सर्वेषां च महीक्षिताम् ।
उवाच पार्थ पश्यैतान्समवेतान्कुरूनिति ॥ २५ ॥`,
    tr: `bhīṣma-droṇa-pramukhataḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sarveṣāṁ ca mahī-kṣitām
uvāca pārtha paśyaitān
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;samavetān kurūn iti`,
    wbw_en: `bhīṣma—Grandfather Bhīṣma; droṇa—the teacher Droṇa; pramukhataḥ—in the front of; sarveṣām—all; ca—also; mahīkṣitām—chiefs of the world; uvāca—said; pārtha—O Pārtha (son of Pṛthā); paśya—just behold; etān—all of them; samavetān—assembled; kurūn—all the members of the Kuru dynasty; iti—thus.`,
    wbw_ru: `-`,
    tr_en: `In the presence of Bhīṣma, Droṇa and all other chieftains of the world, Hṛṣīkeśa, the Lord, said, Just behold, Pārtha, all the Kurus who are assembled here.`,
    tr_ru: `-`,
    pur_en: `As the Supersoul of all living entities, Lord Kṛṣṇa could understand what was going on in the mind of Arjuna. The use of the word Hṛṣīkeśa in this connection indicates that He knew everything. And the word Pārtha, or the son of Kuntī or Pṛthā, is also similarly significant in reference to Arjuna. As a friend, He wanted to inform Arjuna that because Arjuna was the son of Pṛthā, the sister of His own father Vasudeva, He had agreed to be the charioteer of Arjuna. Now what did Kṛṣṇa mean when He told Arjuna to "behold the Kurus"? Did Arjuna want to stop there and not fight? Kṛṣṇa never expected such things from the son of His aunt Pṛthā. The mind of Arjuna was thus predicated by the Lord in friendly joking.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/25',
  },
  {
    n: 26,
    skr: `तत्रापश्यत्स्थितान्पार्थः पितॄनथ पितामहान् ।
आचार्यान्मातुलान्भ्रातॄन्पुत्रान्पौत्रान्सखींस्तथा ॥ २६ ॥
श्वशुरान्सुहृदश्चैव सेनयोरुभयोरपि ।`,
    tr: `tatrāpaśyat sthitān pārthaḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pitṝn atha pitāmahān
ācāryān mātulān bhrātṝn
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;putrān pautrān sakhīṁs tathā
śvaśurān suhṛdaś caiva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;senayor ubhayor api`,
    wbw_en: `tatra—there; apaśyat—he could see; sthitān—standing; pārthaḥ—Arjuna; pitṝn—fathers; atha—also; pitāmahān—grandfathers; ācāryān—teachers; mātulān—maternal uncles; bhrātṝn—brothers; putrān—sons ; pautrān—grandsons; sakhīn—friends; tathā—too, śvaśurān—fathers-in-law; suhṛdaḥ—wellwishers; ca—also; eva—certainly; senayoḥ—of the armies; ubhayoḥ—of both parties; api—including.`,
    wbw_ru: `-`,
    tr_en: `There Arjuna could see, within the midst of the armies of both parties, his fathers, grandfathers, teachers, maternal uncles, brothers, sons, grandsons, friends, and also his father-in-law and well-wishers-all present there.`,
    tr_ru: `-`,
    pur_en: `On the battlefield Arjuna could see all kinds of relatives. He could see persons like Bhūriśravā, who were his father's contemporaries, grandfathers Bhīṣma and Somadatta, teachers like Droṇācārya and Kṛpācārya, maternal uncles like Śalya and Śakuni, brothers like Duryodhana, sons like Lakṣmaṇa, friends like Aśvatthāmā, well-wishers like Kṛtavarmā, etc. He could see also the armies which contained many of his friends.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/26',
  },
  {
    n: 27,
    skr: `तान्समीक्ष्य स कौन्तेयः सर्वान्बन्धूनवस्थितान् ॥ २७ ॥

  {
    n: 28,
    nLabel: '28–30',
    skr: `अर्जुन उवाच ।
दृष्ट्वेमं स्वजनं कृष्ण युयुत्सुं समुपस्थितम् ॥ २८ ॥
सीदन्ति मम गात्राणि मुखं च परिशुष्यति ।
वेपथुश्च शरीरे मे रोमहर्षश्च जायते ॥ २९ ॥
गाण्डीवं स्रंसते हस्तात्त्वक्चैव परिदह्यते ।
न च शक्नोम्यवस्थातुं भ्रमतीव च मे मनः ॥ ३० ॥`,
    tr: `arjuna uvāca
dṛṣṭvemaṁ sva-janaṁ kṛṣṇa
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;yuyutsuṁ samupasthitam
sīdanti mama gātrāṇi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mukhaṁ ca pariśuṣyati`,
    wbw_en: `arjunaḥ—Arjuna; uvāca—said; dṛṣṭvā—after seeing; imam—all these; svajanam—kinsmen; kṛṣṇa—O Kṛṣṇa; yuyutsum—all in fighting spirit; samupasthitam—all present; sīdanti—quivering; mama—my; gātrāṇi—limbs of the body; mukham—mouth; ca—also; pariśuṣyati—drying up.`,
    wbw_ru: `-`,
    tr_en: `Arjuna said: My dear Kṛṣṇa, seeing my friends and relatives present before me in such a fighting spirit, I feel the limbs of my body quivering and my mouth drying up.`,
    tr_ru: `-`,
    pur_en: `Any man who has genuine devotion to the Lord has all the good qualities which are found in godly persons or in the demigods, whereas the nondevotee, however advanced he may be in material qualifications by education and culture, lacks in godly qualities. As such, Arjuna, just after seeing his kinsmen, friends and relatives on the battlefield, was at once overwhelmed by compassion for them who had so decided to fight amongst themselves. As far as his soldiers were concerned, he was sympathetic from the beginning, but he felt compassion even for the soldiers of the opposite party, foreseeing their imminent death. And so thinking, the limbs of his body began to quiver, and his mouth became dry. He was more or less astonished to see their fighting spirit. Practically the whole community, all blood relatives of Arjuna, had come to fight with him. This overwhelmed a kind devotee like Arjuna. Although it is not mentioned here, still one can easily imagine that not only were Arjuna's bodily limbs quivering and his mouth drying up, but that he was also crying out of compassion. Such symptoms in Arjuna were not due to weakness but to his softheartedness, a characteristic of a pure devotee of the Lord. It is said therefore:
yasyāsti bhaktir bhagavaty akiñcanā
sarvair guṇais tatra samāsate surāḥ
harāv abhaktasya kuto mahad-guṇā
mano-rathenāsati dhāvato bahiḥ
"One who has unflinching devotion for the Personality of Godhead has all the good qualities of the demigods. But one who is not a devotee of the Lord has only material qualifications that are of little value. This is because he is hovering on the mental plane and is certain to be attracted by the glaring material energy." (Bhāg. 5.18.12)`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/28-30',
  },
  {
    n: 29,
    skr: ``,
    tr: `vepathuś ca śarīre me
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;roma-harṣaś ca jāyate
gāṇḍīvaṁ sraṁsate hastāt
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tvak caiva paridahyate`,
    wbw_en: `vepathuḥ—trembling of the body; ca—also; śarīre—on the body; me—my; roma-harṣaḥ—standing of hair on end; ca—also; jāyate—is taking place; gāṇḍīvam—the bow of Arjuna; sraṁsate—is slipping; hastāt—from the hands; tvak—skin; ca—also; eva—certainly; paridahyate—burning.`,
    wbw_ru: `-`,
    tr_en: `My whole body is trembling, and my hair is standing on end. My bow Gāṇḍīva is slipping from my hand, and my skin is burning.`,
    tr_ru: `-`,
    pur_en: `There are two kinds of trembling of the body, and two kinds of standings of the hair on end. Such phenomena occur either in great spiritual ecstasy or out of great fear under material conditions. There is no fear in transcendental realization. Arjuna's symptoms in this situation are out of material fear—namely, loss of life. This is evident from other symptoms also; he became so impatient that his famous bow Gāṇḍīva was slipping from his hands, and, because his heart was burning within him, he was feeling a burning sensation of the skin. All these are due to a material conception of life.`,
    pur_ru: `-`,
    audio: '',
  },
  {
    n: 30,
    skr: ``,
    tr: `na ca śaknomy avasthātuṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;bhramatīva ca me manaḥ
nimittāni ca paśyāmi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;viparītāni keśava`,
    wbw_en: `na—nor; ca—also; śaknomi—am I able; avasthātum—to stay; bhramati—forgetting; iva—as; ca—and; me—my; manaḥ—mind; nimittāni—causes; ca—also; paśyāmi—I foresee; viparītāni—just the opposite; keśava—O killer of the demon Keśī (Kṛṣṇa).`,
    wbw_ru: `-`,
    tr_en: `I am now unable to stand here any longer. I am forgetting myself, and my mind is reeling. I foresee only evil, O killer of the Keśī demon.`,
    tr_ru: `-`,
    pur_en: `Due to his impatience, Arjuna was unable to stay on the battlefield, and he was forgetting himself on account of the weakness of his mind. Excessive attachment for material things puts a man in a bewildering condition of existence. Bhayaṁ dvitīyābhiniveśataḥ: such fearfulness and loss of mental equilibrium take place in persons who are too affected by material conditions. Arjuna envisioned only unhappiness in the battlefield—he would not be happy even by gaining victory over the foe. The word nimitta is significant. When a man sees only frustration in his expectations, he thinks, "Why am I here?" Everyone is interested in himself and his own welfare. No one is interested in the Supreme Self. Arjuna is supposed to show disregard for self-interest by submission to the will of Kṛṣṇa, who is everyone's real self-interest. The conditioned soul forgets this, and therefore suffers material pains. Arjuna thought that his victory in the battle would only be a cause of lamentation for him.`,
    pur_ru: `-`,
    audio: '',
  },
  {
    n: 31,
    skr: `निमित्तानि च पश्यामि विपरीतानि केशव ।
न च श्रेयोऽनुपश्यामि हत्वा स्वजनमाहवे ॥ ३१ ॥`,
    tr: `na ca śreyo 'nupaśyāmi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;hatvā sva-janam āhave
na kāṅkṣe vijayaṁ kṛṣṇa
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;na ca rājyaṁ sukhāni ca`,
    wbw_en: `na—nor; ca—also; śreyaḥ—good; anupaśyāmi—do I foresee; hatvā—by killing; svajanam—own kinsmen; āhave—in the fight; na—nor; kānkṣe—do I desire; vijayam—victory; kṛṣṇa—O Kṛṣṇa; na—nor; ca—also; rājyam—kingdom; sukhāni—happiness thereof; ca—also.`,
    wbw_ru: `-`,
    tr_en: `I do not see how any good can come from killing my own kinsmen in this battle, nor can I, my dear Kṛṣṇa, desire any subsequent victory, kingdom, or happiness.`,
    tr_ru: `-`,
    pur_en: `Without knowing that one's self-interest is in Viṣṇu (or Kṛṣṇa), conditioned souls are attracted by bodily relationships, hoping to be happy in such situations. Under delusion, they forget that Kṛṣṇa is also the cause of material happiness. Arjuna appears to have even forgotten the moral codes for a kṣatriya. It is said that two kinds of men, namely the kṣatriya who dies directly in front of the battlefield under Kṛṣṇa's personal orders and the person in the renounced order of life who is absolutely devoted to spiritual culture, are eligible to enter into the sun-globe, which is so powerful and dazzling. Arjuna is reluctant even to kill his enemies, let alone his relatives. He thought that by killing his kinsmen there would be no happiness in his life, and therefore he was not willing to fight, just as a person who does not feel hunger is not inclined to cook. He has now decided to go into the forest and live a secluded life in frustration. But as a kṣatriya, he requires a kingdom for his subsistence, because the kṣatriyas cannot engage themselves in any other occupation. But Arjuna has had no kingdom. Arjuna's sole opportunity for gaining a kingdom lay in fighting with his cousins and brothers and reclaiming the kingdom inherited from his father, which he does not like to do. Therefore he considers himself fit to go to the forest to live a secluded life of frustration.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/31',
  },
  {
    n: 32,
    nLabel: '32–35',
    skr: `न काङ्क्षे विजयं कृष्ण न च राज्यं सुखानि च ।
किं नो राज्येन गोविन्द किं भोगैर्जीवितेन वा ॥ ३२ ॥
येषामर्थे काङ्क्षितं नो राज्यं भोगाः सुखानि च ।
त इमेऽवस्थिता युद्धे प्राणांस्त्यक्त्वा धनानि च ॥ ३३ ॥
आचार्याः पितरः पुत्रास्तथैव च पितामहाः ।
मातुलाः श्वशुराः पौत्राः श्यालाः सम्बन्धिनस्तथा ॥ ३४ ॥
एतान्न हन्तुमिच्छामि घ्नतोऽपि मधुसूदन ।
अपि त्रैलोक्यराज्यस्य हेतोः किं नु महीकृते ॥ ३५ ॥`,
    tr: `kiṁ no rājyena govinda
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kiṁ bhogair jīvitena vā
yeṣām arthe kāṅkṣitaṁ no
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;rājyaṁ bhogāḥ sukhāni ca
ta ime 'vasthitā yuddhe
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;prāṇāṁs tyaktvā dhanāni ca
ācāryāḥ pitaraḥ putrās
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;tathaiva ca pitāmahāḥ
mātulāḥ śvaśurāḥ pautrāḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;śyālāḥ sambandhinas tathā
etān na hantum icchāmi
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ghnato 'pi madhusūdana
api trailokya-rājyasya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;hetoḥ kiṁ nu mahī-kṛte
nihatya dhārtarāṣṭrān naḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kā prītiḥ syāj janārdana`,
    wbw_en: `kim—what use; naḥ—to us; rājyena—is the kingdom; govinda—O Kṛṣṇa; kim—what; bhogaiḥ—enjoyment; jīvitena—by living; vā—either; yeṣām—for whom; arthe—for the matter of; kāṅkṣitam—desired; naḥ—our; rājyam—kingdom; bhogāḥ—material enjoyment; sukhāni—all happiness; ca—also; te—all of them; ime—these; avasthitāḥ—situated; yuddhe—in this battlefield; prāṇān—lives; tyaktvā—giving up; dhanāni—riches; ca—also; ācāryāḥ—teachers; pitaraḥ—fathers; putrāḥ—sons; tathā—as well as; eva—certainly; ca—also; pitāmahāḥ—grandfathers; mātulāḥ—maternal uncles; śvaśurāḥ—fathers-in-law; pautrāḥ—grandsons; śyālāḥ—brothers-in-law; sambandhinaḥ—relatives; tathā—as well as; etān—all these; na—never; hantum—for killing; icchāmi—do I wish; ghnataḥ—being killed; api—even; madhusūdana—O killer of the demon Madhu (Kṛṣṇa); api—even if; trailokya—of the three worlds; rājyasya—of the kingdoms; hetoḥ—in exchange; kim—what to speak of; nu—only; mahī-kṛte—for the sake of earth; nihatya—by killing; dhārtarāṣṭrān—the sons of Dhṛtarāṣṭra; naḥ—our; kā—what; prītiḥ—pleasure; syāt—will there be; janārdana—O maintainer of all living entities.`,
    wbw_ru: `-`,
    tr_en: `O Govinda, of what avail to us are kingdoms, happiness or even life itself when all those for whom we may desire them are now arrayed in this battlefield? O Madhusūdana, when teachers, fathers, sons, grandfathers, maternal uncles, fathers-in-law, grandsons, brothers-in-law and all relatives are ready to give up their lives and properties and are standing before me, then why should I wish to kill them, though I may survive? O maintainer of all creatures, I am not prepared to fight with them even in exchange for the three worlds, let alone this earth.`,
    tr_ru: `-`,
    pur_en: `Arjuna has addressed Lord Kṛṣṇa as Govinda because Kṛṣṇa is the object of all pleasures for cows and the senses. By using this significant word, Arjuna indicates what will satisfy his senses. Although Govinda is not meant for satisfying our senses, if we try to satisfy the senses of Govinda then automatically our own senses are satisfied. Materially, everyone wants to satisfy his senses, and he wants God to be the order supplier for such satisfaction. The Lord will satisfy the senses of the living entities as much as they deserve, but not to the extent that they may covet. But when one takes the opposite way—namely, when one tries to satisfy the senses of Govinda without desiring to satisfy one's own senses—then by the grace of Govinda all desires of the living entity are satisfied. Arjuna's deep affection for community and family members is exhibited here partly due to his natural compassion for them. He is therefore not prepared to fight. Everyone wants to show his opulence to friends and relatives, but Arjuna fears that all his relatives and friends will be killed in the battlefield, and he will be unable to share his opulence after victory. This is a typical calculation of material life. The transcendental life is, however, different. Since a devotee wants to satisfy the desires of the Lord, he can, Lord willing, accept all kinds of opulence for the service of the Lord, and if the Lord is not willing, he should not accept a farthing. Arjuna did not want to kill his relatives, and if there were any need to kill them, he desired that Kṛṣṇa kill them personally. At this point he did not know that Kṛṣṇa had already killed them before their coming into the battlefield and that he was only to become an instrument for Kṛṣṇa. This fact is disclosed in following chapters. As a natural devotee of the Lord, Arjuna did not like to retaliate against his miscreant cousins and brothers, but it was the Lord's plan that they should all be killed. The devotee of the Lord does not retaliate against the wrongdoer, but the Lord does not tolerate any mischief done to the devotee by the miscreants. The Lord can excuse a person on His own account, but He excuses no one who has done harm to His devotees. Therefore the Lord was determined to kill the miscreants, although Arjuna wanted to excuse them.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/32-35',
  },
  {
    n: 36,
    skr: `पापमेवाश्रयेदस्मान्हत्वैतानाततायिनः ।
तस्मान्नार्हा वयं हन्तुं धार्तराष्ट्रान्स्वबान्धवान् ।
स्वजनं हि कथं हत्वा सुखिनः स्याम माधव ॥ ३६ ॥`,
    tr: `pāpam evāśrayed asmān
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;hatvaitān ātatāyinaḥ
tasmān nārhā vayaṁ hantuṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;dhārtarāṣṭrān sa-bāndhavān
sva-janaṁ hi kathaṁ hatvā
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;sukhinaḥ syāma mādhava`,
    wbw_en: `pāpam—vices; eva—certainly; āśrayet—must take upon; asmān—us; hatvā—by killing; etān—all these; ātatāyinaḥ—aggressors; tasmāt—therefore; na—never; arhāḥ—deserving; vayam—us; hantum—to kill; dhārtarāṣṭrān—the sons of Dhṛtarāṣṭra; svabāndhavān—along with friends; svajanam—kinsmen; hi—certainly; katham—how; hatvā—by killing; sukhinaḥ—happy; syāma—become; mādhava—O Kṛṣṇa, husband of the goddess of fortune.`,
    wbw_ru: `-`,
    tr_en: `Sin will overcome us if we slay such aggressors. Therefore it is not proper for us to kill the sons of Dhṛtarāṣṭra and our friends. What should we gain, O Kṛṣṇa, husband of the goddess of fortune, and how could we be happy by killing our own kinsmen?`,
    tr_ru: `-`,
    pur_en: `According to Vedic injunctions there are six kinds of aggressors: 1) a poison giver, 2) one who sets fire to the house, 3) one who attacks with deadly weapons, 4) one who plunders riches, 5) one who occupies another's land, and 6) one who kidnaps a wife. Such aggressors are at once to be killed, and no sin is incurred by killing such aggressors. Such killing of aggressors is quite befitting for any ordinary man, but Arjuna was not an ordinary person. He was saintly by character, and therefore he wanted to deal with them in saintliness. This kind of saintliness, however, is not for a kṣatriya. Although a responsible man in the administration of a state is required to be saintly, he should not be cowardly. For example, Lord Rāma was so saintly that people were anxious to live in His kingdom, (Rāma-rājya), but Lord Rāma never showed any cowardice. Rāvaṇa was an aggressor against Rāma because he kidnapped Rāma's wife, Sītā, but Lord Rāma gave him sufficient lessons, unparalleled in the history of the world. In Arjuna's case, however, one should consider the special type of aggressors, namely his own grandfather, own teacher, friends, sons, grandsons, etc. Because of them, Arjuna thought that he should not take the severe steps necessary against ordinary aggressors. Besides that, saintly persons are advised to forgive. Such injunctions for saintly persons are more important than any political emergency. Arjuna considered that rather than kill his own kinsmen for political reasons, it would be better to forgive them on grounds of religion and saintly behavior. He did not, therefore, consider such killing profitable simply for the matter of temporary bodily happiness. After all, kingdoms and pleasures derived therefrom are not permanent, so why should he risk his life and eternal salvation by killing his own kinsmen? Arjuna's addressing of Kṛṣṇa as "Mādhava," or the husband of the goddess of fortune, is also significant in this connection. He wanted to point out to Kṛṣṇa that, as husband of the goddess of fortune, He should not have to induce Arjuna to take up a matter which would ultimately bring about misfortune. Kṛṣṇa, however, never brings misfortune to anyone, to say nothing of His devotees.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/36',
  },
  {
    n: 37,
    nLabel: '37–38',
    skr: `यद्यप्येते न पश्यन्ति लोभोपहतचेतसः ।
कुलक्षयकृतं दोषं मित्रद्रोहे च पातकम् ॥ ३७ ॥
कथं न ज्ञेयमस्माभिः पापादस्मान्निवर्तितुम् ।
कुलक्षयकृतं दोषं प्रपश्यद्भिर्जनार्दन ॥ ३८ ॥`,
    tr: `yady apy ete na paśyanti
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;lobhopahata-cetasaḥ
kula-kṣaya-kṛtaṁ doṣaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;mitra-drohe ca pātakam
kathaṁ na jñeyam asmābhiḥ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pāpād asmān nivartitum
kula-kṣaya-kṛtaṁ doṣaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;prapaśyadbhir janārdana`,
    wbw_en: `yadi—if; api—certainly; ete—they; na—do not; paśyanti—see; lobha—greed; upahata—overpowered; cetasaḥ—the hearts; kula-kṣaya—in killing the family; kṛtam—done; doṣam—fault; mitra-drohe—quarreling with friends; ca—also; pātakam—sinful reactions; katham—why; na—shall not; jñeyam—know this; asmābhiḥ—by us; pāpāt—from sins; asmāt—ourselves; nivartitum—to cease; kula-kṣaya—the destruction of a dynasty; kṛtam—by so doing; doṣam—crime; prapaśyadbhiḥ—by those who can see; janārdana—O Kṛṣṇa.`,
    wbw_ru: `-`,
    tr_en: `O Janārdana, although these men, overtaken by greed, see no fault in killing one's family or quarreling with friends, why should we, with knowledge of the sin, engage in these acts?`,
    tr_ru: `-`,
    pur_en: `A kṣatriya is not supposed to refuse to battle or gamble when he is so invited by some rival party. Under such obligation, Arjuna could not refuse to fight because he was challenged by the party of Duryodhana. In this connection, Arjuna considered that the other party might be blind to the effects of such a challenge. Arjuna, however, could see the evil consequences and could not accept the challenge. Obligation is actually binding when the effect is good, but when the effect is otherwise, then no one can be bound. Considering all these pros and cons, Arjuna decided not to fight.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/37-38',
  },
  {
    n: 39,
    skr: `कुलक्षये प्रणश्यन्ति कुलधर्माः सनातनाः ।
धर्मे नष्टे कुलं कृत्स्नमधर्मोऽभिभवत्युत ॥ ३९ ॥`,
    tr: `kula-kṣaye praṇaśyanti
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kula-dharmāḥ sanātanāḥ
dharme naṣṭe kulaṁ kṛtsnam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;adharmo 'bhibhavaty uta`,
    wbw_en: `kula-kṣaye—in destroying the family; praṇaśyanti—becomes vanquished; kula-dharmāḥ—the family traditions; sanātanāḥ—eternal; dharme—in religion; naṣṭe—being destroyed; kulam—family; kṛtsnam—wholesale; adharmaḥ—irreligious; abhibhavati—transforms; uta—it is said.`,
    wbw_ru: `-`,
    tr_en: `With the destruction of dynasty, the eternal family tradition is vanquished, and thus the rest of the family becomes involved in irreligious practice.`,
    tr_ru: `-`,
    pur_en: `In the system of the varṇāśrama institution there are many principles of religious traditions to help members of the family grow properly and attain spiritual values. The elder members are responsible for such purifying processes in the family, beginning from birth to death. But on the death of the elder members, such family traditions of purification may stop, and the remaining younger family members may develop irreligious habits and thereby lose their chance for spiritual salvation. Therefore, for no purpose should the elder members of the family be slain.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/39',
  },
  {
    n: 40,
    skr: `अधर्माभिभवात्कृष्ण प्रदुष्यन्ति कुलस्त्रियः ।
स्त्रीषु दुष्टासु वार्ष्णेय जायते वर्णसङ्करः ॥ ४० ॥`,
    tr: `adharmābhibhavāt kṛṣṇa
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;praduṣyanti kula-striyaḥ
strīṣu duṣṭāsu vārṣṇeya
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;jāyate varṇa-saṅkaraḥ`,
    wbw_en: `adharma—irreligion; abhibhavāt—having been predominant; kṛṣṇa—O Kṛṣṇa; praduṣyanti—become polluted; kula-striyaḥ—family ladies; strīṣu —of the womanhood; duṣṭāsu—being so polluted; vārṣṇeya—O descendant of Vṛṣṇi; jāyate—it so becomes; varṇa-saṅkaraḥ—unwanted progeny.`,
    wbw_ru: `-`,
    tr_en: `When irreligion is prominent in the family, O Kṛṣṇa, the women of the family become corrupt, and from the degradation of womanhood, O descendant of Vṛṣṇi, comes unwanted progeny.`,
    tr_ru: `-`,
    pur_en: `Good population in human society is the basic principle for peace, prosperity and spiritual progress in life. The varṇāśrama religion's principles were so designed that the good population would prevail in society for the general spiritual progress of state and community. Such population depends on the chastity and faithfulness of its womanhood. As children are very prone to be misled, women are similarly very prone to degradation. Therefore, both children and women require protection by the elder members of the family. By being engaged in various religious practices, women will not be misled into adultery. According to Cāṇakya Paṇḍit, women are generally not very intelligent and therefore not trustworthy. So, the different family traditions of religious activities should always engage them, and thus their chastity and devotion will give birth to a good population eligible for participating in the varṇāśrama system. On the failure of such varṇāśrama-dharma, naturally the women become free to act and mix with men, and thus adultery is indulged in at the risk of unwanted population. Irresponsible men also provoke adultery in society, and thus unwanted children flood the human race at the risk of war and pestilence.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/40',
  },
  {
    n: 41,
    skr: `सङ्करो नरकायैव कुलघ्नानां कुलस्य च ।
पतन्ति पितरो ह्येषां लुप्तपिण्डोदकक्रियाः ॥ ४१ ॥`,
    tr: `saṅkaro narakāyaiva
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;kula-ghnānāṁ kulasya ca
patanti pitaro hy eṣāṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;lupta-piṇḍodaka-kriyāḥ`,
    wbw_en: `saṅkaraḥ—such unwanted children; narakāya—for hellish life; eva—certainly; kula-ghnānām—of those who are killers of the family; kulasya—of the family; ca—also; patanti—fall down; pitaraḥ—forefathers; hi—certainly; eṣām—of them; lupta—stopped; piṇḍa—offerings; udaka—water; kriyāḥ—performance.`,
    wbw_ru: `-`,
    tr_en: `When there is increase of unwanted population, a hellish situation is created both for the family and for those who destroy the family tradition. In such corrupt families, there is no offering of oblations of food and water to the ancestors.`,
    tr_ru: `-`,
    pur_en: `According to the rules and regulations of fruitive activities, there is a need to offer periodical food and water to the forefathers of the family. This offering is performed by worship of Viṣṇu, because eating the remnants of food offered to Viṣṇu can deliver one from all kinds of sinful actions. Sometimes the forefathers may be suffering from various types of sinful reactions, and sometimes some of them cannot even acquire a gross material body and are forced to remain in subtle bodies as ghosts. Thus, when remnants of prasādam food are offered to forefathers by descendants, the forefathers are released from ghostly or other kinds of miserable life. Such help rendered to forefathers is a family tradition, and those who are not in devotional life are required to perform such rituals. One who is engaged in the devotional life is not required to perform such actions. Simply by performing devotional service, one can deliver hundreds and thousands of forefathers from all kinds of misery. It is stated in the Bhāgavatam:
devarṣi-bhūtāpta-nṛnāṁ pitṝṇāṁ
na kiṅkaro nāyamṛṇī ca rājan
sarvātmanā yaḥ śaraṇaṁ śaraṇyaṁ
gato mukundaṁ parihṛtya kartam
"Anyone who has taken shelter of the lotus feet of Mukunda, the giver of liberation, giving up all kinds of obligation, and has taken to the path in all seriousness, owes neither duties nor obligations to the demigods, sages, general living entities, family members, humankind or forefathers." (Bhāg. 11.5.41) Such obligations are automatically fulfilled by performance of devotional service to the Supreme Personality of Godhead.`,
    pur_ru: `-`,
    audio: 'https://prabhupadabooks.com/bg/1/41',

  2: [
  {
    n: 1,
    skr: `सञ्जय उवाच ।
तं तथा कृपयाविष्टमश्रुपूर्णाकुलेक्षणम् ।
विषीदन्तमिदं वाक्यमुवाच मधुसूदनः ॥ १ ॥`,
    tr: `sañjaya uvāca
taṁ tathā kṛpayāviṣṭam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;aśru-pūrṇākulekṣaṇam
viṣīdantam idaṁ vākyam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;uvāca madhusūdanaḥ`,
    wbw_en: `sañjayaḥ uvāca—Sañjaya said; tam—unto Arjuna; tathā—thus; kṛpayā—by compassion; āviṣṭam—overwhelmed; aśru-pūrṇa—full of tears; ākula—depressed; īkṣaṇam—eyes; viṣīdantam—lamenting; idam—this; vākyam—words; uvāca—said; madhusūdanaḥ—the killer of Madhu.`,
    wbw_ru: ``,
    tr_en: `Sañjaya said: Seeing Arjuna full of compassion and very sorrowful, his eyes brimming with tears, Madhusūdana, Kṛṣṇa, spoke the following words.`,
    tr_ru: ``,
    pur_en: `Material compassion, lamentation and tears are all signs of ignorance of the real self. Compassion for the eternal soul is self-realization. The word "Madhusūdana" is significant in this verse. Lord Kṛṣṇa killed the demon Madhu, and now Arjuna wanted Kṛṣṇa to kill the demon of misunderstanding that had overtaken him in the discharge of his duty. No one knows where compassion should be applied. Compassion for the dress of a drowning man is senseless. A man fallen in the ocean of nescience cannot be saved simply by rescuing his outward dress—the gross material body. One who does not know this and laments for the outward dress is called a śūdra, or one who laments unnecessarily. Arjuna was a kṣatriya, and this conduct was not expected from him. Lord Kṛṣṇa, however, can dissipate the lamentation of the ignorant man, and for this purpose the Bhagavad-gītā was sung by Him. This chapter instructs us in self-realization by an analytical study of the material body and the spirit soul, as explained by the supreme authority, Lord Śrī Kṛṣṇa. This realization is made possible by working with the fruitive being situated in the fixed conception of the real self.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/1',
  },
  {
    n: 2,
    skr: `श्रीभगवानुवाच ।
कुतस्त्वा कश्मलमिदं विषमे समुपस्थितम् ।
अनार्यजुष्टमस्वर्ग्यमकीर्तिकरमर्जुन ॥ २ ॥`,
    tr: `śrī-bhagavān uvāca
kutas tvā kaśmalam idaṁ
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;viṣame samupasthitam
anārya-juṣṭam asvargyam
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;akīrti-karam arjuna`,
    wbw_en: `śrī bhagavān uvāca—the Supreme Personality of Godhead said; kutaḥ—wherefrom; tvā—unto you; kaśmalam—dirtiness; idam—this lamentation; viṣame—this hour of crisis; samupasthitam—arrived; anārya—persons who do not know the value of life; juṣṭam—practiced by; asvargyam—that which does not lead to higher planets; akīrti—infamy; karam—the cause of; arjuna—O Arjuna.`,
    wbw_ru: ``,
    tr_en: `The Supreme Person [Bhagavān] said: My dear Arjuna, how have these impurities come upon you? They are not at all befitting a man who knows the progressive values of life. They do not lead to higher planets, but to infamy.`,
    tr_ru: ``,
    pur_en: `Kṛṣṇa and the Supreme Personality of Godhead are identical. Therefore Lord Kṛṣṇa is referred to as "Bhagavān" throughout the Gītā. Bhagavān is the ultimate in the Absolute Truth. Absolute Truth is realized in three phases of understanding, namely Brahman or the impersonal all-pervasive spirit; Paramātmā, or the localized aspect of the Supreme within the heart of all living entities; and Bhagavān, or the Supreme Personality of Godhead, Lord Kṛṣṇa. In the Śrīmad-Bhāgavatam this conception of the Absolute Truth is explained thus:
vadanti tat tattva-vidas tattvaṁ yaj jñānam advayam
brahmeti paramātmeti bhagavān iti śabdyate.
"The Absolute Truth is realized in three phases of understanding by the knower of the Absolute Truth, and all of them are identical. Such phases of the Absolute Truth are expressed as Brahman, Paramātmā, and Bhagavān." (Bhāg. 1.2.11) These three divine aspects can be explained by the example of the sun, which also has three different aspects, namely the sunshine, the sun's surface and the sun planet itself. One who studies the sunshine only is the preliminary student. One who understands the sun's surface is further advanced. And one who can enter into the sun planet is the highest. Ordinary students who are satisfied by simply understanding the sunshine—its universal pervasiveness and the glaring effulgence of its impersonal nature—may be compared to those who can realize only the Brahman feature of the Absolute Truth. The student who has advanced still further can know the sun disc, which is compared to knowledge of the Paramātmā feature of the Absolute Truth. And the student who can enter into the heart of the sun planet is compared to those who realize the personal features of the Supreme Absolute Truth. Therefore, the bhaktas, or the transcendentalists who have realized the Bhagavān feature of the Absolute Truth, are the topmost transcendentalists, although all students who are engaged in the study of the Absolute Truth are engaged in the same subject matter. The sunshine, the sun disc and the inner affairs of the sun planet cannot be separated from one another, and yet the students of the three different phases are not in the same category.
The Sanskrit word Bhagavān is explained by the great authority, Parāśara Muni, the father of Vyāsadeva. The Supreme Personality who possesses all riches, all strength, all fame, all beauty, all knowledge and all renunciation is called Bhagavān. There are many persons who are very rich, very powerful, very beautiful, very famous, very learned, and very much detached, but no one can claim that he possesses all riches, all strength, etc., entirely. Only Kṛṣṇa can claim this because He is the Supreme Personality of Godhead. No living entity, including Brahmā, Lord Śiva, or Nārāyaṇa, can possess opulences as fully as Kṛṣṇa. Therefore it is concluded in the Brahma-saṁhitā by Lord Brahmā himself that Lord Kṛṣṇa is the Supreme Personality of Godhead. No one is equal to or above Him. He is the primeval Lord, or Bhagavān, known as Govinda, and He is the supreme cause of all causes.
īśvaraḥ paramaḥ kṛṣṇaḥ sac-cid-ānanda-vigrahaḥ
anādir ādir govindaḥ sarva-kāraṇa-kāraṇam
"There are many personalities possessing the qualities of Bhagavān, but Kṛṣṇa is the supreme because none can excel Him. He is the Supreme Person, and His body is eternal, full of knowledge and bliss. He is the primeval Lord Govinda and the cause of all causes." (Brahma-saṁhitā 5.1)
In the Bhāgavatam also there is a list of many incarnations of the Supreme Personality of Godhead, but Kṛṣṇa is described as the original Personality of Godhead, from whom many, many incarnations and Personalities of Godhead expand:
ete cāṁśa-kalāḥ puṁsaḥ kṛṣṇas tu bhagavān svayam
indrāri-vyākulaṁ lokaṁ mṛḍayanti yuge yuge
"All the lists of the incarnations of Godhead submitted herewith are either plenary expansions or parts of the plenary expansions of the Supreme Godhead, but Kṛṣṇa is the Supreme Personality of Godhead Himself." (Bhag. 1.3.28)
Therefore, Kṛṣṇa is the original Supreme Personality of Godhead, the Absolute Truth, the source of both the Supersoul and the impersonal Brahman.
In the presence of the Supreme Personality of Godhead, Arjuna's lamentation for his kinsmen is certainly unbecoming, and therefore Kṛṣṇa expressed His surprise with the word kutas, "wherefrom." Such unmanly sentiments were never expected from a person belonging to the civilized class of men known as Āryans. The word āryan is applicable to persons who know the value of life and have a civilization based on spiritual realization. Persons who are led by the material conception of life do not know that the aim of life is realization of the Absolute Truth, Viṣṇu, or Bhagavān, and they are captivated by the external features of the material world, and therefore they do not know what liberation is. Persons who have no knowledge of liberation from material bondage are called non-Āryans. Although Arjuna was a kṣatriya, he was deviating from his prescribed duties by declining to fight. This act of cowardice is described as befitting the non-Āryans. Such deviation from duty does not help one in the progress of spiritual life, nor does it even give one the opportunity to become famous in this world. Lord Kṛṣṇa did not approve of the so-called compassion of Arjuna for his kinsmen.`,
    pur_ru: ``,
    audio: 'https://prabhupadabooks.com/bg/2/2',
  },
  {
    n: 3,
    skr: `क्लैब्यं मा स्म गमः पार्थ नैतत्त्वय्युपपद्यते ।
क्षुद्रं हृदयदौर्बल्यं त्यक्त्वोत्तिष्ठ परन्तप ॥ ३ ॥`,
    tr: `klaibyaṁ mā sma gamaḥ pārtha
