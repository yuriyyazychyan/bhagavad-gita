<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бхагавад-гӣта̄ как она есть</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+Devanagari:wght@400;600&family=Spectral+SC:wght@600&family=EB+Garamond:ital,wght@1,400;1,500&family=Cormorant+Garamond:ital@1&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" type="text/css">
</head>
<body data-theme="light">

<!-- TOPBAR -->
<header class="topbar">
    <button class="tb-btn" id="menuBtn">☰</button>
    <div class="topbar-title" id="topTitle">Бхагавад-гӣта̄ как она есть</div>
    <div class="lang-wrap">
        <button class="on" id="lRu" onclick="setLang('ru')">RU</button>
        <button id="lEn" onclick="setLang('en')">EN</button>
    </div>
    <button class="tb-btn" id="bmBtn"><img src="img/love.png" style="width:16px;height:16px;vertical-align:middle;" alt=""></button>
        <span id="bmCnt">0</span>
    <button class="tb-btn" id="themeBtn"></button>
</header>
<div class="prog">
    <div class="prog-fill" id="progFill"></div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- LAYOUT -->
<div class="wrap">
    <aside class="sidebar" id="sidebar">
        <div class="sb-head" id="sbHead">Содержание</div>
        <div id="tocList"></div>
    </aside>
    <main class="main" id="main">
        <div class="page" id="page"></div>
    </main>
</div>

<!-- BOOKMARKS PANEL -->
<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="bmpanel" id="bmpanel">
    <div class="bm-head" id="bmHead">Закладки</div>
    <div id="bmList"></div>
</div>

<!-- WORD TOOLTIP -->
<div class="tip" id="tip">
    <span class="tip-skr" id="tipSkr"></span>
    <span class="tip-tr" id="tipTr"></span>
    <span class="tip-def" id="tipDef"></span>
</div>

<script type="text/javascript" src="js/functions.js"></script>
</body>
</html>
