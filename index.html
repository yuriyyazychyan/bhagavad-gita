<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бхагавад-гӣта̄ как она есть</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+Devanagari:wght@400;600&family=GFS+Didot&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --paper:   #ffffff;
  --paper2:  #f7f5ee;
  --paper3:  #eeeae2;
  --ink:     #000000;
  --ink2:    #000000;
  --ink3:    #000000;
  --rule:    rgba(90,65,30,0.22);
  --serif:   'IM Fell English', 'Times New Roman', Georgia, serif;
  --devan:   'Noto Serif Devanagari', serif;
  --sidebar: 270px;
  --trans:   0.2s ease;
}
[data-theme="dark"] {
  --paper:  #180c01;
  --paper2: #1b0e01;
  --paper3: #201103;
  --ink:    #ffffff;
  --ink2:   #f7f5ee;
  --ink3:   #eeeae2;
  --rule:   rgba(200,170,100,0.18);
}

/* ── BASE ── */
html { scroll-behavior: smooth; }
body {
  font-family: var(--serif);
  background: var(--paper);
  color: var(--ink);
  font-size: 18px;
  line-height: 1.8;
  transition: background var(--trans), color var(--trans);
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 48px;
  background: var(--paper2);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px;
}
.topbar-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--ink2);
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tb-btn {
  background: none;
  border: 1px solid var(--rule);
  color: var(--ink2);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 13px;
  font-family: var(--serif);
  cursor: pointer;
  transition: all var(--trans);
  white-space: nowrap;
}
#themeBtn {
  font-size: 18px;
  background: none;
  border: none;
  cursor: pointer;
  filter: drop-shadow(0 0 4px rgba(255,200,50,0.8));
}
.tb-btn:hover { background: var(--paper3); color: var(--ink); }
.lang-wrap { display: flex; border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; }
.lang-wrap button {
  background: none; border: none;
  padding: 4px 10px; font-size: 13px;
  font-family: var(--serif); cursor: pointer;
  color: var(--ink2); transition: all var(--trans);
}
.lang-wrap button.on { background: var(--ink2); color: var(--paper); }

/* ── PROGRESS ── */
.prog { position: fixed; top: 48px; left: 0; right: 0; height: 2px; background: var(--paper3); z-index: 99; }
.prog-fill { height: 100%; background: var(--ink3); width: 0; transition: width 0.1s; }

/* ── LAYOUT ── */
.wrap { display: flex; padding-top: 50px; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar);
  background: var(--paper2);
  border-right: 1px solid var(--rule);
  position: fixed; top: 50px; left: 0; bottom: 0;
  overflow-y: auto;
  transition: transform var(--trans);
  z-index: 50;
}
.sidebar.hidden { transform: translateX(calc(-1 * var(--sidebar))); }
.sb-head {
  padding: 16px 16px 8px;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink3); border-bottom: 1px solid var(--rule);
}
.ch-row {
  display: flex; align-items: baseline; gap: 8px;
  padding: 8px 16px; cursor: pointer;
  font-size: 14px; color: var(--ink2);
  border-left: 2px solid transparent;
  transition: all var(--trans); line-height: 1.4;
}
.ch-row:hover { background: var(--paper3); color: var(--ink); }
.ch-row.on { background: var(--paper3); color: var(--ink); border-left-color: var(--ink3); }
.ch-n { font-size: 11px; color: var(--ink3); min-width: 18px; }
.ch-label { flex: 1; }
.ch-vcount { font-size: 11px; color: var(--ink3); }

/* ── MAIN ── */
.main { margin-left: var(--sidebar); flex: 1; transition: margin-left var(--trans); }
.main.full { margin-left: 0; }

/* ── BOOK PAGE ── */
.page {
  max-width: 880px;
  margin: 0 auto;
  padding: 48px 48px 100px;
}
@media (max-width: 700px) {
  .page { padding: 28px 22px 80px; }
  :root { --sidebar: 82vw; }
}

/* ── CHAPTER OPENING ── */
.ch-opening { text-align: center; margin-bottom: 48px; }
.ch-word {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 14px;
  text-align: center;
}
.ch-word span { margin: 0 6px; }
.ch-eng-title {
  font-family: 'IM Fell English', Georgia, serif;
  font-size: 28px;
  font-weight: 900;
  font-style: normal;
  color: var(--ink);
  line-height: 1.2;
  margin: 20px 0 0;
  text-align: left;
}
.ch-rule { border: none; border-top: 1px solid var(--rule); margin: 20px auto; width: 200px; }
.ch-intro {
  font-style: italic; font-size: 16px;
  color: var(--ink2); line-height: 1.75;
  max-width: 520px; margin: 0 auto;
}

/* ── TEXT NUMBER ── */
.text-label {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  text-align: center;
  margin: 40px 0 24px;
  cursor: default;
  display: block;
}

/* ── VERSE BLOCK ── */
.verse {
  margin-bottom: 52px;
  scroll-margin-top: 70px;
}
.verse-top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
}
.verse-ref {
  font-size: 11px; letter-spacing: 0.1em;
  color: var(--ink3); white-space: nowrap;
}
.verse-line { flex: 1; height: 1px; background: var(--rule); }
.verse-acts { display: flex; gap: 6px; }
.vbtn {
  background: none; border: 1px solid var(--rule);
  border-radius: 3px; padding: 2px 7px;
  font-size: 12px; cursor: pointer; color: var(--ink3);
  font-family: var(--serif); transition: all var(--trans);
}
.vbtn:hover { color: var(--ink); border-color: var(--ink3); }
.vbtn.bm { color: var(--ink); border-color: var(--ink); }

/* ── SANSKRIT ── */
.v-sanskrit {
  font-family: var(--devan);
  font-size: 20px;
  font-weight: 600;
  line-height: 2.0;
  text-align: left;
  color: var(--ink);
  margin-bottom: 16px;
}

/* ── TRANSLITERATION ── */
.v-translit {
  font-family: 'IM Fell English', Georgia, serif;
  font-style: italic;
  font-size: 16px;
  font-weight: 400;
  text-align: center;
  color: var(--ink);
  line-height: 1.7;
  margin-bottom: 20px;
}
.w {
  cursor: pointer;
  border-bottom: 1px dotted var(--rule);
  transition: color var(--trans), border-color var(--trans);
}
.w:hover { color: var(--ink); border-color: var(--ink3); }

/* ── WORD-BY-WORD ── */
.v-wbw {
  font-family: 'IM Fell English', Georgia, serif;
  font-size: 15px;
  font-style: normal;
  color: var(--ink);
  line-height: 1.6;
  margin-bottom: 16px;
  padding: 0;
  border-left: none;
  display: none;
  text-indent: 1.5em;
}
.v-wbw.open { display: block; }

/* ── TRANSLATION ── */
.v-translation {
  font-family: 'IM Fell English', Georgia, serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.7;
  margin-bottom: 16px;
  text-align: left;
  border-left: none;
  padding-left: 0;
  text-indent: 1.5em;
}

/* ── PURPORT ── */
.purport-tog {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink);
  cursor: pointer;
  user-select: none;
  display: block;
  text-align: center;
  margin: 20px 0 0;
}
.purport-tog::before { content: '▶ '; font-size: 8px; }
.purport-tog.open::before { content: '▼ '; }
.purport-tog.open::before { transform: rotate(90deg); }
.purport-body {
  display: none; margin-top: 14px;
  border-top: 1px solid var(--rule);
  padding-top: 14px;
}
.purport-body.open { display: block; }
.purport-lbl {
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 10px;
}
.purport-body p {
  font-size: 16px; color: var(--ink2);
  line-height: 1.8; margin-bottom: 12px;
}

/* ── AUDIO LINK ── */
.audio-lnk {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; color: var(--ink3);
  border: 1px solid var(--rule); border-radius: 3px;
  padding: 3px 9px; cursor: pointer; text-decoration: none;
  transition: all var(--trans); margin-top: 8px;
  font-family: var(--serif);
}
.audio-lnk:hover { color: var(--ink); border-color: var(--ink3); }

/* ── ORNAMENT ── */
.orn { text-align: center; color: var(--rule); font-size: 20px; margin: 36px 0; user-select: none; }

/* ── WORD TOOLTIP ── */
.tip {
  position: fixed; z-index: 300;
  background: var(--paper2);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 10px 14px; max-width: 260px;
  font-size: 14px; line-height: 1.5;
  display: none; pointer-events: none;
}
.tip.on { display: block; }
.tip-skr { font-family: var(--devan); font-size: 17px; color: var(--ink); display: block; margin-bottom: 3px; }
.tip-tr  { font-style: italic; color: var(--ink2); display: block; margin-bottom: 3px; }
.tip-def { color: var(--ink); }

/* ── BOOKMARKS PANEL ── */
.bmpanel {
  position: fixed; right: 0; top: 50px; bottom: 0;
  width: 280px; background: var(--paper2);
  border-left: 1px solid var(--rule);
  z-index: 80; transform: translateX(100%);
  transition: transform var(--trans);
  overflow-y: auto; padding: 16px;
}
.bmpanel.on { transform: translateX(0); }
.bm-head { font-style: italic; color: var(--ink2); margin-bottom: 14px; font-size: 15px; border-bottom: 1px solid var(--rule); padding-bottom: 10px; }
.bm-item {
  padding: 9px 10px; border: 1px solid var(--rule);
  border-radius: 4px; margin-bottom: 8px; cursor: pointer;
  font-size: 13px; background: var(--paper); transition: all var(--trans);
}
.bm-item:hover { border-color: var(--ink3); }
.bm-ref { color: var(--ink3); font-size: 11px; letter-spacing: 0.08em; margin-bottom: 3px; }
.bm-txt { color: var(--ink2); line-height: 1.4; }
.bm-empty { font-style: italic; font-size: 14px; color: var(--ink3); }

/* ── OVERLAY ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 45; display: none; }
.overlay.on { display: block; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 80px 0; color: var(--ink3); font-style: italic; font-size: 16px; }
</style>
</head>

      tr_ru: 'Высшая Личность [Бхагава̄н] сказала: Мой дорогой Арджуна, как эти нечистоты нашли на тебя? Они вовсе не подобающи мужчине, который знает продвигающие ценности жизни. Они ведут не к планетам выше, а к бесславию.',

      pur_ru: 'Господь сразу приступил к сути. Кришна обратился к Арджуне как к пандиту — учёному человеку, — однако указал: истинный учёный не скорбит ни о живых, ни о мёртвых. Почему? Ибо он знает, что душа вечна. Это — отправная точка всего учения Гиты.',
      pur_en: 'Kṛṣṇa and the Supreme Personality of Godhead are identical. Therefore Lord Kṛṣṇa is referred to as "Bhagavān" throughout the Gītā. Bhagavān is the ultimate in the Absolute Truth. Absolute Truth is realized in three phases of understanding, namely Brahman or the impersonal all-pervasive spirit; Paramātmā, or the localized aspect of the Supreme within the heart of all living entities; and Bhagavān, or the Supreme Personality of Godhead, Lord Kṛṣṇa. In the Śrīmad-Bhāgavatam this conception of the Absolute Truth is explained thus:\nvadanti tat tattva-vidas tattvaṁ yaj jñānam advayam\nbrahmeti paramātmeti bhagavān iti śabdyate.\n"The Absolute Truth is realized in three phases of understanding by the knower of the Absolute Truth, and all of them are identical. Such phases of the Absolute Truth are expressed as Brahman, Paramātmā, and Bhagavān." (Bhāg. 1.2.11) These three divine aspects can be explained by the example of the sun, which also has three different aspects, namely the sunshine, the sun\'s surface and the sun planet itself. One who studies the sunshine only is the preliminary student. One who understands the sun\'s surface is further advanced. And one who can enter into the sun planet is the highest. Ordinary students who are satisfied by simply understanding the sunshine—its universal pervasiveness and the glaring effulgence of its impersonal nature—may be compared to those who can realize only the Brahman feature of the Absolute Truth. The student who has advanced still further can know the sun disc, which is compared to knowledge of the Paramātmā feature of the Absolute Truth. And the student who can enter into the heart of the sun planet is compared to those who realize the personal features of the Supreme Absolute Truth. Therefore, the bhaktas, or the transcendentalists who have realized the Bhagavān feature of the Absolute Truth, are the topmost transcendentalists, although all students who are engaged in the study of the Absolute Truth are engaged in the same subject matter. The sunshine, the sun disc and the inner affairs of the sun planet cannot be separated from one another, and yet the students of the three different phases are not in the same category.\nThe Sanskrit word Bhagavān is explained by the great authority, Parāśara Muni, the father of Vyāsadeva. The Supreme Personality who possesses all riches, all strength, all fame, all beauty, all knowledge and all renunciation is called Bhagavān. There are many persons who are very rich, very powerful, very beautiful, very famous, very learned, and very much detached, but no one can claim that he possesses all riches, all strength, etc., entirely. Only Kṛṣṇa can claim this because He is the Supreme Personality of Godhead. No living entity, including Brahmā, Lord Śiva, or Nārāyaṇa, can possess opulences as fully as Kṛṣṇa. Therefore it is concluded in the Brahma-saṁhitā by Lord Brahmā himself that Lord Kṛṣṇa is the Supreme Personality of Godhead. No one is equal to or above Him. He is the primeval Lord, or Bhagavān, known as Govinda, and He is the supreme cause of all causes.\nīśvaraḥ paramaḥ kṛṣṇaḥ sac-cid-ānanda-vigrahaḥ\nanādir ādir govindaḥ sarva-kāraṇa-kāraṇam\n"There are many personalities possessing the qualities of Bhagavān, but Kṛṣṇa is the supreme because none can excel Him. He is the Supreme Person, and His body is eternal, full of knowledge and bliss. He is the primeval Lord Govindaand the cause of all causes." (Brahma-saṁhitā 5.1)\nIn the Bhāgavatam also there is a list of many incarnations of the Supreme Personality of Godhead, but Kṛṣṇa is described as the original Personality of Godhead, from whom many, many incarnations and Personalities of Godhead expand:\nete cāṁśa-kalāḥ puṁsaḥ kṛṣṇas tu bhagavān svayam\nindrāri-vyākulaṁ lokaṁ mṛḍayanti yuge yuge\n"All the lists of the incarnations of Godhead submitted herewith are either plenary expansions or parts of the plenary expansions of the Supreme Godhead, but Kṛṣṇa is the Supreme Personality of Godhead Himself." (Bhag. 1.3.28)\nTherefore, Kṛṣṇa is the original Supreme Personality of Godhead, the Absolute Truth, the source of both the Supersoul and the impersonal Brahman.\nIn the presence of the Supreme Personality of Godhead, Arjuna\'s lamentation for his kinsmen is certainly unbecoming, and therefore Kṛṣṇa expressed His surprise with the word kutas, "wherefrom." Such unmanly sentiments were never expected from a person belonging to the civilized class of men known as Āryans. The word āryanis applicable to persons who know the value of life and have a civilization based on spiritual realization. Persons who are led by the material conception of life do not know that the aim of life is realization of the Absolute Truth, Viṣṇu, or Bhagavān, and they are captivated by the external features of the material world, and therefore they do not know what liberation is. Persons who have no knowledge of liberation from material bondage are called non-Āryans. Although Arjuna was a kṣatriya, he was deviating from his prescribed duties by declining to fight. This act of cowardice is described as befitting the non-Āryans. Such deviation from duty does not help one in the progress of spiritual life, nor does it even give one the opportunity to become famous in this world. Lord Kṛṣṇa did not approve of the so-called compassion of Arjuna for his kinsmen.'

      pur_ru: 'Вскоре будет добавлено...',
      pur_en: 'In this Seventh Chapter of Bhagavad-gītā, the nature of Kṛṣṇa consciousness is fully described. Kṛṣṇa is full in all opulences, and how He manifests such opulences is described herein. Also, four kinds of fortunate people who become attached to Kṛṣṇa, and four kinds of unfortunate people who never take to Kṛṣṇa are described in this chapter.\nIn the first six chapters of Bhagavad-gītā, the living entity has been described as nonmaterial spirit soul which is capable of elevating himself to self-realization by different types of yogas. At the end of the Sixth Chapter, it has been clearly stated that the steady concentration of the mind upon Kṛṣṇa, or in other words Kṛṣṇa consciousness, is the highest form of all yoga. By concentrating one\'s mind upon Kṛṣṇa, one is able to know the Absolute Truth completely, but not otherwise. Impersonal brahmajyoti or localized Paramātmā realization is not perfect knowledge of the Absolute Truth because it is partial. Full and scientific knowledge is Kṛṣṇa, and everything is revealed to the person in Kṛṣṇa consciousness. In complete Kṛṣṇa consciousness one knows that Kṛṣṇa is ultimate knowledge beyond any doubts. Different types of yoga are only steppingstones on the path of Kṛṣṇa consciousness. One who takes directly to Kṛṣṇa consciousness automatically knows about brahmajyoti and Paramātmā in full. By practice of Kṛṣṇa consciousness yoga, one can know everything in full—namely the Absolute Truth, the living entities, the material nature, and their manifestations with paraphernalia.\nOne should therefore begin yoga practice as directed in the last verse of the Sixth Chapter. Concentration of the mind upon Kṛṣṇa the Supreme is made possible by prescribed devotional service in nine different forms, of which śravaṇam is the first and most important. The Lord therefore says to Arjuna, "tat śṛṇu," or "Hear from Me." No one can be a greater authority than Kṛṣṇa, and therefore by hearing from Him one receives the greatest opportunity for progress in Kṛṣṇa consciousness. One has therefore to learn from Kṛṣṇa directly or from a pure devotee of Kṛṣṇa—and not from a nondevotee upstart, puffed up with academic education.\nIn the Śrīmad-Bhāgavatam this process of understanding Kṛṣṇa, the Supreme Personality of Godhead, the Absolute Truth, is described in the Second Chapter of the First Canto as follows:\nśṛṇvatāṁ sva-kathāṁ kṛṣṇaḥ puṇya-śravaṇa-kīrtanaḥ\nhṛdyantaḥstho hy abhadrāṇi vidbunoti suhṛt satām.\nnaṣṭa-prāyeṣv abhadreṣu nityaṁ bhāgavata-sevayā\nbhagavaty uttama-śloke bhaktir bhavati naiṣṭhikī.\ntadā rajas-tamo-bhāvāḥ kāma-lobhadayaś ca ye\nceta etair anāviddhaṁ sthitaṁ sattve prasīdati.\nevam prasanna-manaso bhagavad-bhakti-yogataḥ\nbhagavat-tattva-vijñānaṁ mukta-saṅgasya jāyate.\nbhidyate hṛdaya-granthiś chidyante sarva-saṁśayāḥ\nkṣīyante cāsya karmāṇi dṛṣṭa evātmanīśvare.\n"To hear about Kṛṣṇa from Vedic literatures, or to hear from Him directly through the Bhagavad-gītā, is itself righteous activity. And for one who hears about Kṛṣṇa, Lord Kṛṣṇa, who is dwelling in everyone\'\s heart, acts as a best-wishing friend and purifies the devotee who constantly engages in hearing of Him. In this way, a devotee naturally develops his dormant transcendental knowledge. As he hears more about Kṛṣṇa from the Bhāgavatam and from the devotees, he becomes fixed in the devotional service of the Lord. By development of devotional service one becomes freed from the modes of passion and ignorance, and thus material lusts and avarice are diminished. When these impurities are wiped away, the candidate remains steady in his position of pure goodness, becomes enlivened by devotional service and understands the science of God perfectly. Thus bhakti-yoga severs the hard knot of material affection and enables one to come at once to the stage of \'\asaṁśayaṁ samagram,\'\ understanding of the Supreme Absolute Truth Personality of Godhead." (Bhāg. 1.2.17-21)\nTherefore only by hearing from Kṛṣṇa or from His devotee in Kṛṣṇa consciousness can one understand the science of Kṛṣṇa.',
      audio: 'https://prabhupadabooks.com/bg/7/1'

      tr: `jñānaṁ te 'haṁ sa-vijñānam\nidaṁ vakṣyāmy aśeṣataḥ\nyaj jñātvā neha bhūyo 'nyaj\njñātavyam avaśiṣyate`,

      tr_ru: 'Из многих тысяч среди людей, один может усердствовать для совершенства, и из тех, кто достигли совершенства, с трудом один знает Меня в истине.',

      pur_ru: 'Вскоре будет добавлено...',
      pur_en: 'There are various grades of men, and out of many thousands one may be sufficiently interested in transcendental realization to try to know what is the self, what is the body, and what is the Absolute Truth. Generally mankind is simply engaged in the animal propensities, namely eating, sleeping, defending and mating, and hardly anyone is interested in transcendental knowledge. The first six chapters of the Gītā are meant for those who are interested in transcendental knowledge, in understanding the self, the Superself and the process of realization by jñāna-yoga, dhyāna-yoga, and discrimination of the self from matter. However, Kṛṣṇa can only be known by persons who are in Kṛṣṇa consciousness. Other transcendentalists may achieve impersonal Brahman realization, for this is easier than understanding Kṛṣṇa. Kṛṣṇa is the Supreme Person, but at the same time He is beyond the knowledge of Brahman and Paramātmā. The yogīs and jñānīs are confused in their attempts to understand Kṛṣṇa, although the greatest of the impersonalists, Śrīpāda Śaṅkarācārya, has admitted in his Gītā commentary that Kṛṣṇa is the Supreme Personality of Godhead. But his followers do not accept Kṛṣṇa as such, for it is very difficult to know Kṛṣṇa, even though one has transcendental realization of impersonal Brahman.\nKṛṣṇa is the Supreme Personality of Godhead, the cause of all causes, the primeval Lord Govinda. Īśvaraḥ paramaḥ kṛṣṇaḥ sac-cid-ānanda-vigrahaḥ anādir ādir govindaḥ sarva-kāraṇa-kāraṇam. It is very difficult for the nondevotees to know Him. Although nondevotees declare that the path of bhakti or devotional service is very easy, they cannot practice it. If the path of bhakti is so easy, as the nondevotee class of men proclaim, then why do they take up the difficult path? Actually the path of bhakti is not easy. The so-called path of bhakti practiced by unauthorized persons without knowledge of bhakti may be easy, but when it is practiced factually according to the rules and regulations, the speculative scholars and philosophers fall away from the path. Śrīla Rūpa Gosvāmī writes in his Bhakti-rasāmṛta-sindhu:\nśruti-smṛti-purāṇādi-pañcarātra-vidhiṁ vinā\naikāntikī harer bhaktir utpātāyaiva kalpate.\n"Devotional service of the Lord that ignores the authorized Vedic literatures like the Upaniṣads, Purāṇas, Nārada-pañcarātra, etc., is simply an unnecessary disturbance in society."\nIt is not possible for the Brahman realized impersonalist or the Paramātmā realized yogī to understand Kṛṣṇa, the Supreme Personality of Godhead as the son of mother Yaśodā or the charioteer of Arjuna. Even the great demigods are sometimes confused about Kṛṣṇa: "muhyanti yat sūrayaḥ," "māṁ tu veda na kaścana." "No one knows Me as I am," the Lord says. And if one does know Him, then "sa mahātmā sudurlabhaḥ." "Such a great soul is very rare." Therefore unless one practices devotional service to the Lord, he cannot know Kṛṣṇa as He is (tattvataḥ), even though one is a great scholar or philosopher. Only the pure devotees can know something of the inconceivable transcendental qualities in Kṛṣṇa, in the cause of all causes, in His omnipotence and opulence, and in His wealth, fame, strength, beauty, knowledge and renunciation, because Kṛṣṇa is benevolently inclined to His devotees. He is the last word in Brahman realization, and the devotees alone can realize Him as He is. Therefore it is said:\nataḥ śrī-kṛṣṇa-nāmādi na bhaved grāhyam indriyāiḥ\nsevonmukhe hi jihvādau svayam eva sphuraty adaḥ\n"No one can understand Kṛṣṇa as He is by the blunt material senses. But He reveals Himself to the devotees, being pleased with them for their transcendental loving service unto Him." (Padma Purāṇa)',

      tr_en: 'Earth, water, fire, air, ether, mind, intelligence and false ego — altogether these eight comprise My separated material energies.',
      pur_ru: 'Вскоре будет добавлено...',
      pur_en: 'The science of God analyzes the constitutional position of God and His diverse energies. Material nature is called prakṛti, or the energy of the Lord in His different puruṣa incarnations (expansions) as described in the Svatvata Tantra:\nviṣṇos tu trīṇi rūpāṇi puruṣākhyāny atho viduḥ\nekantu mahataḥ sraṣṭṛ dvitīyaṁ tv aṇḍa-saṁsthitam\ntṛtīyaṁ sarvabhūta-sthaṁ tāni jñātvā vimucyate\n"For material creation, Lord Kṛṣṇa\'\s plenary expansion assumes three Viṣṇus. The first one, Mahā-Viṣṇu, creates the total material energy, known as mahat-tattva. The second, Garbhodakaśāyī Viṣṇu, enters into all the universes to create diversities in each of them. The third, Kṣīrodakaśāyī Viṣṇu, is diffused as the all-pervading Supersoul in all the universes and is known as Paramātmā, who is present even within the atoms. Anyone who knows these three Viṣṇus can be liberated from material entanglement."\nThis material world is a temporary manifestation of one of the energies of the Lord. All the activities of the material world are directed by these three Viṣṇu expansions of Lord Kṛṣṇa. These Puruṣas are called incarnations. Generally one who does not know the science of God (Kṛṣṇa) assumes that this material world is for the enjoyment of the living entities and that the living entities are the causes (Puruṣas), controllers and enjoyers of the material energy. According to Bhagavad-gītā this atheistic conclusion is false. In the verse under discussion it is stated that Kṛṣṇa is the original cause of the material manifestation. Śrīmad-Bhāgavatam also confirms this. The ingredients of the material manifestation are separated energies of the Lord. Even the brahmajyoti, which is the ultimate goal of the impersonalists, is a spiritual energy manifested in the spiritual sky. There are no spiritual diversities in brahmajyoti as there are in the Vaikuṇṭhalokas, and the impersonalist accepts this brahmajyoti as the ultimate eternal goal. The Paramātmā manifestation is also a temporary all-pervasive aspect of the Kṣīrodakaśāyī Viṣṇu. The Paramātmā manifestation is not eternal in the spiritual world. Therefore the factual Absolute Truth is the Supreme Personality of Godhead Kṛṣṇa. He is the complete energetic person, and He possesses different separated and internal energies.\nIn the material energy, the principal manifestations are eight, as above mentioned. Out of these, the first five manifestations, namely earth, water, fire, air and sky, are called the five gigantic creations or the gross creations, within which the five sense objects are included. They are the manifestations of physical sound, touch, form, taste and smell. Material science comprises these ten items and nothing more. But the other three items, namely mind, intelligence and false ego, are neglected by the materialists. Philosophers who deal with mental activities are also not perfect in knowledge because they do not know the ultimate source, Kṛṣṇa. The false ego-"I am," and "It is mine," which constitute the basic principle of material existence-includes ten sense organs for material activities. Intelligence refers to the total material creation, called the mahat-tattva. Therefore from the eight separated energies of the Lord are manifest the twenty-four elements of the material world, which are the subject matter of sāṅkhya atheistic philosophy; they are originally offshoots from Kṛṣṇa\'\s energies and are separated from Him, but atheistic sāṅkhya philosophers with a poor fund of knowledge do not know Kṛṣṇa as the cause of all causes. The subject matter for discussion in the sāṅkhya philosophy is only the manifestation of the external energy of Kṛṣṇa, as it is described in the Bhagavad-gītā.',

/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */
let lang = 'ru';
let curCh = 2;
let bookmarks = JSON.parse(localStorage.getItem('bg_bm') || '[]');

/* ════════════════════════════════════════════
   LANG
   ════════════════════════════════════════════ */
function setLang(l) {
  lang = l;
  document.getElementById('lRu').classList.toggle('on', l === 'ru');
  document.getElementById('lEn').classList.toggle('on', l === 'en');
  document.getElementById('sbHead').textContent = l === 'ru' ? 'Содержание' : 'Contents';
  document.getElementById('bmHead').textContent = l === 'ru' ? 'Закладки'   : 'Bookmarks';
  renderToc();
  renderChapter(curCh, true);
}

/* ════════════════════════════════════════════
   THEME
   ════════════════════════════════════════════ */
function toggleTheme() {
  const dark = document.body.dataset.theme === 'dark';
  document.body.dataset.theme = dark ? 'light' : 'dark';
  document.getElementById('themeBtn').textContent = dark ? '🌕' : '☀️';
  document.getElementById('themeBtn').style.filter = dark 
  ? 'drop-shadow(0 0 5px rgba(180,210,255,0.9))' 
  : 'drop-shadow(0 0 5px rgba(255,200,50,0.9))';
  localStorage.setItem('bg_theme', dark ? 'light' : 'dark');
  updateIllustration();
}

function updateIllustration() {
  const dark = document.body.dataset.theme === 'dark';
  const imgs = document.querySelectorAll('.ch-illustration');
  imgs.forEach(img => img.src = dark ? 'krishna_arjuna_dark.jpg' : 'krishna_arjuna.jpg');
}

/* ════════════════════════════════════════════
   TOC
   ════════════════════════════════════════════ */
function renderToc() {
  document.getElementById('tocList').innerHTML = CHAPTERS.map(c => `
    <div class="ch-row ${c.n === curCh ? 'on' : ''}" onclick="renderChapter(${c.n})">
      <span class="ch-n">${c.n}.</span>
      <span class="ch-label">${lang === 'ru' ? c.ru : c.en}</span>
      <span class="ch-vcount">${c.v}</span>
    </div>
  `).join('');
}

/* ════════════════════════════════════════════
   CHAPTER
   ════════════════════════════════════════════ */
function renderChapter(n, skipScroll = false) {
  curCh = n;
  const ch = CHAPTERS.find(c => c.n === n);
  const verses = VERSES[n] || [];
  const isRu = lang === 'ru';

  let html = `
  <div class="ch-opening">
  <div class="ch-word">${isRu?'Глава':'Chapter'} ${numWord(n)}</div>
  <img src='krishna_arjuna.jpg' class='ch-illustration' style='width:280px;height:280px;object-fit:cover;border-radius:50%;display:block;margin:0 auto 32px;mix-blend-mode: multiply;'>
  <div class="ch-eng-title">${isRu ? ch.ru : ch.en}</div>
  </div>
  `;

  if (!verses.length) {
    html += `<div class="empty">${isRu ? 'Тексты этой главы будут добавлены...' : 'Texts for this chapter coming soon...'}</div>`;
  } else {
    verses.forEach((v, i) => {
      html += renderVerse(v, n);
    });
  }

  document.getElementById('page').innerHTML = html;
  document.getElementById('topTitle').innerHTML = `<em>${isRu ? ch.ru : ch.en}</em>`;
  renderToc();
  updateBm();
  closeAll();
  localStorage.setItem('bg_lang', lang);
  localStorage.setItem('bg_chapter', n);
  if (!skipScroll) window.scrollTo({ top:0, behavior:'smooth' });
  updateIllustration();
}

/* ════════════════════════════════════════════
   VERSE
   ════════════════════════════════════════════ */
function renderVerse(v, chN) {
  const isRu = lang === 'ru';
  const key = `${chN}.${v.n}`;
  const isBm = bookmarks.some(b => b.key === key);

  // build transliteration with clickable words
  let trLines = v.tr.split('\n').map(line => {
    return line.split(' ').map(tok => {
      const wd = v.words?.find(w => tok.startsWith(w.tr.replace(/[''']/g,'')));
      if (wd) return `<span class="w" onclick="showTip(event,'${esc(wd.skr)}','${esc(wd.tr)}','${esc(isRu ? wd.ru : wd.en)}')">${tok}</span>`;
      return tok;
    }).join(' ');
  }).join('<br>');

  return `
<div class="verse" id="v${chN}_${v.n}">
 <div style='text-align:center;margin:36px 0 20px;'>
  <span style='font-family:"Helvetica Neue",Arial,sans-serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink);'>${isRu?'ТЕКСТ':'TEXT'} ${v.n}</span>
</div>
<div style='float:right;margin-top:-48px;'>
  <button class='vbtn ${isBm?"bm":""}' onclick='toggleBm("${key}",event)' title='${isRu?"Закладка":"Bookmark"}'>${isBm?'🔖':'○'}</button>
  <a class='audio-lnk' href='${v.audio}' target='_blank'>▶ ${isRu?'Аудио':'Audio'}</a>
</div>
  </div>
  <div class="v-sanskrit">${v.skr.replace(/\n/g,'<br>')}</div>
  <div class="v-translit">${trLines}</div>
  <div class="v-wordbyword">${isRu ? v.wbw_ru : v.wbw_en}</div>
  <div style='font-family:"Helvetica Neue",Arial,sans-serif;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;text-align:center;margin:24px 0 16px;color:var(--ink);'>TRANSLATION</div>
  <div class="v-translation">${isRu ? v.tr_ru : v.tr_en}</div>
  <div class="purport-tog" onclick="togPurport(this)">
    ${isRu ? 'Комментарий Шрилы Прабхупады' : 'Purport by Śrīla Prabhupāda'}
  </div>
  <div class="purport-body">
    <div class="purport-lbl">${isRu ? 'Разъяснение' : 'Purport'}</div>
    <p>${isRu ? v.pur_ru : v.pur_en}</p>
  </div>
</div>`;
}

function togPurport(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

/* ════════════════════════════════════════════
   TOOLTIP
   ════════════════════════════════════════════ */
function showTip(e, skr, tr, def) {
  const t = document.getElementById('tip');
  document.getElementById('tipSkr').textContent = skr;
  document.getElementById('tipTr').textContent  = tr;
  document.getElementById('tipDef').textContent = def;
  t.classList.add('on');
  const x = Math.min(e.clientX + 12, window.innerWidth - 280);
  const y = Math.min(e.clientY + 12, window.innerHeight - 110);
  t.style.left = x + 'px';
  t.style.top  = y + 'px';
  setTimeout(() => document.addEventListener('click', hideTip, {once:true}), 10);
}
function hideTip() { document.getElementById('tip').classList.remove('on'); }

/* ════════════════════════════════════════════
   BOOKMARKS
   ════════════════════════════════════════════ */
function toggleBm(key, e) {
  e.stopPropagation();
  const idx = bookmarks.findIndex(b => b.key === key);
  if (idx >= 0) {
    bookmarks.splice(idx, 1);
  } else {
    const [ch, vn] = key.split('.');
    const v = (VERSES[+ch] || []).find(x => x.n === +vn);
    const txt = v ? (lang === 'ru' ? v.tr_ru : v.tr_en).slice(0, 90) + '…' : '';
    bookmarks.push({ key, txt });
  }
  localStorage.setItem('bg_bm', JSON.stringify(bookmarks));
  renderChapter(curCh);
}

function updateBm() {
  document.getElementById('bmCnt').textContent = bookmarks.length;
  const list = document.getElementById('bmList');
  if (!bookmarks.length) {
    list.innerHTML = `<div class="bm-empty">${lang === 'ru' ? 'Нет закладок' : 'No bookmarks yet'}</div>`;
    return;
  }
  list.innerHTML = bookmarks.map(b => `
    <div class="bm-item" onclick="goToBm('${b.key}')">
      <div class="bm-ref">Бх.-г. ${b.key}</div>
      <div class="bm-txt">${b.txt}</div>
    </div>
  `).join('');
}

function goToBm(key) {
  const [ch] = key.split('.');
  renderChapter(+ch);
  document.getElementById('bmpanel').classList.remove('on');
  setTimeout(() => {
    const el = document.getElementById('v' + key.replace('.', '_'));
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 200);
}

/* ════════════════════════════════════════════
   UI CONTROLS
   ════════════════════════════════════════════ */
document.getElementById('menuBtn').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  const mn = document.getElementById('main');
  const ov = document.getElementById('overlay');
  const hidden = sb.classList.toggle('hidden');
  mn.classList.toggle('full', hidden);
  if (!hidden && window.innerWidth < 768) ov.classList.add('on');
  else ov.classList.remove('on');
});

document.getElementById('bmBtn').addEventListener('click', () => {
  document.getElementById('bmpanel').classList.toggle('on');
  updateBm();
});

document.getElementById('themeBtn').addEventListener('click', toggleTheme);

function closeAll() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('bmpanel').classList.remove('on');
  if (window.innerWidth < 768) {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('main').classList.add('full');
  }
}

/* ════════════════════════════════════════════
   PROGRESS BAR
   ════════════════════════════════════════════ */
window.addEventListener('scroll', () => {
  const pg = document.getElementById('page');
  if (!pg) return;
  const pct = Math.min(100, (-pg.getBoundingClientRect().top / (pg.offsetHeight - window.innerHeight)) * 100);
  document.getElementById('progFill').style.width = Math.max(0, pct) + '%';
});

/* ════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════ */
function esc(s) { return String(s).replace(/'/g, "\\'"); }

function numWord(n) {
  const ru = ['','Первая','Вторая','Третья','Четвёртая','Пятая','Шестая','Седьмая','Восьмая','Девятая','Десятая','Одиннадцатая','Двенадцатая','Тринадцатая','Четырнадцатая','Пятнадцатая','Шестнадцатая','Семнадцатая','Восемнадцатая'];
  const en = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen'];
  return lang === 'ru' ? ru[n] : en[n];
}

/* ════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════ */
if (window.innerWidth < 768) {
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('main').classList.add('full');
}
const savedTheme = localStorage.getItem('bg_theme') || 'light';
document.body.dataset.theme = savedTheme;
document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '🌕' : '☀️';
document.getElementById('themeBtn').style.filter = savedTheme === 'dark'
  ? 'drop-shadow(0 0 5px rgba(180,210,255,0.9))'
  : 'drop-shadow(0 0 5px rgba(255,200,50,0.9))';
const savedLang = localStorage.getItem('bg_lang') || 'ru';
const savedChapter = parseInt(localStorage.getItem('bg_chapter')) || 7;
setLang(savedLang);
renderChapter(savedChapter);
updateBm();
</script>
